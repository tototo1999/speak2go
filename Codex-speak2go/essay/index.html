<!DOCTYPE html>
<html lang="zh-CN"><head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>✍️ Essay2GO · 英文作文批改</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ccircle cx='32' cy='32' r='30' fill='%23f97316'/%3E%3Ctext x='32' y='44' font-family='Helvetica,Arial,sans-serif' font-size='28' font-weight='800' text-anchor='middle' fill='%23fff'%3E%E2%9C%8D%3C/text%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --teal: #f97316; --teal-50: #fff7ed; --teal-600: #ea580c;
      --purple: #534AB7; --purple-50: #EEEDFE;
      --ai: #6d5dd3; --ai-bg: #f3f1fc;
      --bg: #FAFAF8; --bg2: #F4F3EF;
      --border: rgba(60,58,54,0.12); --border2: rgba(60,58,54,0.22);
      --text: #1a1a18; --text2: #5f5e5a; --text3: #888780;
      --radius: 8px; --radius-lg: 12px;
    }
    html, body { height: 100%; }
    body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; height: 100vh; }
    nav { display: flex; align-items: center; justify-content: space-between; padding: 0 1.5rem; height: 56px; background: #fff; border-bottom: 0.5px solid var(--border); flex-shrink: 0; }
    .logo { font-family: 'Playfair Display', Georgia, serif; font-size: 19px; font-weight: 600; color: var(--text); text-decoration: none; }
    .logo span { color: var(--teal); }
    .nav-right { display: flex; align-items: center; gap: 14px; font-size: 13px; color: var(--text2); }
    .nav-link { font-size: 12px; color: var(--text3); text-decoration: none; }
    .nav-link:hover { color: var(--text); }

    .layout { flex: 1; display: flex; min-height: 0; }
    .main-col { flex: 1; display: flex; flex-direction: column; min-width: 0; }

    /* Message list */
    .messages { flex: 1; overflow-y: auto; padding: 1.5rem; display: flex; flex-direction: column; gap: 1rem; }
    .empty { margin: auto; text-align: center; color: var(--text3); font-size: 14px; line-height: 1.7; max-width: 360px; }
    .empty .big { font-size: 34px; margin-bottom: .5rem; }

    .msg { display: flex; flex-direction: column; max-width: 760px; width: 100%; align-self: center; }
    .msg-head { font-size: 12px; font-weight: 600; margin-bottom: 5px; display: flex; align-items: center; gap: 6px; }
    .msg-time { font-size: 11px; color: var(--text3); font-weight: 400; }
    .bubble { border-radius: var(--radius-lg); padding: 14px 18px; font-size: 14px; line-height: 1.7; word-wrap: break-word; overflow-wrap: anywhere; }

    /* student */
    .msg.user .msg-head { color: var(--teal-600); }
    .msg.user .bubble { background: var(--teal-50); border: 0.5px solid rgba(249,115,22,0.25); white-space: pre-wrap; }
    /* ai */
    .msg.ai .msg-head { color: var(--ai); }
    .msg.ai .bubble { background: var(--ai-bg); border: 0.5px solid rgba(109,93,211,0.22); }
    .msg.ai .bubble.thinking { color: var(--text3); font-style: italic; }

    /* markdown inside ai bubble */
    .bubble h1, .bubble h2, .bubble h3 { font-family: inherit; margin: .8em 0 .4em; line-height: 1.3; }
    .bubble h1 { font-size: 18px; } .bubble h2 { font-size: 16px; } .bubble h3 { font-size: 14px; }
    .bubble h1:first-child, .bubble h2:first-child, .bubble h3:first-child, .bubble p:first-child { margin-top: 0; }
    .bubble p { margin: .5em 0; }
    .bubble ul, .bubble ol { margin: .5em 0; padding-left: 1.4em; }
    .bubble li { margin: .25em 0; }
    .bubble code { background: rgba(60,58,54,0.08); padding: 1px 5px; border-radius: 4px; font-size: 0.88em; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
    .bubble pre { background: rgba(60,58,54,0.06); padding: 10px 12px; border-radius: 8px; overflow-x: auto; margin: .6em 0; }
    .bubble pre code { background: none; padding: 0; }
    .bubble blockquote { border-left: 3px solid var(--border2); padding-left: 12px; color: var(--text2); margin: .5em 0; }
    .bubble table { border-collapse: collapse; margin: .6em 0; font-size: 13px; }
    .bubble th, .bubble td { border: 0.5px solid var(--border2); padding: 5px 9px; text-align: left; }
    .bubble hr { border: none; border-top: 0.5px solid var(--border); margin: .8em 0; }
    .bubble strong { font-weight: 600; }

    /* Composer */
    .composer { border-top: 0.5px solid var(--border); background: #fff; padding: 1rem 1.5rem; flex-shrink: 0; }
    .composer-inner { max-width: 760px; margin: 0 auto; }
    textarea { width: 100%; min-height: 120px; max-height: 320px; resize: vertical; padding: 12px 14px; font-size: 14px; line-height: 1.6; font-family: inherit; border: 0.5px solid var(--border2); border-radius: var(--radius); background: var(--bg); color: var(--text); outline: none; transition: border-color .15s; }
    textarea:focus { border-color: var(--teal); background: #fff; }
    .composer-bar { display: flex; align-items: center; justify-content: space-between; margin-top: 10px; }
    .composer-hint { font-size: 12px; color: var(--text3); }
    .submit-btn { padding: 10px 22px; font-size: 14px; font-family: inherit; font-weight: 600; border: none; border-radius: var(--radius); background: var(--teal); color: #fff; cursor: pointer; transition: background .15s; }
    .submit-btn:hover { background: var(--teal-600); }
    .submit-btn:disabled { background: var(--text3); cursor: not-allowed; }

    /* Progress sidebar */
    .side { width: 240px; border-left: 0.5px solid var(--border); background: #fff; padding: 1.25rem 1.1rem; overflow-y: auto; flex-shrink: 0; }
    .side h3 { font-size: 13px; font-weight: 600; color: var(--text2); margin-bottom: .9rem; letter-spacing: .02em; }
    .prog-item { display: flex; align-items: baseline; justify-content: space-between; padding: 9px 0; border-bottom: 0.5px solid var(--border); }
    .prog-score { font-family: 'Playfair Display', Georgia, serif; font-size: 20px; font-weight: 600; color: var(--teal-600); }
    .prog-band { font-size: 11px; color: var(--text3); margin-left: 6px; }
    .prog-date { font-size: 11px; color: var(--text3); }
    .prog-empty { font-size: 12px; color: var(--text3); line-height: 1.6; }
    @media (max-width: 720px) { .side { display: none; } .messages, .composer-inner { } }

    .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #1a1a18; color: #fff; padding: 10px 18px; border-radius: 8px; font-size: 13px; opacity: 0; transition: opacity .2s; pointer-events: none; z-index: 50; max-width: 90vw; }
    .toast.show { opacity: 1; }
    .loading-screen { flex: 1; display: flex; align-items: center; justify-content: center; color: var(--text3); font-size: 14px; }
  </style>
</head>
<body>
  <nav>
    <a href="/Codex-speak2go/" class="logo">✍️ Essay2<span>GO</span></a>
    <div class="nav-right">
      <span id="userName"></span>
      <a href="/Codex-speak2go/chat.html" class="nav-link">主调试室</a>
    </div>
  </nav>

  <div id="bootScreen" class="loading-screen">加载中…</div>

  <div class="layout" id="appLayout" style="display:none;">
    <div class="main-col">
      <div class="messages" id="messagesList"></div>
      <div class="composer">
        <div class="composer-inner">
          <textarea id="essayInput" placeholder="把作文粘贴/写在这里，提交后 AI 批改（五维评分 + 逐句改 + 高分改写）"></textarea>
          <div class="composer-bar">
            <span class="composer-hint">⌘/Ctrl + Enter 提交</span>
            <button class="submit-btn" id="submitBtn" onclick="submitEssay()">提交批改</button>
          </div>
        </div>
      </div>
    </div>
    <aside class="side">
      <h3>写作进度</h3>
      <div id="progList"><div class="prog-empty">提交作文后，这里会记录每篇的得分与日期。</div></div>
    </aside>
  </div>

  <div id="toast" class="toast"></div>

  <script src="/Codex-speak2go/vendor/supabase.js"
          onerror="this.onerror=null;this.src='https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2'"></script>
  <script src="/Codex-speak2go/vendor/marked.min.js"
          onerror="this.onerror=null;this.src='https://cdn.jsdelivr.net/npm/marked/marked.min.js'"></script>
  <script>
  // ── Config (same Supabase project + anon key as the rest of speak2go) ──────────
  const SUPABASE_URL = 'https://qjnagbzqhoansixqharb.supabase.co'
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFqbmFnYnpxaG9hbnNpeHFoYXJiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgzNDIxODIsImV4cCI6MjA5MzkxODE4Mn0.GpMUVTk6JvqeciXagXQiJunc8TLFMHg3_b9reIjJ2Y8'
  // Use `sb` locally to avoid clashing with the global `supabase` UMD injects
  const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY)

  const ESSAY_ROOM_ID = '01c240c3-9b94-472f-953b-d27584749008'
  const CHANNEL = 'main'

  let currentUser = null
  let realtimeChannel = null
  let pollTimer = null

  // ── Toast ───────────────────────────────────────────────────────────────────
  let toastTimer = null
  function showToast(text) {
    const el = document.getElementById('toast')
    el.textContent = text
    el.classList.add('show')
    clearTimeout(toastTimer)
    toastTimer = setTimeout(() => el.classList.remove('show'), 3000)
  }

  // ── Init: require a session (shared across speak2go.ai origin) ────────────────
  async function init() {
    if (!window.supabase) {
      document.getElementById('bootScreen').textContent = 'Supabase SDK 加载失败，请刷新页面。'
      return
    }
    const { data: { session } } = await sb.auth.getSession()
    if (!session) {
      // No session → go to login, bind essay system + come back here after login
      window.location.href = '/Codex-speak2go/login.html?system=essay'
      return
    }
    currentUser = session.user

    // Display name (profiles.display_name → fallback to user_metadata → email)
    let displayName = ''
    try {
      const { data: profile } = await sb
        .from('profiles')
        .select('display_name')
        .eq('user_id', currentUser.id)
        .maybeSingle()
      displayName = (profile?.display_name || '').trim()
    } catch (e) { /* ignore */ }
    if (!displayName) displayName = currentUser.user_metadata?.display_name || currentUser.email || '我'
    document.getElementById('userName').textContent = displayName

    // Self-join room_members (idempotent; 23505 = already a member → fine)
    try {
      const { error } = await sb.from('room_members').insert({
        room_id: ESSAY_ROOM_ID, user_id: currentUser.id,
      })
      if (error && error.code !== '23505') {
        console.warn('[room_members self-join]', error)
      }
    } catch (e) { console.warn('[room_members self-join]', e) }

    document.getElementById('bootScreen').style.display = 'none'
    document.getElementById('appLayout').style.display = 'flex'

    await loadMessages()
    subscribeRoom()
    startPolling()

    document.getElementById('essayInput').focus()
  }

  // ── Render helpers ────────────────────────────────────────────────────────────
  function fmtDate(iso) {
    if (!iso) return ''
    const d = new Date(iso)
    if (isNaN(d)) return ''
    const pad = n => String(n).padStart(2, '0')
    return `${d.getMonth() + 1}/${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`
  }

  // Strip the trailing ```essay-score {...}``` block from rendered markdown,
  // and return { score, band } if present.
  function parseScoreTrailer(content) {
    if (typeof content !== 'string') return { cleaned: content, score: null, band: null }
    const re = /```essay-score\s*([\s\S]*?)```/i
    const m = content.match(re)
    if (!m) return { cleaned: content, score: null, band: null }
    let score = null, band = null
    try {
      const obj = JSON.parse(m[1].trim())
      if (typeof obj.score === 'number') score = obj.score
      if (obj.band != null) band = String(obj.band)
    } catch (e) { /* malformed trailer → just hide it */ }
    const cleaned = content.replace(re, '').trim()
    return { cleaned, score, band }
  }

  function bubbleHtmlForAi(content) {
    const { cleaned } = parseScoreTrailer(content)
    if (window.marked) {
      try { return marked.parse(cleaned) } catch (e) { /* fall through */ }
    }
    const div = document.createElement('div')
    div.textContent = cleaned
    return div.innerHTML
  }

  function isThinkingPlaceholder(content) {
    return content === '...' || content === '…'
  }

  function renderMsg(msg) {
    // skip hidden/system messages
    if (!msg || msg.content === '__SYS_ADVANCE_QUIZ__' || msg.content === '__SYS_TRANSLATE__') return
    if (msg.content === '__VOICE_INPUT__' || msg.message_type === 'voice_input') return

    const list = document.getElementById('messagesList')
    const empty = list.querySelector('.empty')
    if (empty) empty.remove()

    let el = list.querySelector(`[data-msg-id="${msg.id}"]`)
    const isAi = msg.role === 'ai'
    const isNew = !el
    if (!el) {
      el = document.createElement('div')
      el.className = 'msg ' + (isAi ? 'ai' : 'user')
      el.dataset.msgId = msg.id
      el.innerHTML = `<div class="msg-head"></div><div class="bubble"></div>`
      list.appendChild(el)
    }
    const head = el.querySelector('.msg-head')
    const bubble = el.querySelector('.bubble')

    head.innerHTML = `<span>${isAi ? '🤖 AI 助手' : '🖊 ' + escapeHtml(myName())}</span><span class="msg-time">${fmtDate(msg.created_at)}</span>`

    if (isAi) {
      if (isThinkingPlaceholder(msg.content)) {
        bubble.className = 'bubble thinking'
        bubble.textContent = 'AI 正在批改中…'
      } else {
        bubble.className = 'bubble'
        bubble.innerHTML = bubbleHtmlForAi(msg.content)
      }
    } else {
      bubble.className = 'bubble'
      bubble.textContent = msg.content
    }
    return isNew
  }

  function myName() {
    return document.getElementById('userName').textContent || '我'
  }
  function escapeHtml(s) {
    const d = document.createElement('div'); d.textContent = s == null ? '' : s; return d.innerHTML
  }

  function scrollToBottom() {
    const list = document.getElementById('messagesList')
    list.scrollTop = list.scrollHeight
  }

  // ── Progress sidebar (parse essay-score trailers from graded AI messages) ──────
  const progressByMsgId = {}
  function updateProgress(msg) {
    if (!msg || msg.role !== 'ai') return
    const { score, band } = parseScoreTrailer(msg.content)
    if (score == null) { delete progressByMsgId[msg.id]; }
    else progressByMsgId[msg.id] = { score, band, at: msg.created_at }
    renderProgress()
  }
  function renderProgress() {
    const box = document.getElementById('progList')
    const items = Object.values(progressByMsgId).sort((a, b) => new Date(a.at) - new Date(b.at))
    if (!items.length) {
      box.innerHTML = '<div class="prog-empty">提交作文后，这里会记录每篇的得分与日期。</div>'
      return
    }
    box.innerHTML = items.map((it, i) =>
      `<div class="prog-item"><span><span class="prog-score">${it.score}</span>${it.band ? `<span class="prog-band">${escapeHtml(it.band)}</span>` : ''}</span><span class="prog-date">第${i + 1}篇 · ${fmtDate(it.at)}</span></div>`
    ).join('')
  }

  // ── Load existing messages ─────────────────────────────────────────────────────
  async function loadMessages() {
    const list = document.getElementById('messagesList')
    const { data: msgs, error } = await sb
      .from('messages')
      .select('*')
      .eq('room_id', ESSAY_ROOM_ID)
      .eq('channel', CHANNEL)
      .order('created_at', { ascending: true })

    if (error) { showToast('加载消息失败：' + (error.message || '')); return }
    list.innerHTML = ''
    if (!msgs || !msgs.length) {
      list.innerHTML = `<div class="empty"><div class="big">✍️</div>欢迎来到英文作文批改室。<br>把你的作文粘贴到下方，点「提交批改」，<br>AI 会给出五维评分、逐句修改和高分改写。</div>`
    } else {
      msgs.forEach(m => { renderMsg(m); updateProgress(m) })
    }
    scrollToBottom()
  }

  // ── Realtime ───────────────────────────────────────────────────────────────────
  function subscribeRoom() {
    if (realtimeChannel) sb.removeChannel(realtimeChannel)
    realtimeChannel = sb
      .channel(`essay-room-${ESSAY_ROOM_ID}`)
      .on('postgres_changes', {
        event: 'INSERT', schema: 'public', table: 'messages',
        filter: `room_id=eq.${ESSAY_ROOM_ID}`,
      }, payload => handleIncoming(payload.new))
      .on('postgres_changes', {
        event: 'UPDATE', schema: 'public', table: 'messages',
        filter: `room_id=eq.${ESSAY_ROOM_ID}`,
      }, payload => handleIncoming(payload.new))
      .subscribe()
  }

  function handleIncoming(row) {
    if (!row || (row.channel || 'main') !== CHANNEL) return
    const isNew = renderMsg(row)
    updateProgress(row)
    if (isNew || row.role === 'ai') scrollToBottom()
  }

  // Polling fallback (every 8s) — backfills if Realtime drops a push.
  function startPolling() {
    clearInterval(pollTimer)
    pollTimer = setInterval(async () => {
      const { data, error } = await sb
        .from('messages').select('*')
        .eq('room_id', ESSAY_ROOM_ID).eq('channel', CHANNEL)
        .order('created_at', { ascending: false }).limit(30)
      if (error || !data) return
      data.slice().reverse().forEach(m => { renderMsg(m); updateProgress(m) })
    }, 8000)
  }

  // ── Submit essay → INSERT user message → trigger chat2go-ingest ────────────────
  async function submitEssay() {
    const input = document.getElementById('essayInput')
    const content = input.value.trim()
    if (!content) { showToast('请先写/粘贴作文'); return }

    const btn = document.getElementById('submitBtn')
    btn.disabled = true; btn.textContent = '提交中…'

    // 1. INSERT the student's essay (role=user, channel=main)
    const { data: msgData, error } = await sb.from('messages').insert({
      room_id: ESSAY_ROOM_ID,
      user_id: currentUser.id,
      role: 'user',
      channel: CHANNEL,
      content,
      attachments: [],
    }).select().single()

    if (error) {
      console.error('insert essay failed:', error)
      showToast('提交失败：' + (error.message || error.details || '').slice(0, 100))
      btn.disabled = false; btn.textContent = '提交批改'
      return
    }

    input.value = ''
    renderMsg(msgData)
    scrollToBottom()

    // 2. Trigger chat2go-ingest (serverless room → Edge Fn inserts AI placeholder,
    //    Modal worker grades with '英文作文' industry prompt, UPDATEs placeholder → Realtime)
    try {
      await triggerChat2goIngest(ESSAY_ROOM_ID, msgData.id, CHANNEL)
    } catch (err) {
      console.warn('[chat2go-ingest] trigger failed:', err)
      showToast('AI 触发失败：' + (err?.message ?? err).toString().slice(0, 80))
    }

    btn.disabled = false; btn.textContent = '提交批改'
    input.focus()
  }

  async function triggerChat2goIngest(roomId, messageId, channel) {
    const { data: { session } } = await sb.auth.getSession()
    const token = session?.access_token || SUPABASE_ANON_KEY
    const resp = await fetch(`${SUPABASE_URL}/functions/v1/chat2go-ingest`, {
      method: 'POST',
      headers: {
        'authorization': `Bearer ${token}`,
        'apikey': SUPABASE_ANON_KEY,
        'content-type': 'application/json',
      },
      body: JSON.stringify({ room_id: roomId, message_id: messageId, channel }),
    })
    if (!resp.ok) {
      const txt = await resp.text().catch(() => '')
      throw new Error(`HTTP ${resp.status} ${txt.slice(0, 200)}`)
    }
    return resp.json()
  }

  // ⌘/Ctrl + Enter to submit
  document.addEventListener('keydown', e => {
    if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') {
      const ae = document.activeElement
      if (ae && ae.id === 'essayInput') { e.preventDefault(); submitEssay() }
    }
  })

  // Boot
  init().catch(e => {
    console.error('init failed:', e)
    document.getElementById('bootScreen').textContent = '初始化失败：' + (e?.message || e)
  })
  </script>
</body></html>
