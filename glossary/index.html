  const fb = '<span class="' + (g.score >= 60 ? 'fb-ok' : 'fb-bad') + '">' + g.rank + ' · ' + g.score + ' 分</span>' + reasons;
  quizShowNext(fb);
}

/* ---------- 结果页 ---------- */
// 把本次测验成绩按词写进各自单词卡的历史(带时间戳),后续卡片里能看到"做题记录"
function recordQuizHistory(qs) {
  const at = Date.now();
  qs.words.forEach((w, i) => {
    const entry = {
      at,
      d: qs.scores.dictation[i] != null ? qs.scores.dictation[i] : null,
      p: qs.scores.phonics[i] != null ? qs.scores.phonics[i] : null,
      s: qs.scores.sentence[i] != null ? qs.scores.sentence[i] : null,
    };
    // 写进所有含该词的分类卡片(题库按 en 去重抽题,同名词跨分类共享同一份做题记录)
    const enL = (w.en || '').toLowerCase();
    const keys = new Set([w.catId + '::' + w.en]);
    DATA.forEach(cat => { getMergedTerms(cat).forEach(t => { if ((t[0] || '').toLowerCase() === enL) keys.add(cat.id + '::' + t[0]); }); });
    keys.forEach(key => {
      const edit = Object.assign({}, state.edits[key] || {});
      const log = Array.isArray(edit.quizLog) ? edit.quizLog.slice() : [];
      log.push(entry);
      if (log.length > 20) log.splice(0, log.length - 20);   // 只留最近 20 次
      edit.quizLog = log;
      state.edits[key] = edit;
    });
  });
  save();
  // 重渲当前可见的相关卡片,让"做题记录"立刻出现(不在编辑态的才动)
  document.querySelectorAll('.term:not(.is-editing)').forEach(card => {
    if (card.dataset.id) renderCardContent(card);
  });
}

function finishQuiz() {
  const qs = quizState;
  if (!qs || qs.finished) return;   // 幂等:结果页只结算一次(防回车重复推进艾宾浩斯/重复写做题记录)
  qs.finished = true;
  qs.awaitingNext = false;
  practiceState = null;

  // ── 复习模式:按默写对错推进艾宾浩斯阶段(对=升级 pass,错=降级,重排 due)──
  if (qs.reviewMode) {
    let passed = 0, valid = 0; const missed = [];
    qs.words.forEach((w, i) => {
      const arr = state.userTerms[w.catId] || [];
      const t = arr.find(x => (x.en || '').toLowerCase() === w.en.toLowerCase());
      if (!t) return;   // 查不到对应 userTerm 的词不计入分母(否则 passed/n 口径不一致)
      valid++;
      const correct = (qs.scores.dictation[i] || 0) >= 100;
      if (correct) { t.review_stage = Math.min((t.review_stage || 0) + 1, 6); passed++; }
      else { t.review_stage = Math.max((t.review_stage || 0) - 1, 0); missed.push(w); }
      const stg = Math.min(t.review_stage, QUIZ_REVIEW_INTERVALS.length - 1);
      t.next_due_at = Date.now() + QUIZ_REVIEW_INTERVALS[stg];
    });
    recordQuizHistory(qs);   // 复习也留做题记录(只有默写分,p/s 记 null)
    save();
    try { localStorage.removeItem('glossary-review-queue'); } catch (e) {}
    if (!valid) valid = qs.n;   // 兜底:全查不到时仍显示总数,避免 0/0
    qbPhase.textContent = '复习完成'; qbProg.textContent = ''; qbScore.textContent = ''; qbFill.style.width = '100%';
    quizBody.innerHTML =
      '<div class="quiz-result">' +
        '<div class="qr-rank ' + (passed === valid ? 's' : passed >= valid * 0.6 ? 'a' : 'c') + '">' + passed + '/' + valid + '</div>' +
        '<div class="qr-total">复习完成 · 记住 ' + passed + ' 词</div>' +
        '<div class="qr-sub">记住的词复习阶段 +1,下次到期顺延;没记住的降级、很快再考</div>' +
        (missed.length
          ? '<div class="qr-wrong"><h4>还没记住 (' + missed.length + ')</h4>' +
              missed.map(w => '<div class="qr-w-item"><code>' + escapeHtml(w.en) + '</code> — ' + escapeHtml(w.zh) + '</div>').join('') +
            '</div>'
          : '<div class="qr-sub">全部记住 💯</div>') +
        '<div class="quiz-actions"><button class="ghost" data-action="quiz-close">完成 ✓</button></div>' +
      '</div>';
    return;
  }

  recordQuizHistory(qs);
  const dAvg = quizAvg(qs.scores.dictation);
  const pAvg = quizAvg(qs.scores.phonics);
  const sAvg = quizAvg(qs.scores.sentence);
  const total = Math.round((dAvg + pAvg + sAvg) / 3);
  const rank = quizRank(total);
  qbPhase.textContent = '完成';
  qbProg.textContent = '';
  qbScore.textContent = '';
  qbFill.style.width = '100%';
  const wrong = qs.words.filter((w, i) => (qs.scores.dictation[i] || 0) < 100);
  const bar = (label, v) =>
    '<div class="qr-bar-row"><div class="qr-bl"><span>' + label + '</span><span>' + Math.round(v) + '</span></div>' +
    '<div class="qr-bar-track"><div class="qr-bar-fill" style="width:' + Math.round(v) + '%"></div></div></div>';
  quizBody.innerHTML =
    '<div class="quiz-result">' +
      '<div class="qr-rank ' + rank.toLowerCase() + '">' + rank + '</div>' +
      '<div class="qr-total">总分 ' + total + ' / 100</div>' +
      '<div class="qr-sub">' + qs.n + ' 个词 · 默写 + 自然拼读 + 造句 三项平均</div>' +
      '<div class="qr-bars">' +
        bar('① 默写', dAvg) + bar('② 自然拼读', pAvg) + bar('③ 造句', sAvg) +
      '</div>' +
      (wrong.length
        ? '<div class="qr-wrong"><h4>默写没写对的词 (' + wrong.length + ')</h4>' +
            wrong.map(w => '<div class="qr-w-item"><code>' + escapeHtml(w.en) + '</code> — ' + escapeHtml(w.zh) + '</div>').join('') +
          '</div>'
        : '<div class="qr-sub">默写全对 💯</div>') +
      '<div class="quiz-actions">' +
        '<button data-action="quiz-restart">🔄 再来一组</button>' +
        '<button class="ghost" data-action="quiz-close">关闭</button>' +
      '</div>' +
    '</div>';
}

// quiz 专属动作(overlay 内委托;practice-* 仍由 main 委托处理)
if (quizOverlay) {
  quizOverlay.addEventListener('click', e => {
    const btn = e.target.closest('button[data-action]');
    if (!btn) return;
    const a = btn.dataset.action;
    if (a === 'quiz-submit-dict') { submitQuizDictation(); }
    else if (a === 'quiz-submit-sentence') { submitQuizSentence(); }
    else if (a === 'quiz-clear-dict') { const i = document.getElementById('quizDictInput'); if (i && !i.disabled) { i.value = ''; renderDictSlots(quizState.words[quizState.idx].en, ''); i.focus(); } }
    else if (a === 'quiz-play-ex') { const w = quizState.words[quizState.idx]; if (w) speakTerm(quizExampleSentence(w), btn); }
    else if (a === 'quiz-del-word') { quizDeleteWord(); }
    else if (a === 'quiz-next') { quizAdvance(); }
    else if (a === 'quiz-restart') { startQuiz(); }
    else if (a === 'quiz-close') { closeQuiz(true); }
  });
}
if (quizBtn) quizBtn.addEventListener('click', startQuiz);
if (quizCloseBtn) quizCloseBtn.addEventListener('click', () => closeQuiz(false));
// 单一 document 回车/Esc 处理器:每次按键只做「提交」或「进下一题」之一,
// 中文输入法 composition 跟踪:macOS 上 compositionend 常先于 keydown 触发,
// 单靠 e.isComposing / keyCode===229 会漏掉「选字确认」那一下回车 → 误提交。
// 加 compositionend 后的短时间窗兜底,覆盖两种事件顺序。
let _imeComposing = false, _imeEndAt = 0;
document.addEventListener('compositionstart', () => { _imeComposing = true; });
document.addEventListener('compositionend', () => { _imeComposing = false; _imeEndAt = Date.now(); });
function imeConfirmEnter(e) {
  return e.isComposing || e.keyCode === 229 || _imeComposing || (Date.now() - _imeEndAt < 150);
}

// e.repeat 守卫杀掉「按住回车自动重复」导致的级联跳题(修 答错就直接结束)
document.addEventListener('keydown', e => {
  if (!quizState) return;
  if (e.key === 'Escape') { closeQuiz(false); return; }   // 结果页 Esc 仍可关闭
  if (quizState.finished) return;   // 结果页停留:回车不再触发任何提交/推进(防重复结算)
  // 中文输入法 composition / 候选确认中:回车只确认输入,不当提交(否则填罗马音时选字回车会误提交)
  if (imeConfirmEnter(e)) return;
  if (e.key !== 'Enter' || e.repeat) return;
  e.preventDefault();
  if (quizState.awaitingNext) { quizAdvance(); return; }
  if (quizState.phase === 1) submitQuizDictation();
  else if (quizState.phase === 2) {
    // 拼读题:没切分也没填任何罗马音就回车 → 不结算(否则空 Enter 把该词锁成 0 分);仍可点「提交」显式交卷
    const ps = practiceState;
    const touched = ps && (((ps.playerRomaji || []).some(r => (r || '').trim())) || (typeof getPracticePlayerSyls === 'function' && getPracticePlayerSyls().length > 1));
    if (touched) submitPractice();
  }
  else if (quizState.phase === 3) submitQuizSentence();
});

function updateDelToggle() { /* 回收站 UI 已移除 — 删除即硬删除,此函数保留为空 stub 防外部调用 */ }

/* ============================================================
   PRACTICE MODE — inline mini-game per card
   ============================================================ */
const VOWELS = 'aeiouy';
const DIGRAPHS = ['ch','sh','th','ph','wh','ng','ck','qu','gh'];
const UNSTRESSED_PREFIXES = ['de','re','dis','pre','mis','ex','en','com','con','ob','be','sub'];

function syllabify(word) {
  const w = word.toLowerCase().replace(/[^a-z]/g, '');
  if (!w) return [];
  const groups = [];
  let cur = '', st = null;
  for (const ch of w) {
    const t = VOWELS.includes(ch) ? 'V' : 'C';
    if (st && t === st) cur += ch;
    else { if (cur) groups.push({t: st, s: cur}); cur = ch; st = t; }
  }
  if (cur) groups.push({t: st, s: cur});
  const syls = []; let buf = '';
  for (let i = 0; i < groups.length; i++) {
    const g = groups[i];
    if (g.t === 'V') { buf += g.s; }
    else {
      const next = groups[i+1];
      if (!next) buf += g.s;
      else if (!buf) buf = g.s;
      else if (g.s.length === 1) { syls.push(buf); buf = g.s; }
      else {
        const ending = g.s.slice(-2);
        if (DIGRAPHS.includes(ending) && g.s.length === 2) { syls.push(buf); buf = g.s; }
        else if (g.s.length >= 3 && DIGRAPHS.includes(g.s.slice(-2))) {
          buf += g.s.slice(0, -2); syls.push(buf); buf = g.s.slice(-2);
        } else { buf += g.s[0]; syls.push(buf); buf = g.s.slice(1); }
      }
    }
  }
  if (buf) syls.push(buf);
  if (syls.length >= 2) {
    const last = syls[syls.length-1];
    if (/^[bcdfghjklmnpqrstvwxz]e$/.test(last) || last === 'e') {
      syls[syls.length-2] += last; syls.pop();
    }
  }
  while (syls.length >= 2 && !/[aeiouy]/.test(syls[syls.length-1])) {
    syls[syls.length-2] += syls[syls.length-1]; syls.pop();
  }
  return syls.length ? syls : [w];
}

function pickStress(syls, full) {
  const n = syls.length;
  if (n <= 1) return 0;
  const lower = full.toLowerCase();
  if (n >= 3 && /(ity|ical|ically|opathy|ography|ology|onomy|ocracy)$/.test(lower)) return n - 3;
  if (n >= 3 && /(ate|ize|ise|ify)$/.test(lower)) return n - 3;
  if (/(tion|sion|cian|cial|tial|cious|tious|gious|ious|eous|ic|ial|ient|ience|graphy)$/.test(lower)) return Math.max(0, n - 2);
  if (/(ee|eer|ese|esque|ique|aire|oon|een)$/.test(lower)) return n - 1;
  if (n >= 2 && n <= 3 && UNSTRESSED_PREFIXES.includes(syls[0].toLowerCase())) return 1;
  if (n === 2) return 0;
  if (n === 3) return 0;
  return 1;
}

function parseStressFromIPA(ipa, maxIdx) {
  if (!ipa) return null;
  const inner = String(ipa).replace(/[\/\[\]]/g, '').trim();
  if (!inner.includes('ˈ')) return null;
  const before = inner.split('ˈ')[0];
  const clusters = before.match(/[aeiouɪɛæɑɒɔʊʌəɜɚyøœɨɯ]+/gi);
  const idx = clusters ? clusters.length : 0;
  return Math.min(idx, maxIdx);
}

/* Romaji 罗马注音 → stress index: 找全大写音节 */
function parseStressFromRomaji(romaji, maxIdx) {
  if (!romaji) return null;
  const parts = String(romaji).split(/[·\-\s\/]+/).filter(Boolean);
  if (parts.length === 0) return null;
  for (let i = 0; i < parts.length; i++) {
    const p = parts[i];
    if (/[A-Z]/.test(p) && p === p.toUpperCase()) {
      return Math.min(i, maxIdx);
    }
  }
  return null;
}

function syllablesToBounds(syls) {
  const bounds = []; let acc = 0;
  for (let i = 0; i < syls.length - 1; i++) { acc += syls[i].length; bounds.push(acc - 1); }
  return bounds;
}

function dictKey(en) { return String(en).toLowerCase().replace(/[^a-z]/g, ''); }
function lookupDict(en) {
  const dict = (typeof window !== 'undefined' && window.ROMAJI_DICT) || {};
  return dict[dictKey(en)] || null;
}

let practiceState = null;

function closePractice() {
  if (!practiceState) return;
  if (typeof practiceState._shadowCleanup === 'function') { try { practiceState._shadowCleanup(); } catch (e) {} }  // 停跟读麦/解绑
  if (practiceState.card) practiceState.card.classList.remove('is-practicing');
  if (practiceState.drawer && practiceState.drawer.parentNode) {
    practiceState.drawer.parentNode.removeChild(practiceState.drawer);
  }
  practiceState = null;
}

// 从 en + 词数据算出参考音节切分 / 重音 / 罗马音(openPractice + 测验共用)
function buildPracticeAnswer(en, d) {
  const dictEntry = lookupDict(en);
  let answerSyls, answerRomaji, answerStressIdx, answerSource;
  if (dictEntry) {
    answerSyls = dictEntry.syls.slice();
    answerRomaji = dictEntry.romaji.slice();
    answerStressIdx = dictEntry.romaji.findIndex(r => r === r.toUpperCase() && /[A-Z]/.test(r));
    if (answerStressIdx < 0) answerStressIdx = 0;
    answerSource = 'dict';
  } else {
    answerSyls = syllabify(en);
    const ph = (d && d.phonetic) || '';
    const romajiIdx = parseStressFromRomaji(ph, answerSyls.length - 1);
    const ipaIdx = parseStressFromIPA(ph, answerSyls.length - 1);
    answerStressIdx = (romajiIdx !== null) ? romajiIdx
                    : (ipaIdx !== null) ? ipaIdx
                    : pickStress(answerSyls, en);
    answerRomaji = answerSyls.map((s, i) => i === answerStressIdx ? s.toUpperCase() : s.toLowerCase());
    answerSource = (romajiIdx !== null) ? 'romaji'
                 : (ipaIdx !== null) ? 'ipa'
                 : 'heuristic';
  }
  return { answerSyls, answerRomaji, answerStressIdx, answerSource };
}

function openPractice(card) {
  closePractice();
  const id = card.dataset.id;
  const [catId, en] = id.split('::');
  const d = getTermData(catId, en);
  if (!d) return;
  const { answerSyls, answerRomaji, answerStressIdx, answerSource } = buildPracticeAnswer(en, d);
  practiceState = {
    card, id, catId, en,
    letters: en.split(''),
    answerSyls, answerRomaji, answerStressIdx, answerSource,
    answerBounds: syllablesToBounds(answerSyls),
    playerBounds: new Set(), playerStressIdx: -1, playerRomaji: [],
    submitted: false,
    phonicsScore: null, sentenceScore: null, shadowScore: null   // 本轮总分用:拼读 / 造句 / 跟读(开抽屉清零)
  };
  const drawer = document.createElement('div');
  drawer.className = 'practice-drawer';
  drawer.style.gridColumn = '1 / -1';
  drawer.innerHTML =
    '<div class="practice-head">' +
      '<span class="practice-title">🎮 练:<strong>' + escapeHtml(en) + '</strong></span>' +
      '<button class="practice-close" data-action="practice-close" aria-label="关闭">×</button>' +
    '</div>' +
    '<div class="practice-step">① 点字母之间的 · 切音节<span style="opacity:0.6;font-weight:400;margin-left:8px;">(单音节词点最后那个 · = 整段 1 音节)</span></div>' +
    '<div class="practice-letters" data-role="letters"></div>' +
    '<div class="practice-step">② 点音节卡标重音 (金色) · ③ 填罗马音</div>' +
    '<div class="practice-preview" data-role="preview"></div>' +
    '<div class="practice-actions">' +
      '<button class="primary" data-action="practice-submit">▶ 提交</button>' +
      '<button data-action="practice-reset">↻ 重切</button>' +
    '</div>' +
    '<div class="practice-result" data-role="result" style="display:none;"></div>' +
    buildSentenceSectionHtml(en, d.zh, d.sentences) +
    '<div class="practice-shadow drawer-shadow" data-role="shadow-section">' +
      '<div class="practice-step" style="margin-top:0;">⑤ 跟读 — 听原声 → 复述 → 比对</div>' +
      '<div class="sh-target" data-role="target"></div>' +
      '<div class="sh-you" data-role="you"></div>' +
      '<div class="sh-score" data-role="score"></div>' +
      '<div class="sh-foot" style="display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;">' +
        '<button type="button" data-act="replay">🔊 原句</button>' +
        '<button type="button" class="im-go" data-act="rec">🎙 开始说</button>' +
        '<button type="button" data-act="replay-me" disabled>🔊 我说的</button>' +
      '</div>' +
    '</div>' +
    '<div class="practice-mastery" data-role="mastery" style="display:none;"></div>';
  card.parentNode.insertBefore(drawer, card.nextSibling);
  card.classList.add('is-practicing');
  practiceState.drawer = drawer;
  renderPracticeLetters();
  renderPracticePreview();
  // ⑤ 跟读内嵌:分数回传本轮总分(后台累加)
  const shadowSec = drawer.querySelector('[data-role="shadow-section"]');
  if (shadowSec) renderShadow(shadowSec, catId, en, {
    spaceHold: false, autoplay: false, modal: false,
    onScore: pct => { if (practiceState) { practiceState.shadowScore = Math.max(practiceState.shadowScore || 0, pct); checkPracticeMastery(); } }
  });
  drawer.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function renderPracticeLetters() {
  if (!practiceState) return;
  const row = practiceState.drawer.querySelector('[data-role="letters"]');
  row.innerHTML = '';
  practiceState.letters.forEach((ch, i) => {
    const letterEl = document.createElement('span');
    letterEl.className = 'p-letter';
    letterEl.textContent = ch;
    row.appendChild(letterEl);
    // 每个字母后都加 · gap(包括最后字母),让单音节词(如 said)能点最后 · 标记 1 段
    // getPracticePlayerSyls L1647 已用 `i < length - 1` 过滤最后 gap,不会切出空段
    const gap = document.createElement('button');
    const active = practiceState.playerBounds.has(i);
    gap.className = 'p-gap' + (active ? ' active' : '');
    gap.textContent = active ? '|' : '·';
    gap.dataset.action = 'practice-split';
    gap.dataset.i = i;
    gap.disabled = practiceState.submitted;
    gap.tabIndex = -1;  // Tab 跳过,只在罗马音输入框间循环
    row.appendChild(gap);
  });
}

function getPracticePlayerSyls() {
  const ps = practiceState;
  const sorted = [...ps.playerBounds].sort((a, b) => a - b);
  const syls = [];
  let cur = '';
  for (let i = 0; i < ps.letters.length; i++) {
    cur += ps.letters[i];
    if (sorted.includes(i) && i < ps.letters.length - 1) { syls.push(cur); cur = ''; }
  }
  if (cur) syls.push(cur);
  return syls;
}

function renderPracticePreview() {
  if (!practiceState) return;
  const preview = practiceState.drawer.querySelector('[data-role="preview"]');
  preview.innerHTML = '';
  const syls = getPracticePlayerSyls();
  if (syls.length === 1 && practiceState.playerBounds.size === 0) {
    const hint = document.createElement('div');
    hint.className = 'p-hint';
    hint.textContent = '先切分上面的字母 (' + practiceState.letters.length + ' 个字母)';
    preview.appendChild(hint);
    return;
  }
  syls.forEach((s, i) => {
    const slot = document.createElement('div');
    slot.className = 'p-slot';
    const sylBtn = document.createElement('button');
    sylBtn.className = 'p-syl' + (i === practiceState.playerStressIdx ? ' stress' : '');
    sylBtn.textContent = s;
    sylBtn.dataset.action = 'practice-stress';
    sylBtn.dataset.i = i;
    sylBtn.disabled = practiceState.submitted;
    sylBtn.tabIndex = -1;  // Tab 跳过音节卡,只在罗马音输入框间循环
    const input = document.createElement('input');
    input.type = 'text';
    input.className = 'p-romaji';
    input.placeholder = '罗马音';
    input.value = practiceState.playerRomaji[i] || '';
    input.disabled = practiceState.submitted;
    input.autocomplete = 'off';
    input.spellcheck = false;
    input.oninput = e => { practiceState.playerRomaji[i] = e.target.value; };
    input.onkeydown = e => { if (e.key === 'Enter' && !imeConfirmEnter(e) && !(practiceState && practiceState.quizMode)) { e.preventDefault(); submitPractice(); } };
    slot.appendChild(sylBtn);
    slot.appendChild(input);
    preview.appendChild(slot);
  });
}

// 纯算分:从 practiceState 算出拼读得分(测验 + 单卡片共用)
// 拼读算分(满分 100):切分 50 + 罗马音 30(逐音节大小写不敏感)+ 重音 20
// 切对 + 罗马音对(没标重音)= 80(A);再标对重音 = 100(S)
function computePracticeScore(ps) {
  const playerSyls = getPracticePlayerSyls();
  const playerBounds = syllablesToBounds(playerSyls);
  const aSet = new Set(ps.answerBounds);
  const pSet = new Set(playerBounds);
  const correctBounds = [...pSet].filter(b => aSet.has(b));
  const extraBounds = [...pSet].filter(b => !aSet.has(b));
  const missedBounds = [...aSet].filter(b => !pSet.has(b));
  // ① 切分(满分 50):全对 50;按 (正确边界 - 0.5×多切) / 应有边界 给;单音节不切=对
  let splitRatio;
  if (ps.answerBounds.length === 0) splitRatio = (playerBounds.length === 0) ? 1 : 0;
  else splitRatio = (correctBounds.length - extraBounds.length * 0.5) / ps.answerBounds.length;
  splitRatio = Math.max(0, Math.min(1, splitRatio));
  const splitPoints = Math.round(splitRatio * 50);
  // ② 罗马音(满分 30):逐音节大小写不敏感比对(切分音节按位对齐)
  let romajiCorrect = 0;
  const romajiTotal = ps.answerSyls.length || 1;
  for (let i = 0; i < ps.answerSyls.length; i++) {
    const typed = (ps.playerRomaji[i] || '').trim().toLowerCase();
    const ref = (ps.answerRomaji[i] || '').trim().toLowerCase();
    if (typed && ref && typed === ref) romajiCorrect++;
  }
  const romajiPoints = Math.round((romajiCorrect / romajiTotal) * 30);
  // ③ 重音(满分 20)
  // 单音节词(≤1 音节)重音落在唯一音节上是必然的,不要求用户点、也不扣分 → 直接算对
  const stressOK = (playerSyls.length === ps.answerSyls.length) &&
                   (ps.answerSyls.length <= 1 || ps.playerStressIdx === ps.answerStressIdx);
  const stressPoints = stressOK ? 20 : 0;
  const total = Math.max(0, Math.min(100, splitPoints + romajiPoints + stressPoints));
  const ratio = total / 100;
  let rank = 'D';
  if (ratio >= 0.95) rank = 'S';
  else if (ratio >= 0.80) rank = 'A';
  else if (ratio >= 0.60) rank = 'B';
  else if (ratio >= 0.40) rank = 'C';
  return { playerSyls, correctBounds, extraBounds, missedBounds, splitPoints,
           stressOK, stressPoints, romajiCorrect, romajiTotal, romajiPoints, total, maxPossible: 100, ratio, rank };
}

function submitPractice() {
  if (!practiceState || practiceState.submitted) return;
  practiceState.submitted = true;
  const ps = practiceState;
  const sc = computePracticeScore(ps);
  const { playerSyls, correctBounds, extraBounds, missedBounds, splitPoints,
          stressOK, stressPoints, romajiCorrect, romajiTotal, romajiPoints, total, ratio, rank } = sc;

  // 测验模式:算完分交给回调推进,不渲染单卡片结果
  if (ps.quizMode && typeof ps.onScored === 'function') {
    renderPracticeLetters();
    renderPracticePreview();
    ps.onScored(sc);
    return;
  }

  renderPracticeLetters();
  renderPracticePreview();

  const result = ps.drawer.querySelector('[data-role="result"]');
  result.style.display = '';
  const yourCardsHtml = playerSyls.map((s, i) => {
    const isExact = ps.answerSyls[i] && s.toLowerCase() === ps.answerSyls[i].toLowerCase();
    // 单音节词唯一音节自动算重音(跟评分一致),不需要用户点
    const isStress = (ps.answerSyls.length <= 1 && playerSyls.length === 1) ? (i === 0) : (i === ps.playerStressIdx);
    const cls = ['p-rc-syl'];
    if (isExact) cls.push('match');
    if (isStress) cls.push('stress');
    if (isStress && !stressOK) cls.push('miss');
    const txt = (ps.playerRomaji[i] || '').trim();
    const romaji = txt ? escapeHtml(txt) : '—';
    return '<div class="p-rc-slot"><div class="' + cls.join(' ') + '">' + escapeHtml(s) + '</div><div class="p-rc-romaji">' + romaji + '</div></div>';
  }).join('');
  const answerCardsHtml = ps.answerSyls.map((s, i) => {
    const cls = ['p-rc-syl'];
    if (i === ps.answerStressIdx) cls.push('stress');
    return '<div class="p-rc-slot"><div class="' + cls.join(' ') + '">' + escapeHtml(s) + '</div><div class="p-rc-romaji answer">' + escapeHtml(ps.answerRomaji[i]) + '</div></div>';
  }).join('');
  const sourceLabel = ps.answerSource === 'dict'   ? '字典' :
                      ps.answerSource === 'romaji' ? '依据你填的注音' :
                      ps.answerSource === 'ipa'    ? '依据你填的 IPA' :
                                                     '启发式估算';
  const rows = [];
  rows.push('<div class="p-rb-row"><span>切分 ' + correctBounds.length + '/' + ps.answerBounds.length + (extraBounds.length ? ' · 多切 ×' + extraBounds.length : '') + '</span><span class="pos">+' + splitPoints + '/50</span></div>');
  rows.push('<div class="p-rb-row"><span>罗马音 ' + romajiCorrect + '/' + romajiTotal + ' (不分大小写)</span><span class="pos">+' + romajiPoints + '/30</span></div>');
  rows.push('<div class="p-rb-row"><span>重音 ' + (stressOK ? '✓' : '✗') + '</span><span class="' + (stressOK ? 'pos' : '') + '">+' + stressPoints + '/20</span></div>');
  rows.push('<div class="p-rb-row total"><span>TOTAL</span><span>' + total + '</span></div>');

  result.innerHTML =
    '<div class="p-rc-rank ' + rank.toLowerCase() + '">' + rank + '</div>' +
    '<div class="p-rc-score">SCORE ' + total + '</div>' +
    '<div class="p-rc-section">' +
      '<div class="p-rc-label">你的拆分</div>' +
      '<div class="p-rc-cards">' + yourCardsHtml + '</div>' +
    '</div>' +
    '<div class="p-rc-section">' +
      '<div class="p-rc-label">参考答案 <span class="p-rc-src">· ' + sourceLabel + '</span></div>' +
      '<div class="p-rc-cards">' + answerCardsHtml + '</div>' +
    '</div>' +
    '<div class="p-rc-breakdown">' + rows.join('') + '</div>' +
    '<div class="p-rc-actions">' +
      '<button data-action="practice-retry">↻ 再试</button>' +
      '<button data-action="practice-close">完成</button>' +
    '</div>';
  ps.phonicsScore = total;          // 本轮拼读分(0-100),凑本轮总分
  checkPracticeMastery();
  result.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function resetPractice() {
  if (!practiceState) return;
  practiceState.playerBounds = new Set();
  practiceState.playerStressIdx = -1;
  practiceState.playerRomaji = [];
  practiceState.submitted = false;
  const result = practiceState.drawer.querySelector('[data-role="result"]');
  if (result) result.style.display = 'none';
  renderPracticeLetters();
  renderPracticePreview();
}

// Chinese hint click — show English equivalent inline (mobile-friendly tooltip)
main.addEventListener('click', e => {
  const hint = e.target.closest('.cn-hint');
  if (hint && !e.target.closest('button')) {
    e.stopPropagation();
    const en = hint.dataset.en;
    if (en) {
      const old = hint.querySelector('.cn-tip');
      if (old) { old.remove(); return; }
      // Clear any other tips first
      document.querySelectorAll('.cn-tip').forEach(t => t.remove());
      const tip = document.createElement('span');
      tip.className = 'cn-tip';
      tip.textContent = en;
      hint.appendChild(tip);
      setTimeout(() => { if (tip.parentNode) tip.remove(); }, 3500);
    }
    return;
  }
});

main.addEventListener('click', e => {
  const btn = e.target.closest('button[data-action]');
  if (!btn) return;
  const action = btn.dataset.action;

  // practice mode actions (some have no card data-id, some do)
  if (action === 'practice-close') { closePractice(); return; }
  if (action === 'practice-submit') { submitPractice(); return; }
  if (action === 'practice-reset' || action === 'practice-retry') { resetPractice(); return; }
  if (action === 'practice-split') {
    if (!practiceState || practiceState.submitted) return;
    const i = parseInt(btn.dataset.i, 10);
    if (practiceState.playerBounds.has(i)) practiceState.playerBounds.delete(i);
    else practiceState.playerBounds.add(i);
    practiceState.playerStressIdx = -1;
    renderPracticeLetters();
    renderPracticePreview();
    return;
  }
  if (action === 'practice-stress') {
    if (!practiceState || practiceState.submitted) return;
    const i = parseInt(btn.dataset.i, 10);
    practiceState.playerStressIdx = (practiceState.playerStressIdx === i) ? -1 : i;
    renderPracticePreview();
    return;
  }

  // add-term flow doesn't have a card data-id — 全自动:输入词 → 联网生成完整词卡 → 加入
  if (action === 'add-auto') {
    const form = btn.closest('form');
    const catId = btn.dataset.cat;
    const q = form.querySelector('[name=q]').value.trim();
    const statusEl = form.querySelector('[data-role=add-status]');
    if (!q) { form.querySelector('[name=q]').focus(); return; }
    btn.disabled = true;
    const orig = btn.textContent; btn.textContent = '🔍 查词中…';
    autoLookupAddTerm(catId, q, html => { if (statusEl) statusEl.innerHTML = html; }).then(ok => {
      btn.disabled = false; btn.textContent = orig;
      // 成功:autoLookupAddTerm 已重渲该分类(表单随之消失);失败留着让用户改词重试
    });
    return;
  }
  // 错题卡里的生词 → 一键联网生成词卡加入(silent:不打断当前做题视图)
  if (action === 'grab-word') {
    const w = btn.dataset.w;
    const cid = btn.dataset.cat;
    if (!w || !cid || btn.disabled) return;
    btn.disabled = true;
    const orig = btn.textContent;
    btn.textContent = '…';
    autoLookupAddTerm(cid, w, function(){}, { silent: true }).then(ok => {
      if (ok) { btn.textContent = '✓ ' + w; btn.classList.add('done'); }
      else { btn.textContent = orig; btn.disabled = false; }
    });
    return;
  }
  // 整组胶囊:重命名
  if (action === 'cat-rename') {
    const catId = btn.dataset.cat;
    const cat = DATA.find(c => c.id === catId);
    if (!cat) return;
    const name = prompt('重命名这一组胶囊:', cat.title);
    if (name == null) return;
    const t = name.trim();
    if (!t) return;
    cat.title = t;
    // 持久化表名覆盖(内置 + 动态通用,刷新后仍生效)
    try {
      const map = JSON.parse(localStorage.getItem('glossary-cat-titles') || '{}');
      map[catId] = t;
      localStorage.setItem('glossary-cat-titles', JSON.stringify(map));
    } catch (err) {}
    try {
      const dyn = JSON.parse(localStorage.getItem('glossary-dynamic-cats') || '[]');
      const e = dyn.find(c => c.id === catId);
      if (e) { e.title = t; localStorage.setItem('glossary-dynamic-cats', JSON.stringify(dyn)); }
    } catch (err) {}
    updateCatNavCount(catId);                 // 刷新顶部 tab 文字
    // renderCategorySection 内部已 remove 旧 section,直接 insertBefore 重新插入
    const ns = renderCategorySection(cat);
    if (noResults && main) main.insertBefore(ns, noResults);
    if (document.body.dataset.activeCat === catId) ns.classList.add('active-cat');
    applySearch();
    return;
  }
  // 整组胶囊:删除整组(词 + 音标/笔记/删除/收藏 + tab + section)
  if (action === 'cat-del') {
    const catId = btn.dataset.cat;
    const cat = DATA.find(c => c.id === catId);
    if (!cat) return;
    const n = (state.userTerms[catId] || []).length;
    if (!confirm('删除整组「' + cat.title + '」?组内 ' + n + ' 个词会一起删除,不可恢复。')) return;
    delete state.userTerms[catId];
    [...state.deleted].forEach(id => { if (id.startsWith(catId + '::')) state.deleted.delete(id); });
    [...state.favorites].forEach(id => { if (id.startsWith(catId + '::')) state.favorites.delete(id); });
    Object.keys(state.edits).forEach(k => { if (k.startsWith(catId + '::')) delete state.edits[k]; });
    const di = DATA.findIndex(c => c.id === catId);
    if (di >= 0) DATA.splice(di, 1);
    try {
      const dyn = JSON.parse(localStorage.getItem('glossary-dynamic-cats') || '[]').filter(c => c.id !== catId);
      localStorage.setItem('glossary-dynamic-cats', JSON.stringify(dyn));
    } catch (err) {}
    // 记入已删名单 — 内置表写死在源码,靠这个名单刷新后仍保持删除
    try {
      const dead = JSON.parse(localStorage.getItem('glossary-deleted-cats') || '[]');
      if (!dead.includes(catId)) dead.push(catId);
      localStorage.setItem('glossary-deleted-cats', JSON.stringify(dead));
    } catch (err) {}
    // 清掉改过的表名,避免日后同 id 复用时残留旧名
    try {
      const tm = JSON.parse(localStorage.getItem('glossary-cat-titles') || '{}');
      if (tm[catId]) { delete tm[catId]; localStorage.setItem('glossary-cat-titles', JSON.stringify(tm)); }
    } catch (err) {}
    save();
    const navA = catsNav.querySelector('a[data-cat="' + catId + '"]'); if (navA) navA.remove();
    const sec = document.getElementById('cat-' + catId); if (sec) sec.remove();
    const first = DATA[0]; if (first) setActiveCat(first.id);
    rebuildFavorites();
    return;
  }
  // 新建表:建一个空的动态胶囊,渲染 tab + section 并切过去
  if (action === 'cat-new') {
    const name = (prompt('新建表格 — 起个名字:', '') || '').trim();
    if (!name) return;
    let base = 'cat-' + name.toLowerCase().replace(/[^a-z0-9一-鿿]+/g, '-').replace(/^-+|-+$/g, '').slice(0, 40);
    if (!base || base === 'cat-') base = 'cat';
    let nid = base, k = 2;
    while (DATA.find(c => c.id === nid)) { nid = base + '-' + k++; }
    const ncat = { id: nid, title: name, terms: [], dynamic: true };
    DATA.push(ncat);
    try {
      const dyn = JSON.parse(localStorage.getItem('glossary-dynamic-cats') || '[]');
      dyn.push({ id: nid, title: name });
      localStorage.setItem('glossary-dynamic-cats', JSON.stringify(dyn));
      const dead = JSON.parse(localStorage.getItem('glossary-deleted-cats') || '[]').filter(x => x !== nid);
      localStorage.setItem('glossary-deleted-cats', JSON.stringify(dead));
    } catch (err) {}
    if (typeof makeCatTab === 'function') { catsNav.appendChild(makeCatTab(ncat)); }
    else { const a = document.createElement('a'); a.href='#'; a.className='group-link'; a.textContent = name + ' (0)'; a.dataset.cat = nid; a.onclick = (ev)=>{ev.preventDefault(); setActiveCat(nid);}; catsNav.appendChild(a); }
    const nsec = renderCategorySection(ncat);
    if (noResults && main) main.insertBefore(nsec, noResults);
    setActiveCat(nid);
    applySearch();
    return;
  }
  if (action === 'add-cancel') {
    const form = btn.closest('.term');
    const catId = form.previousElementSibling ? null : null;
    // simplest: just re-render the category section the form is inside
    const section = form.closest('section[data-cat]');
    if (section) {
      const cat = DATA.find(c => c.id === section.dataset.cat);
      if (cat) {
        const newSection = renderCategorySection(cat);
        section.replaceWith(newSection);
        applySearch();
      }
    }
    return;
  }

  // 容器可以是 .term card (编辑形态) 或 .practice-drawer (游戏抽屉)。造句相关 action 两处都能触发。
  const card = btn.closest('.term');
  const drawer = btn.closest('.practice-drawer');
  let container, id, catId, en;
  if (drawer && practiceState) {
    container = drawer;
    id = practiceState.id;
    catId = practiceState.catId;
    en = practiceState.en;
  } else if (card && card.dataset.id) {
    container = card;
    id = card.dataset.id;
    [catId, en] = id.split('::');
  } else {
    return;
  }

  if (action === 'play-audio') {
    playTermAudio(catId, en, btn);
    return;
  }

  if (action === 'shadow') {
    startShadow(catId, en);
    return;
  }

  if (action === 'play') {
    if (card) openPractice(card);
    return;
  }

  // 造句 — 朗读整句
  if (action === 'speak-sentence') {
    const i = parseInt(btn.dataset.i, 10);
    const existing = state.edits[id] || {};
    const s = (existing.sentences || [])[i];
    if (!s) return;
    const text = (typeof s === 'string') ? s : (s.text || '');
    if (text) speakTerm(text, btn);
    return;
  }

  // 看示例:把参考答案填进答题框
  if (action === 'show-sample') {
    const promptEl = container.querySelector('.sentence-prompt');
    const tplIdx = promptEl ? (parseInt(promptEl.dataset.tpl, 10) || 0) : 0;
    const reference = getReferenceAnswer(tplIdx, en);
    if (!reference) { alert('该模板暂无参考答案'); return; }
    const ta = container.querySelector('[name=sentence-input]');
    if (ta) { ta.value = reference; ta.focus(); }
    return;
  }

  // 朗读参考答案
  if (action === 'speak-ref') {
    const refEl = btn.parentElement && btn.parentElement.querySelector('.ab-text.ref');
    if (refEl && refEl.textContent) speakTerm(refEl.textContent, btn);
    return;
  }

  // AI Agent 评分 — Supabase Edge Function (Gemini 2.5 Flash)
  if (action === 'ai-grade') {
    const ta = container.querySelector('[name=sentence-input]');
    if (!ta) return;
    const sentence = ta.value.trim();
    if (!sentence) { alert('先写一句翻译再让 AI 评分'); ta.focus(); return; }
    const promptEl = container.querySelector('.sentence-prompt');
    const tplIdx = promptEl ? (parseInt(promptEl.dataset.tpl, 10) || 0) : 0;
    const d = getTermData(catId, en);
    const pair = SENTENCE_BANK[tplIdx];
    const tpl = Array.isArray(pair) ? pair[0] : pair;
    const promptText = tpl.replace(/\{zh\}/g, d.zh || en);
    const reference = getReferenceAnswer(tplIdx, en);

    const SUPABASE_URL = 'https://qjnagbzqhoansixqharb.supabase.co';
    const ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFqbmFnYnpxaG9hbnNpeHFoYXJiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgzNDIxODIsImV4cCI6MjA5MzkxODE4Mn0.GpMUVTk6JvqeciXagXQiJunc8TLFMHg3_b9reIjJ2Y8';

    const origText = btn.textContent;
    btn.textContent = '🤖 评分中…';
    btn.disabled = true;
    const feedbackEl = container.querySelector('[data-role="sentence-feedback"]');
    if (feedbackEl) { feedbackEl.style.display = 'flex'; feedbackEl.innerHTML = '<div style="color:var(--text-dim);font-size:12px;">🤖 AI 正在评分,5-10s…</div>'; }

    fetch(SUPABASE_URL + '/functions/v1/glossary-grade', {
      method: 'POST',
      headers: {
        'content-type': 'application/json',
        'authorization': 'Bearer ' + ANON_KEY,
        'apikey': ANON_KEY,
      },
      body: JSON.stringify({
        sentence: sentence,
        target_en: en,
        target_zh: d.zh || '',
        prompt: promptText,
        reference: reference,
      }),
    })
    .then(r => r.json())
    .then(data => {
      btn.textContent = origText;
      btn.disabled = false;
      if (!data || data.error) {
        if (feedbackEl) feedbackEl.innerHTML = '<div style="color:#ef4444;font-size:12px;">AI 评分失败: ' + escapeHtml((data && data.error) || '未知错误') + '</div>';
        return;
      }
      // 把 AI 结果存到 sentences 历史(便于后续查看)
      const existing = state.edits[id] || {};
      const sentences = Array.isArray(existing.sentences) ? existing.sentences.slice() : [];
      const recent = sentences[0];
      const recentText = typeof recent === 'string' ? recent : ((recent && recent.text) || '');
      if (recentText !== sentence) {
        sentences.unshift({ text: sentence, score: data.score, rank: data.rank, ai: true, corrected: data.corrected, feedback: data.feedback, time: Date.now() });
        state.edits[id] = Object.assign({}, existing, { sentences });
        save();
        const past = container.querySelector('[data-role="past-sentences"]');
        if (past) past.innerHTML = sentences.map((s, i) => renderPastSentenceHtml(s, i)).join('');
      }
      // Render AI feedback
      if (feedbackEl) {
        const notes = (data.grammar_notes || []).map(n =>
          '<li class="r-tip">' + escapeHtml(n) + '</li>'
        ).join('');
        feedbackEl.innerHTML =
          '<div class="fb-row">' +
            '<span class="sentence-rank r-' + String(data.rank).toLowerCase() + '">' + escapeHtml(data.rank) + '</span>' +
            '<span class="sentence-score">🤖 ' + data.score + ' 分 · AI 评分</span>' +
          '</div>' +
          (data.feedback ? '<div class="ai-comment">' + escapeHtml(data.feedback) + '</div>' : '') +
          (notes ? '<ul class="sentence-reasons">' + notes + '</ul>' : '') +
          '<div class="ab-compare">' +
            '<div class="ab-row"><span class="ab-label">你的</span><span class="ab-text">' + escapeHtml(sentence) + '</span></div>' +
            (data.corrected ? '<div class="ab-row"><span class="ab-label ai">AI 修正</span><span class="ab-text ai-ref">' + escapeHtml(data.corrected) + '</span><button class="speak-sentence ab-speak" data-action="speak-ref" title="朗读修正版">🔊</button></div>' : '') +
            (reference ? '<div class="ab-row"><span class="ab-label ref">模板答案</span><span class="ab-text ref">' + escapeHtml(reference) + '</span><button class="speak-sentence ab-speak" data-action="speak-ref" title="朗读模板答案">🔊</button></div>' : '') +
          '</div>' +
          grabVocabChips(data, sentence, reference, catId);
      }
      // 本轮造句分(AI):与本地分取较高,凑本轮总分
      if (practiceState && practiceState.drawer && practiceState.id === id && typeof data.score === 'number') {
        practiceState.sentenceScore = Math.max(practiceState.sentenceScore || 0, data.score);
        checkPracticeMastery();
      }
    })
    .catch(e => {
      btn.textContent = origText;
      btn.disabled = false;
      if (feedbackEl) feedbackEl.innerHTML = '<div style="color:#ef4444;font-size:12px;">AI 评分失败: ' + escapeHtml(String(e.message || e)) + '</div>';
    });
    return;
  }

  // 造句 — 换一题 (从 100 句里随机抽,跳过当前)
  if (action === 'rotate-prompt') {
    const promptEl = container.querySelector('.sentence-prompt');
    if (!promptEl) return;
    const cur = parseInt(promptEl.dataset.tpl, 10) || 0;
    let next = cur;
    if (SENTENCE_BANK.length > 1) {
      do { next = Math.floor(Math.random() * SENTENCE_BANK.length); } while (next === cur);
    }
    const d = getTermData(catId, en);
    promptEl.dataset.tpl = next;
    promptEl.innerHTML = buildSentencePrompt(next, d.en, d.zh);
    return;
  }

  // 造句 — 检查并记下
  if (action === 'save-sentence') {
    const ta = container.querySelector('[name=sentence-input]');
    if (!ta) return;
    const sentence = ta.value.trim();
    if (!sentence) { ta.focus(); return; }
    const grade = gradeTranslation(sentence, en);
    // 本轮造句分(本地):与 AI 分取较高,凑本轮总分(放 dup 检查前,重复句也照样计分)
    if (practiceState && practiceState.drawer && practiceState.id === id) {
      practiceState.sentenceScore = Math.max(practiceState.sentenceScore || 0, grade.score);
      checkPracticeMastery();
    }
    const entry = { text: sentence, score: grade.score, rank: grade.rank, time: Date.now() };
    const existing = state.edits[id] || {};
    const sentences = Array.isArray(existing.sentences) ? existing.sentences.slice() : [];
    const recent = sentences[0];
    const recentText = typeof recent === 'string' ? recent : ((recent && recent.text) || '');
    if (recentText === sentence) {
      const fb = container.querySelector('[data-role="sentence-feedback"]');
      if (fb) {
        fb.innerHTML = '<span class="sentence-rank r-' + grade.rank.toLowerCase() + '">' + grade.rank + '</span>' +
          '<span class="sentence-score">' + grade.score + ' 分 · 已记过这句,跳过</span>';
        fb.style.display = 'flex';
      }
      return;
    }
    sentences.unshift(entry);
    state.edits[id] = Object.assign({}, existing, { sentences });
    save();
    const feedbackEl = container.querySelector('[data-role="sentence-feedback"]');
    if (feedbackEl) {
      // 取参考答案,做 AB 对比
      const promptEl = container.querySelector('.sentence-prompt');
      const tplIdx = promptEl ? (parseInt(promptEl.dataset.tpl, 10) || 0) : 0;
      const reference = getReferenceAnswer(tplIdx, en);
      feedbackEl.innerHTML =
        '<div class="fb-row">' +
          '<span class="sentence-rank r-' + grade.rank.toLowerCase() + '">' + grade.rank + '</span>' +
          '<span class="sentence-score">' + grade.score + ' 分</span>' +
        '</div>' +
        '<ul class="sentence-reasons">' +
          grade.reasons.map(([txt, cls]) => '<li class="r-' + cls + '">' + escapeHtml(txt) + '</li>').join('') +
        '</ul>' +
        (reference ? '<div class="ab-compare">' +
          '<div class="ab-row"><span class="ab-label">你的</span><span class="ab-text">' + escapeHtml(sentence) + '</span></div>' +
          '<div class="ab-row"><span class="ab-label ref">参考</span><span class="ab-text ref">' + escapeHtml(reference) + '</span><button class="speak-sentence ab-speak" data-action="speak-ref" title="朗读参考">🔊</button></div>' +
        '</div>' : '');
      feedbackEl.style.display = 'flex';
    }
    ta.value = '';
    const past = container.querySelector('[data-role="past-sentences"]');
    if (past) past.innerHTML = sentences.map((s, i) => renderPastSentenceHtml(s, i)).join('');
    return;
  }

  if (action === 'clear-sentences') {
    const existing = state.edits[id] || {};
    const n = (existing.sentences && existing.sentences.length) || 0;
    if (n === 0) return;
    if (!confirm('清空 "' + en + '" 的 ' + n + ' 句造句历史?')) return;
    const copy = Object.assign({}, existing);
    delete copy.sentences;
    if (Object.keys(copy).length === 0) delete state.edits[id];
    else state.edits[id] = copy;
    save();
    // Re-render the sentence section in place (works for both drawer and edit form)
    const sec = container.querySelector('.sentence-section, .drawer-sentence');
    if (sec) {
      const d = getTermData(catId, en);
      const wrap = document.createElement('div');
      wrap.innerHTML = buildSentenceSectionHtml(en, d.zh, d.sentences);
      sec.replaceWith(wrap.firstElementChild);
    }
    return;
  }

  if (action === 'del-sentence') {
    const i = parseInt(btn.dataset.i, 10);
    const existing = state.edits[id] || {};
    if (!Array.isArray(existing.sentences) || !existing.sentences[i]) return;
    const sentences = existing.sentences.slice();
    sentences.splice(i, 1);
    if (sentences.length) state.edits[id] = Object.assign({}, existing, { sentences });
    else {
      const copy = Object.assign({}, existing);
      delete copy.sentences;
      if (Object.keys(copy).length === 0) delete state.edits[id];
      else state.edits[id] = copy;
    }
    save();
    const past = container.querySelector('[data-role="past-sentences"]');
    if (past) past.innerHTML = sentences.map((s, idx) => renderPastSentenceHtml(s, idx)).join('');
    return;
  }

  if (action === 'speak') {
    speakTerm(en, btn);
    return;
  }

  if (action === 'edit') {
    document.querySelectorAll('.term.is-editing').forEach(c => {
      if (c.dataset.id !== id) renderCardContent(c);
    });
    renderEditForm(card);
    return;
  }

  if (action === 'cancel') {
    renderCardContent(card);
    return;
  }

  if (action === 'reset') {
    if (!confirm('清除该词的所有自定义内容(罗马注音 / 笔记 / 中文 / 解释)?')) return;
    delete state.edits[id];
    save();
    syncCardsById(id);
    rebuildFavorites();
    applySearch();
    return;
  }

  if (action === 'save') {
    const form = btn.closest('form');
    const cat = DATA.find(c => c.id === catId);
    let orig = cat.terms.find(t => t[0] === en);
    if (!orig) {
      const userArr = state.userTerms[catId] || [];
      const u = userArr.find(t => t.en === en);
      if (u) orig = [u.en, u.zh, u.hint || ''];
    }
    if (!orig) return;
    const get = name => form.querySelector('[name=' + name + ']').value.trim();
    const phonetic = get('phonetic');
    const zh = get('zh');
    const hint = get('hint');
    const note = get('note');
    const edit = {};
    // 跟字典默认相同的话不存,省 localStorage
    const dictEntry = lookupDict(en);
    const dictRomaji = dictEntry ? dictEntry.romaji.join('·') : '';
    if (phonetic && phonetic !== dictRomaji) edit.phonetic = phonetic;
    if (zh && zh !== orig[1]) edit.zh = zh;
    if (hint !== (orig[2] || '')) edit.hint = hint;
    if (note) edit.note = note;
    // 保留已记的造句句子 + 做题记录(都单独写入 state.edits[id],编辑保存时不能丢)
    const prevEdit = state.edits[id] || {};
    if (Array.isArray(prevEdit.sentences) && prevEdit.sentences.length) edit.sentences = prevEdit.sentences;
    if (Array.isArray(prevEdit.quizLog) && prevEdit.quizLog.length) edit.quizLog = prevEdit.quizLog;
    if (Object.keys(edit).length === 0) delete state.edits[id];
    else state.edits[id] = edit;
    save();
    syncCardsById(id);
    rebuildFavorites();
    applySearch();
    return;
  }

  if (action === 'fav') {
    if (state.favorites.has(id)) state.favorites.delete(id);
    else state.favorites.add(id);
    save();
    syncCardsById(id);
    rebuildFavorites();
    applySearch();
  } else if (action === 'done') {
    // NYC Global Center 通关 toggle:翻转 word.completed,保存,重渲胶囊
    const [cId, en] = id.split('::');
    toggleTermCompleted(cId, en);
    updateCatNavCount(cId);
    return;
  } else if (action === 'del') {
    // 硬删除:从 state 持久化 + 立即从 DOM 移除所有副本(主分类 + 收藏区)
    state.deleted.add(id);
    state.favorites.delete(id);
    save();
    document.querySelectorAll('.term[data-id="' + CSS.escape(id) + '"]').forEach(t => t.remove());
    rebuildFavorites();
    updateCatNavCount(catId);  // tab badge 跟着减
    applySearch();
  }
});

search.addEventListener('input', e => {
  state.query = e.target.value.trim().toLowerCase();
  applySearch();
});

// 回车:本地搜不到时,自动联网查对应英文词并加入当前胶囊(不用再点蓝按钮)
search.addEventListener('keydown', e => {
  if (e.key !== 'Enter' || e.repeat) return;
  if (!search.value.trim()) return;
  if (noResults.classList.contains('show') && webLookupBtn && !webLookupBtn.disabled) {
    e.preventDefault();
    webLookupAndAdd();
  }
});

rebuildFavorites();

// 给老数据补 default completed=false(老 NYC Global Center 词)
(function backfillCompleted() {
  Object.keys(state.userTerms).forEach(catId => {
    (state.userTerms[catId] || []).forEach(t => {
      if (typeof t.completed === 'undefined') t.completed = false;
    });
  });
  save();
})();

// URL ?import=<base64>&date=<lesson_label> 一键导入 — speak2go-worker push 进来
// 2026-05-28:每节录音课 = 一个独立 top-level tab(跟 Vibe Coding / Claude Code 并列)
(function autoImportFromUrl() {
  const params = new URLSearchParams(window.location.search);
  const raw = params.get('import');
  if (!raw) return;
  const lessonLabel = (params.get('date') || '').trim();
  let arr, lessonAudioUrl = '';
  try {
    const binary = atob(decodeURIComponent(raw));
    const bytes = new Uint8Array(binary.length);
    for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
    const parsed = JSON.parse(new TextDecoder('utf-8').decode(bytes));
    if (Array.isArray(parsed)) arr = parsed;
    else if (parsed && Array.isArray(parsed.words)) { arr = parsed.words; lessonAudioUrl = parsed.audio_url || ''; }
    else { history.replaceState({}, '', location.pathname); return; }
  } catch (e) {
    console.error('[glossary import] decode failed', e);
    history.replaceState({}, '', location.pathname); return;
  }
  history.replaceState({}, '', location.pathname);   // 清 URL,防刷新重复
  if (!arr || !arr.length) return;

  // 目标 cat(只算 id,先不创建 —— 用户确认勾选后才建)
  let catId;
  if (lessonLabel) {
    catId = 'lesson-' + lessonLabel.toLowerCase().replace(/[^a-z0-9一-鿿]+/g, '-').replace(/^-+|-+$/g, '').slice(0, 60);
  } else { catId = 'nyc-global-center'; }

  // 候选 = 解析出的词里"还没在该分类"的新词(去重),让用户勾选
  const existing = new Set((state.userTerms[catId] || []).map(t => (t.en || '').toLowerCase()));
  const cands = arr.map(t => {
    const en = (t.en || (Array.isArray(t) ? t[0] : '') || '').trim();
    if (!en) return null;
    return { en, zh: t.zh || (Array.isArray(t) ? t[1] : '') || '', hint: t.hint || (Array.isArray(t) ? t[2] : '') || '', start: (typeof t.start === 'number' ? t.start : undefined) };
  }).filter(Boolean).filter(w => !existing.has(w.en.toLowerCase()));
  if (!cands.length) return;   // 全是已有词,无新词可加

  showImportPicker(cands, { catId, lessonLabel, lessonAudioUrl });
})();

// 勾选弹窗:列出这节课提炼的新词,用户勾选 → 加入选中的
function showImportPicker(cands, ctx) {
  const bg = document.createElement('div');
  bg.className = 'import-modal-bg';
  const rows = cands.map((w, i) =>
    '<label class="im-item"><input type="checkbox" data-i="' + i + '" checked>' +
      '<span class="im-en">' + escapeHtml(w.en) + '</span>' +
      '<span class="im-zh">' + escapeHtml(w.zh) + '</span></label>'
  ).join('');
  bg.innerHTML =
    '<div class="import-modal">' +
      '<div class="im-head"><h3>📚 挑词加入「' + escapeHtml(ctx.lessonLabel || 'NYC Global Center') + '」</h3>' +
        '<div class="im-sub">这节课提炼了 ' + cands.length + ' 个新词,勾选你要加入的</div></div>' +
      '<div class="im-tools"><button class="cat-tb-btn" data-act="all">全选</button><button class="cat-tb-btn" data-act="none">全不选</button>' +
        '<span class="im-count" style="margin-left:auto;align-self:center;font-size:12px;color:var(--text-dim)"></span></div>' +
      '<div class="im-list">' + rows + '</div>' +
      '<div class="im-foot"><button class="im-go" data-act="go"></button><button data-act="cancel">取消</button></div>' +
    '</div>';
  document.body.appendChild(bg);
  const list = bg.querySelector('.im-list');
  const upd = () => {
    const n = list.querySelectorAll('input:checked').length;
    bg.querySelector('.im-count').textContent = '已选 ' + n + '/' + cands.length;
    bg.querySelector('.im-go').textContent = '加入选中 ' + n + ' 词';
    bg.querySelector('.im-go').disabled = n === 0;
  };
  upd();
  bg.addEventListener('change', e => { if (e.target.matches('input[type=checkbox]')) upd(); });
  bg.addEventListener('click', e => {
    const b = e.target.closest('button[data-act]'); if (!b) return;
    const act = b.dataset.act;
    if (act === 'all') { list.querySelectorAll('input').forEach(c => c.checked = true); upd(); }
    else if (act === 'none') { list.querySelectorAll('input').forEach(c => c.checked = false); upd(); }
    else if (act === 'cancel') { bg.remove(); }
    else if (act === 'go') {
      const chosen = [...list.querySelectorAll('input:checked')].map(c => cands[+c.dataset.i]);
      bg.remove();
      if (chosen.length) doImportWords(chosen, ctx);
    }
  });
}

// 真正写入:建/恢复 cat → 加选中的词(带艾宾浩斯字段 + 录音回放)→ 切到该分类 + 红标
function doImportWords(chosen, ctx) {
  const { catId, lessonLabel, lessonAudioUrl } = ctx;
  if (!DATA.find(c => c.id === catId)) {
    const title = (catId === 'nyc-global-center') ? 'NYC Global Center' : (lessonLabel || catId);
    const cat = { id: catId, title, terms: [] };
    if (catId !== 'nyc-global-center') {
      cat.dynamic = true;
      try { const dyn = JSON.parse(localStorage.getItem('glossary-dynamic-cats') || '[]'); if (!dyn.find(c => c.id === catId)) { dyn.push({ id: catId, title }); localStorage.setItem('glossary-dynamic-cats', JSON.stringify(dyn)); } } catch (e) {}
    }
    DATA.push(cat);
    const a = document.createElement('a');
    a.href = '#'; a.className = 'group-link inactive'; a.textContent = title + ' (0)';
    a.dataset.cat = catId; a.onclick = (e) => { e.preventDefault(); setActiveCat(catId); };
    catsNav.appendChild(a);
    const sec = renderCategorySection(cat);
    if (noResults && main) main.insertBefore(sec, noResults);
  }
  // 之前整组删过 → 导入即恢复
  try { const dead = JSON.parse(localStorage.getItem('glossary-deleted-cats') || '[]'); if (dead.includes(catId)) localStorage.setItem('glossary-deleted-cats', JSON.stringify(dead.filter(x => x !== catId))); } catch (e) {}
  if (!state.userTerms[catId]) state.userTerms[catId] = [];
  const seen = new Set(state.userTerms[catId].map(t => (t.en || '').toLowerCase()));
  let added = 0;
  chosen.forEach(w => {
    // 之前删过同名词 → 导入即取消墓碑(大小写不敏感,删时与这次推来的 en 大小写可能不同,如 API/api)
    const tl = (catId + '::' + w.en).toLowerCase();
    [...state.deleted].forEach(k => { if (k.toLowerCase() === tl) state.deleted.delete(k); });
    if (seen.has(w.en.toLowerCase())) return;
    const item = { en: w.en, zh: w.zh || '', hint: w.hint || '', completed: false, review_stage: 0, next_due_at: Date.now() + 5 * 60 * 1000 };
    if (lessonAudioUrl && typeof w.start === 'number') { item.audio_url = lessonAudioUrl; item.start = w.start; }
    state.userTerms[catId].push(item); seen.add(w.en.toLowerCase()); added++;
  });
  save();
  const cat = DATA.find(c => c.id === catId);
  const ns = renderCategorySection(cat);
  if (noResults && main) main.insertBefore(ns, noResults);
  updateCatNavCount(catId);
  setActiveCat(catId); applySearch();   // 切到该分类让用户看到刚加的词
  const topLink = catsNav.querySelector('a[data-cat="' + catId + '"]');
  if (topLink && added > 0) {
    topLink.querySelectorAll('.cat-new-badge').forEach(el => el.remove());
    const badge = document.createElement('span'); badge.className = 'cat-new-badge'; badge.textContent = '+' + added;
    topLink.appendChild(badge);
    setTimeout(() => badge.classList.add('fade-out'), 5000);
    setTimeout(() => { if (badge.parentNode) badge.remove(); }, 5800);
  }
}

// Set initial active group (restore from localStorage, default Vibe Coding)
// 校验存的 active-cat 还在(否则它指向已删分类 → 无 section 匹配 → 内容区全空白)
(function initActiveCat() {
  const saved = localStorage.getItem('glossary-active-cat');
  const target = (saved && DATA.find(c => c.id === saved)) ? saved : (DATA.find(c => c.id === 'vibe-coding') ? 'vibe-coding' : (DATA[0] && DATA[0].id));
  if (target) setActiveCat(target);
})();

// 从 chat 的「开始复习」跳来:?review=1 + localStorage 队列 → 起这批到期词的临时复习题库
(function maybeStartReviewQuiz() {
  const p = new URLSearchParams(location.search);
  if (p.get('review') !== '1') return;
  let q = [];
  try { q = JSON.parse(localStorage.getItem('glossary-review-queue') || '[]'); } catch (e) {}
  try { localStorage.removeItem('glossary-review-queue'); } catch (e) {}   // 读取即消费:中途退出也不留陈旧队列被重放
  history.replaceState({}, '', location.pathname);   // 清 URL,避免刷新重开
  if (Array.isArray(q) && q.length) setTimeout(() => startReviewQuiz(q), 250);
})();

/* ============================================================
   跨标签 / iframe 同步 — 另一个 tab 改了 localStorage,这边自动跟上
   ============================================================ */
function reloadFromStorage() {
 try {
  state.favorites = new Set(_gjArr('glossary-favorites'));
  state.deleted = new Set(_gjArr('glossary-deleted'));
  state.edits = _gjObj('glossary-edits');
  const newUserTerms = _gjObj('glossary-user-terms');

  // —— 分类增删改名同步(另一个 tab 新建/删组/改名)——
  const dynCats = _gjArr('glossary-dynamic-cats');
  const deadCats = new Set(_gjArr('glossary-deleted-cats'));
  const titleMap = _gjObj('glossary-cat-titles');
  // 新增:dynamic-cats 里有、本 tab DATA 里没有、且没被删的 → 建 tab + section
  dynCats.forEach(c => {
    if (!c || !c.id || deadCats.has(c.id) || DATA.find(d => d.id === c.id)) return;
    const cat = { id: c.id, title: titleMap[c.id] || c.title || c.id, terms: [], dynamic: true };
    DATA.push(cat);
    if (!catsNav.querySelector('a[data-cat="' + c.id + '"]')) {
      const a = document.createElement('a'); a.href = '#'; a.className = 'group-link inactive';
      a.textContent = cat.title + ' (0)'; a.dataset.cat = c.id;
      a.onclick = (ev) => { ev.preventDefault(); setActiveCat(c.id); }; catsNav.appendChild(a);
    }
    const sec = renderCategorySection(cat);
    if (noResults && main) main.insertBefore(sec, noResults);
  });
  // 删除:本 tab 还在、但已被另一个 tab 删掉的 → 移除 tab + section(修幽灵空胶囊)
  for (let i = DATA.length - 1; i >= 0; i--) {
    if (!deadCats.has(DATA[i].id)) continue;
    const cid = DATA[i].id;
    DATA.splice(i, 1);
    const navA = catsNav.querySelector('a[data-cat="' + cid + '"]'); if (navA) navA.remove();
    const sec = document.getElementById('cat-' + cid); if (sec) sec.remove();
    delete state.userTerms[cid];
  }
  // 改名同步
  DATA.forEach(cat => { if (titleMap[cat.id] && cat.title !== titleMap[cat.id]) { cat.title = titleMap[cat.id]; updateCatNavCount(cat.id); } });

  // —— 用户词变化同步 ——
  DATA.forEach(cat => {
    const oldArr = state.userTerms[cat.id] || [];
    const newArr = newUserTerms[cat.id] || [];
    if (oldArr.length !== newArr.length || JSON.stringify(oldArr) !== JSON.stringify(newArr)) {
      const oldSection = document.getElementById('cat-' + cat.id);
      state.userTerms[cat.id] = newArr;
      if (oldSection) {
        const newSection = renderCategorySection(cat);
        oldSection.replaceWith(newSection);
        updateCatNavCount(cat.id);
      }
    }
  });
  state.userTerms = newUserTerms;
  // Re-render existing cards (skip ones being edited so user input isn't wiped)
  document.querySelectorAll('.term:not(.is-editing)').forEach(card => {
    if (card.dataset.id) renderCardContent(card);
  });
  rebuildFavorites();
  updateDelToggle();
  // 当前 active 分类被另一个 tab 删了 → 切到第一个
  if (!DATA.find(c => c.id === document.body.dataset.activeCat) && DATA[0]) setActiveCat(DATA[0].id);
  applySearch();
 } catch (e) { console.warn('[glossary] reloadFromStorage failed:', e); }
}
window.addEventListener('storage', e => {
  if (e.key && e.key.startsWith('glossary-')) reloadFromStorage();
});

// ============ 账号同步:词典跟账号走(Supabase per-account)============
// 未登录 → 纯本地;有 session → 加载时拉云端并集合并、本地变更防抖推回。
// 合并保证「删掉的词不复活」:删除恒留墓碑(glossary-deleted),并集后被墓碑压住。
const _GLOSSARY_SYNC_KEYS = [
  'glossary-user-terms', 'glossary-deleted', 'glossary-deleted-cats',
  'glossary-dynamic-cats', 'glossary-cat-titles', 'glossary-edits', 'glossary-favorites'
];
const _glossarySync = (() => {
  let sb = null, uid = null, pushTimer = null, applying = false, started = false;

  function readBlob() {
    const b = {};
    for (const k of _GLOSSARY_SYNC_KEYS) {
      const v = localStorage.getItem(k);
      if (v != null) { try { b[k] = JSON.parse(v); } catch (e) {} }
    }
    return b;
  }
  function writeBlob(b) {
    applying = true;
    try {
      for (const k of _GLOSSARY_SYNC_KEYS) {
        if (b[k] !== undefined) localStorage.setItem(k, JSON.stringify(b[k]));
      }
    } finally { applying = false; }
  }

  const uniqArr = a => Array.from(new Set((a || []).filter(x => x != null)));
  function mergeUserTerms(s, l) {
    s = s || {}; l = l || {};
    const out = {}, cats = new Set([...Object.keys(s), ...Object.keys(l)]);
    for (const c of cats) {
      const map = new Map();
      for (const t of (s[c] || [])) if (t && t.en) map.set(String(t.en).toLowerCase(), t);
      for (const t of (l[c] || [])) if (t && t.en) map.set(String(t.en).toLowerCase(), t); // 本地覆盖
      out[c] = [...map.values()];
    }
    return out;
  }
  function mergeDynCats(s, l) {
    const map = new Map();
    for (const c of (s || [])) if (c && c.id) map.set(c.id, c);
    for (const c of (l || [])) if (c && c.id) {
      const prev = map.get(c.id);
      map.set(c.id, { id: c.id, title: (c.title || (prev && prev.title) || c.id) });
    }
    return [...map.values()];
  }
  function mergeEdits(s, l) {
    s = s || {}; l = l || {};
    const out = {}, keys = new Set([...Object.keys(s), ...Object.keys(l)]);
    for (const k of keys) {
      const a = s[k] || {}, b = l[k] || {};
      const m = { ...a, ...b }; // 本地覆盖标量(note/phonetic 等)
      const ql = new Map();
      for (const e of (a.quizLog || [])) if (e && e.at != null) ql.set(e.at, e);
      for (const e of (b.quizLog || [])) if (e && e.at != null) ql.set(e.at, e);
      const quizLog = [...ql.values()].sort((x, y) => x.at - y.at);
      if (quizLog.length) m.quizLog = quizLog;
      if (Array.isArray(a.sentences) || Array.isArray(b.sentences)) {
        const seen = new Set(), sent = [];
        for (const x of [...(a.sentences || []), ...(b.sentences || [])]) {
          const key = JSON.stringify(x);
          if (!seen.has(key)) { seen.add(key); sent.push(x); }
        }
        m.sentences = sent;
      }
      out[k] = m;
    }
    return out;
  }
  function merge(server, local) {
    server = server || {}; local = local || {};
    return {
      'glossary-user-terms': mergeUserTerms(server['glossary-user-terms'], local['glossary-user-terms']),
      'glossary-deleted': uniqArr([...(server['glossary-deleted'] || []), ...(local['glossary-deleted'] || [])]),
      'glossary-deleted-cats': uniqArr([...(server['glossary-deleted-cats'] || []), ...(local['glossary-deleted-cats'] || [])]),
      'glossary-favorites': uniqArr([...(server['glossary-favorites'] || []), ...(local['glossary-favorites'] || [])]),
      'glossary-dynamic-cats': mergeDynCats(server['glossary-dynamic-cats'], local['glossary-dynamic-cats']),
      'glossary-cat-titles': { ...(server['glossary-cat-titles'] || {}), ...(local['glossary-cat-titles'] || {}) },
      'glossary-edits': mergeEdits(server['glossary-edits'], local['glossary-edits']),
    };
  }

  async function push(blob) {
    if (!sb || !uid) return;
    try {
      const { error } = await sb.from('glossary_state')
        .upsert({ user_id: uid, data: blob || readBlob(), updated_at: new Date().toISOString() }, { onConflict: 'user_id' });
      if (error) console.warn('[glossary-sync] push error', error.message);
    } catch (e) { console.warn('[glossary-sync] push failed', e); }
  }
  function schedulePush() {
    if (!sb || !uid || applying) return;
    clearTimeout(pushTimer);
    pushTimer = setTimeout(() => push(), 1200);
  }
  async function pull() {
    try {
      const { data, error } = await sb.from('glossary_state').select('data').eq('user_id', uid).maybeSingle();
      if (error) { console.warn('[glossary-sync] pull error', error.message); return; }
      const merged = merge((data && data.data) || {}, readBlob());
      writeBlob(merged);
      try { reloadFromStorage(); } catch (e) {}
      await push(merged); // 并集写回云端收敛
      console.log('[glossary-sync] 已从账号拉取并合并');
    } catch (e) { console.warn('[glossary-sync] pull failed', e); }
  }

  async function start() {
    if (started) return; started = true;
    if (!window.supabase || !window.supabase.createClient) { console.warn('[glossary-sync] supabase-js 未加载,纯本地模式'); return; }
    sb = window.supabase.createClient(_GLOSSARY_SB_URL, _GLOSSARY_ANON);
    let session = null;
    try { const r = await sb.auth.getSession(); session = r.data && r.data.session; } catch (e) {}
    if (!session || !session.user) { console.log('[glossary-sync] 未登录 → 纯本地模式'); return; }
    uid = session.user.id;
    const _set = localStorage.setItem.bind(localStorage);
    localStorage.setItem = function (k, v) {
      _set(k, v);
      if (typeof k === 'string' && _GLOSSARY_SYNC_KEYS.indexOf(k) >= 0) schedulePush();
    };
    await pull();
  }

  return { start, merge };
})();
_glossarySync.start();

const themeBtn = document.getElementById('themeBtn');
function setTheme(t) {
  document.documentElement.dataset.theme = t;
  themeBtn.textContent = t === 'dark' ? '☀️ 浅色' : '🌙 暗色';
  localStorage.setItem('glossary-theme', t);
}
setTheme(localStorage.getItem('glossary-theme') || (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'));
themeBtn.addEventListener('click', () => {
  setTheme(document.documentElement.dataset.theme === 'dark' ? 'light' : 'dark');
});
