<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vibe Coding 名词表 · 中英对照</title>
<style>
:root {
  --accent: #1D9E75;
  --accent-soft: #1D9E7515;
  --bg: #fafaf7;
  --surface: #ffffff;
  --text: #1a1a1a;
  --text-dim: #666;
  --border: #e5e5e0;
  --code-bg: #f4f4ef;
  --shadow: 0 1px 3px rgba(0,0,0,0.04);
}
[data-theme="dark"] {
  --accent: #2dd4a7;
  --accent-soft: #2dd4a720;
  --bg: #0e0f0d;
  --surface: #181a17;
  --text: #e8e8e3;
  --text-dim: #999;
  --border: #2a2c28;
  --code-bg: #232520;
  --shadow: 0 1px 3px rgba(0,0,0,0.3);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; scroll-padding-top: 130px; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", "PingFang SC", "Microsoft YaHei", sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
}
header {
  position: sticky; top: 0; z-index: 10;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 6px 12px;
}
.header-inner {
  max-width: 980px; margin: 0 auto;
  display: flex; flex-wrap: wrap; align-items: center; gap: 6px 10px;
}
.title-row {
  display: flex; align-items: center; gap: 8px;
  flex-shrink: 0;
}
h1 {
  font-size: 12px; font-weight: 600;
  color: var(--text);
  white-space: nowrap;
}
h1 .accent { color: var(--accent); }
.theme-toggle, .deleted-toggle {
  background: none; border: 1px solid var(--border);
  color: var(--text); padding: 3px 8px;
  border-radius: 5px; cursor: pointer;
  font-size: 11px; font-family: inherit;
  white-space: nowrap;
}
.theme-toggle:hover { background: var(--accent-soft); border-color: var(--accent); }
.search {
  flex: 1; min-width: 160px;
  padding: 5px 10px;
  font-size: 12px; font-family: inherit;
  background: var(--bg); color: var(--text);
  border: 1px solid var(--border); border-radius: 6px;
  outline: none;
}
.search:focus { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-soft); }
nav.cats {
  display: flex; flex-wrap: wrap; gap: 4px;
  width: 100%;
}
nav.cats a {
  font-size: 10px; padding: 2px 7px;
  background: var(--bg); border: 1px solid var(--border);
  border-radius: 999px; color: var(--text-dim);
  text-decoration: none; white-space: nowrap;
}
nav.cats a:hover { background: var(--accent-soft); border-color: var(--accent); color: var(--accent); }
nav.cats a.group-link {
  font-weight: 700; font-size: 11px; padding: 3px 10px;
  background: var(--accent); color: var(--surface);
  border-color: var(--accent);
}
nav.cats a.group-link:hover { background: var(--text); border-color: var(--text); }

.group-header {
  font-size: 22px; font-weight: 700;
  color: var(--text);
  margin: 28px 0 8px;
  padding: 8px 14px;
  background: linear-gradient(90deg, var(--accent) 0%, transparent 100%);
  color: var(--surface);
  border-radius: 8px;
  display: flex; justify-content: space-between; align-items: baseline;
}
.group-header:first-child { margin-top: 0; }
.group-header .count { font-size: 12px; font-weight: 400; opacity: 0.85; }
nav.sub-cats {
  display: flex; flex-wrap: wrap; gap: 5px;
  padding: 0 4px 14px;
}
nav.sub-cats a {
  font-size: 11px; padding: 3px 9px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 999px; color: var(--text-dim);
  text-decoration: none; white-space: nowrap;
}
nav.sub-cats a:hover { background: var(--accent-soft); border-color: var(--accent); color: var(--accent); }
main {
  max-width: 980px; margin: 0 auto;
  padding: 24px 16px 80px;
}
section {
  margin-bottom: 36px;
}
section h2 {
  font-size: 18px; font-weight: 600;
  padding-bottom: 8px; margin-bottom: 14px;
  border-bottom: 2px solid var(--accent);
  color: var(--accent);
  display: flex; justify-content: space-between; align-items: baseline;
}
section h2 .count {
  font-size: 12px; color: var(--text-dim); font-weight: 400;
}
.terms {
  display: grid; gap: 10px;
  grid-template-columns: 1fr;
}
@media (min-width: 720px) {
  .terms { grid-template-columns: 1fr 1fr; }
}
.term {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px 14px;
  box-shadow: var(--shadow);
  transition: border-color 0.15s, opacity 0.15s;
  position: relative;
}
.term:hover { border-color: var(--accent); }
.term .head {
  display: flex; align-items: center; gap: 10px;
  flex-wrap: wrap; margin-bottom: 4px;
}
.term .en {
  font-family: "SF Mono", "JetBrains Mono", Menlo, Consolas, monospace;
  font-size: 14px; font-weight: 600;
  color: var(--accent);
  background: var(--code-bg);
  padding: 2px 7px; border-radius: 4px;
}
.term .zh {
  font-size: 14px; font-weight: 500;
  color: var(--text);
}
.term .phonetic {
  font-family: "SF Mono", "JetBrains Mono", Menlo, Consolas, monospace;
  font-size: 12px; color: var(--text-dim);
  font-style: italic;
}
.term .hint {
  font-size: 12px; color: var(--text-dim);
  line-height: 1.5;
}
.term .note {
  font-size: 12px; color: var(--text);
  line-height: 1.5;
  background: var(--accent-soft);
  border-left: 2px solid var(--accent);
  padding: 6px 8px; border-radius: 0 4px 4px 0;
  margin-top: 6px;
  white-space: pre-wrap;
}
.term.is-edited::after {
  content: '✎'; position: absolute; top: -6px; right: -6px;
  background: var(--accent); color: #fff;
  width: 18px; height: 18px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 10px;
}
.term.is-favorite.is-edited::before { left: -6px; }
.term.is-favorite.is-edited::after { right: -6px; }
.edit-form {
  display: flex; flex-direction: column; gap: 8px;
}
.edit-row {
  display: flex; flex-direction: column; gap: 3px;
}
.edit-row label {
  font-size: 11px; color: var(--text-dim);
  font-weight: 500; letter-spacing: 0.3px;
}
.edit-row input, .edit-row textarea {
  width: 100%; padding: 6px 8px;
  font-size: 13px; font-family: inherit;
  background: var(--bg); color: var(--text);
  border: 1px solid var(--border); border-radius: 5px;
  outline: none; resize: vertical;
}
.edit-row input:focus, .edit-row textarea:focus {
  border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-soft);
}
.edit-row input[readonly] {
  background: var(--code-bg); color: var(--text-dim);
  cursor: not-allowed;
}
.edit-actions {
  display: flex; gap: 6px; margin-top: 4px;
}
.edit-actions button {
  padding: 6px 12px; font-size: 12px; font-family: inherit;
  border: 1px solid var(--border); border-radius: 5px;
  background: var(--surface); color: var(--text);
  cursor: pointer;
}
.edit-actions button[data-action="save"] {
  background: var(--accent); color: #fff; border-color: var(--accent); font-weight: 600;
}
.edit-actions button[data-action="reset"] {
  margin-left: auto; color: #ef4444; border-color: transparent;
}
.edit-actions button:hover { opacity: 0.85; }

/* ───── Sentence practice (造句) inside edit form ───── */
.edit-form .sentence-section {
  padding-top: 12px; margin-top: 6px;
  border-top: 1px dashed var(--border);
}
.sentence-prompt-row {
  display: flex; gap: 8px; align-items: stretch;
  margin-bottom: 6px;
}
.sentence-prompt {
  flex: 1; padding: 8px 12px;
  background: var(--accent-soft); color: var(--text);
  border-left: 3px solid var(--accent);
  font-size: 12px; line-height: 1.5;
  border-radius: 0 5px 5px 0;
}
.sentence-prompt b { color: var(--accent); font-family: 'SF Mono', Menlo, monospace; font-weight: 700; }
.sentence-rotate {
  background: var(--surface); border: 1px solid var(--border);
  color: var(--text-dim); width: 30px; height: 30px;
  border-radius: 50%; cursor: pointer;
  font-size: 14px; font-family: inherit;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.sentence-rotate:hover { background: var(--accent-soft); color: var(--accent); border-color: var(--accent); }
.sentence-save {
  background: var(--accent); color: #fff;
  border: none; border-radius: 5px;
  padding: 6px 14px; font-size: 12px; font-weight: 600;
  cursor: pointer; font-family: inherit; letter-spacing: 1px;
  margin-top: 4px; align-self: flex-start;
}
.sentence-save:hover { opacity: 0.88; }
.past-sentences {
  display: flex; flex-direction: column; gap: 5px;
  margin-top: 10px;
}
.past-sentences:empty { display: none; }
.past-sentence {
  font-size: 12px; color: var(--text);
  background: var(--surface);
  border-left: 2px solid var(--accent);
  padding: 6px 10px;
  border-radius: 0 5px 5px 0;
  display: flex; gap: 6px; align-items: center;
  font-family: -apple-system, sans-serif; line-height: 1.5;
}
.past-sentence .text { flex: 1; }
.past-sentence .del-sentence {
  background: none; border: none; cursor: pointer;
  color: var(--text-dim); font-size: 14px;
  padding: 0 4px; line-height: 1;
}
.past-sentence .del-sentence:hover { color: #ef4444; }
.add-term-btn {
  background: rgba(29,158,117,0.06);
  border: 1px dashed var(--accent);
  color: var(--accent);
  font-family: inherit;
  font-size: 13px; font-weight: 600;
  padding: 12px 14px;
  border-radius: 8px;
  cursor: pointer;
  transition: background 0.15s;
}
.add-term-btn:hover { background: rgba(29,158,117,0.12); }
.term.is-user::before {
  content: '✚'; position: absolute; top: -6px; right: -6px;
  background: var(--accent); color: #fff;
  width: 16px; height: 16px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 9px; font-weight: 700;
}
.term.is-user.is-favorite::before {
  content: '★'; background: #f59e0b;
}

/* ───── Practice drawer (inline mini-game) ───── */
.term .actions .play:hover { color: var(--accent); }
.term.is-practicing { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-soft); }
.practice-drawer {
  background: var(--code-bg);
  border: 1px solid var(--accent);
  border-radius: 12px;
  padding: 14px;
  margin-top: -2px;
  box-shadow: 0 2px 12px rgba(29,158,117,0.08);
}
.practice-head {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 12px;
  padding-bottom: 8px;
  border-bottom: 1px dashed var(--border);
}
.practice-title { font-size: 13px; color: var(--text-dim); }
.practice-title strong {
  color: var(--accent);
  font-family: 'SF Mono', 'JetBrains Mono', Menlo, monospace;
  font-size: 15px; margin-left: 6px;
}
.practice-close {
  background: none; border: none; cursor: pointer;
  color: var(--text-dim); font-size: 20px; line-height: 1;
  padding: 2px 8px;
}
.practice-close:hover { color: #ef4444; }
.practice-step {
  font-size: 11px; color: var(--text-dim);
  margin: 8px 0 4px; letter-spacing: 1px;
}
.practice-letters {
  display: flex; flex-wrap: wrap; align-items: center;
  gap: 0; padding: 10px;
  background: var(--surface);
  border-radius: 8px;
  margin-bottom: 10px;
  user-select: none;
}
.practice-letters .p-letter {
  font-family: 'SF Mono', 'JetBrains Mono', Menlo, monospace;
  font-size: 22px; font-weight: 700;
  padding: 4px 6px; color: var(--text);
}
.practice-letters .p-gap {
  background: transparent; border: none;
  color: var(--text-dim); font-size: 16px;
  padding: 6px 4px; cursor: pointer;
  font-family: inherit; min-width: 14px;
}
.practice-letters .p-gap:hover { color: var(--accent); }
.practice-letters .p-gap.active { color: var(--accent); font-weight: 900; }
.practice-letters .p-gap:disabled { cursor: default; opacity: 0.7; }
.practice-preview {
  display: flex; flex-wrap: wrap; gap: 8px;
  padding: 10px; min-height: 70px;
  background: var(--surface);
  border-radius: 8px;
  margin-bottom: 12px;
}
.practice-preview .p-hint {
  font-size: 12px; color: var(--text-dim);
  display: flex; align-items: center;
}
.practice-preview .p-slot {
  display: flex; flex-direction: column; gap: 4px; min-width: 70px;
}
.practice-preview .p-syl {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 12px;
  font-family: 'SF Mono', 'JetBrains Mono', Menlo, monospace;
  font-size: 18px; font-weight: 600;
  color: var(--text);
  cursor: pointer;
  width: 100%;
  text-align: center;
}
.practice-preview .p-syl:hover { border-color: var(--accent); }
.practice-preview .p-syl.stress {
  background: linear-gradient(135deg, rgba(245,158,11,0.18), rgba(245,158,11,0.06));
  border-color: #f59e0b;
  color: #b45309;
  text-transform: uppercase;
  font-weight: 800;
}
.practice-preview .p-syl:disabled { cursor: default; }
.practice-preview .p-romaji {
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: 'SF Mono', monospace;
  font-size: 12px;
  text-align: center;
  padding: 5px;
  border-radius: 5px;
  outline: none;
  width: 100%; min-width: 0;
}
.practice-preview .p-romaji:focus { border-color: var(--accent); box-shadow: 0 0 6px rgba(29,158,117,0.18); }
.practice-preview .p-romaji::placeholder { color: var(--text-dim); opacity: 0.5; }
.practice-preview .p-romaji:disabled { opacity: 0.7; }
.practice-actions {
  display: flex; gap: 8px; justify-content: center;
}
.practice-actions button {
  padding: 8px 18px;
  font-size: 12px; font-weight: 600;
  border: 1px solid var(--border);
  border-radius: 6px;
  background: var(--surface);
  color: var(--text);
  cursor: pointer;
  font-family: inherit; letter-spacing: 1px;
}
.practice-actions button.primary {
  background: var(--accent); color: #fff; border-color: var(--accent);
}
.practice-actions button:hover { opacity: 0.88; }

.practice-result {
  margin-top: 14px; padding-top: 14px;
  border-top: 1px dashed var(--border);
}
.p-rc-rank {
  font-size: 64px; font-weight: 900;
  text-align: center; line-height: 1;
  margin-bottom: 4px; letter-spacing: -3px;
}
.p-rc-rank.s { color: #f59e0b; text-shadow: 0 0 14px rgba(245,158,11,0.4); }
.p-rc-rank.a { color: var(--accent); text-shadow: 0 0 12px rgba(29,158,117,0.3); }
.p-rc-rank.b { color: #10b981; }
.p-rc-rank.c { color: var(--text-dim); }
.p-rc-rank.d { color: #ef4444; }
.p-rc-score {
  text-align: center; font-size: 11px; color: var(--text-dim);
  letter-spacing: 2px; margin-bottom: 14px;
}
.p-rc-section { margin-bottom: 12px; }
.p-rc-label {
  font-size: 10px; color: var(--text-dim); letter-spacing: 2px;
  margin-bottom: 5px;
}
.p-rc-src { color: var(--accent); opacity: 0.75; font-weight: 600; }
.p-rc-cards { display: flex; flex-wrap: wrap; gap: 6px; }
.p-rc-slot { display: flex; flex-direction: column; gap: 3px; min-width: 62px; }
.p-rc-syl {
  font-family: 'SF Mono', monospace;
  font-size: 14px; font-weight: 600;
  padding: 7px 12px; border-radius: 6px;
  background: var(--bg);
  border: 1px solid var(--border);
  color: var(--text);
  text-align: center;
}
.p-rc-syl.match { border-color: #10b981; color: #10b981; background: rgba(16,185,129,0.07); }
.p-rc-syl.stress {
  background: linear-gradient(135deg, rgba(245,158,11,0.2), rgba(245,158,11,0.08));
  border-color: #f59e0b; color: #b45309;
  font-weight: 800; text-transform: uppercase;
}
.p-rc-syl.miss.stress { background: rgba(239,68,68,0.1); border-color: #ef4444; color: #ef4444; }
.p-rc-romaji {
  font-size: 11px; color: var(--text-dim);
  font-family: 'SF Mono', monospace;
  text-align: center;
  padding: 3px 4px;
  background: var(--surface);
  border-radius: 4px;
}
.p-rc-romaji.answer { color: var(--accent); font-weight: 600; }
.p-rc-breakdown {
  font-size: 11px; color: var(--text-dim);
  padding-top: 8px; border-top: 1px dashed var(--border);
  margin-top: 10px; line-height: 1.7;
}
.p-rb-row { display: flex; justify-content: space-between; }
.p-rb-row .pos { color: var(--accent); font-weight: 600; }
.p-rb-row .neg { color: #ef4444; font-weight: 600; }
.p-rb-row.total {
  font-weight: 700; color: var(--text); font-size: 13px;
  padding-top: 6px; border-top: 1px solid var(--border); margin-top: 6px;
}
.p-rc-actions {
  display: flex; gap: 8px; justify-content: center; margin-top: 14px;
}
.p-rc-actions button {
  padding: 8px 18px;
  font-size: 12px; font-weight: 600;
  border: 1px solid var(--border);
  border-radius: 6px;
  background: var(--surface);
  color: var(--text);
  cursor: pointer;
  font-family: inherit;
}
.p-rc-actions button:hover { opacity: 0.88; }
.term .actions {
  margin-left: auto;
  display: flex; gap: 2px;
  flex-shrink: 0;
}
.term .actions button {
  background: none; border: none; cursor: pointer;
  padding: 4px 6px; font-size: 14px;
  color: var(--text-dim); opacity: 0.45;
  transition: opacity 0.15s, color 0.15s, background 0.15s;
  border-radius: 4px;
  line-height: 1; font-family: inherit;
  min-width: 28px; min-height: 28px;
}
.term:hover .actions button,
.term .actions button:hover,
.term .actions button:focus,
.term.is-favorite .actions .fav { opacity: 1; }
.term .actions button:hover { background: var(--code-bg); }
.term .actions .fav.is-on { color: #f59e0b; }
.term .actions .del:hover { color: #ef4444; }
.term .actions .del.is-undo { color: var(--accent); opacity: 1; }
.term .actions .speak:hover { color: var(--accent); }
.term .actions .speak.is-playing {
  color: var(--accent); opacity: 1;
  animation: pulse 0.8s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.15); }
}
.term.is-favorite { border-color: #f59e0b66; }
.term.is-favorite::before {
  content: '★'; position: absolute; top: -6px; left: -6px;
  background: #f59e0b; color: #fff;
  width: 18px; height: 18px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 10px;
}
.term.hidden-search { display: none; }
.term.is-deleted { display: none; }
body.show-deleted .term.is-deleted:not(.hidden-search) {
  display: block; opacity: 0.5; background: var(--bg);
}
body.show-deleted .term.is-deleted::after {
  content: '已删除'; position: absolute; top: 8px; right: 60px;
  font-size: 10px; color: var(--text-dim);
  background: var(--border); padding: 2px 6px; border-radius: 3px;
}
section.empty { display: none; }
section#favorites { display: none; }
section#favorites.show { display: block; }
section#favorites h2 { color: #d97706; border-bottom-color: #f59e0b; }
.deleted-toggle {
  display: none;
  background: none; border: 1px dashed var(--border);
  color: var(--text-dim); padding: 4px 10px;
  border-radius: 6px; cursor: pointer;
  font-size: 12px; font-family: inherit;
}
.deleted-toggle.show { display: inline-block; }
.deleted-toggle.is-on { background: var(--accent-soft); border-style: solid; border-color: var(--accent); color: var(--accent); }
.no-results {
  text-align: center; padding: 40px 20px;
  color: var(--text-dim); font-size: 14px;
  display: none;
}
.no-results.show { display: block; }
footer {
  text-align: center; padding: 24px 16px;
  color: var(--text-dim); font-size: 12px;
  border-top: 1px solid var(--border);
}
@media print {
  header { position: static; }
  .search, nav.cats, .theme-toggle, .deleted-toggle, .term .actions { display: none; }
  .term { break-inside: avoid; box-shadow: none; }
  .term.is-deleted { display: none !important; }
  section { break-inside: avoid-page; }
}
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="title-row">
      <h1>Vibe Coding <span class="accent">名词表</span> · 中英对照</h1>
      <div style="display:flex;gap:6px;">
        <button class="deleted-toggle" id="delToggle">回收站 0</button>
        <button class="theme-toggle" id="themeBtn">🌙 暗色</button>
      </div>
    </div>
    <input type="text" class="search" id="search" placeholder="搜索英文 / 中文 / 释义…">
    <nav class="cats" id="catsNav"></nav>
  </div>
</header>

function getMergedTerms(cat) {
  const builtin = cat.terms.slice();
  const user = state.userTerms[cat.id] || [];
  return builtin.concat(user.map(t => [t.en, t.zh, t.hint || '']));
}

function isUserTerm(catId, en) {
  const arr = state.userTerms[catId] || [];
  return arr.some(t => t.en === en);
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function getTermData(catId, en) {
  const cat = DATA.find(c => c.id === catId);
  if (!cat) return null;
  let orig = cat.terms.find(t => t[0] === en);
  if (!orig) {
    const userArr = state.userTerms[catId] || [];
    const u = userArr.find(t => t.en === en);
    if (u) orig = [u.en, u.zh, u.hint || ''];
  }
  if (!orig) return null;
  const edit = state.edits[catId + '::' + en] || {};
  // 字典里有该词 → 默认填罗马注音; 用户编辑了则用用户的
  const dictEntry = (typeof lookupDict === 'function') ? lookupDict(en) : null;
  const dictRomaji = dictEntry ? dictEntry.romaji.join('·') : '';
  return {
    en: orig[0],
    zh: edit.zh !== undefined ? edit.zh : orig[1],
    hint: edit.hint !== undefined ? edit.hint : (orig[2] || ''),
    phonetic: edit.phonetic !== undefined ? edit.phonetic : dictRomaji,
    note: edit.note || '',
    sentences: Array.isArray(edit.sentences) ? edit.sentences : [],
    edited: Object.keys(edit).length > 0,
    dictRomaji
  };
}

const SENTENCE_PROMPTS = [
  '用 <b>{en}</b> 造一个英文句子。',
  '用 <b>{en}</b> 写一句和工作 / 学习相关的话。',
  '造一句包含 <b>{en}</b> 的过去时句子(过去发生的事)。',
  '造一句包含 <b>{en}</b> 的疑问句。',
  '用 <b>{en}</b> 描述一个最近的经历。',
  '把 <b>{en}</b> 放进一个 15-20 字的英文长句里。',

  '用 <b>{en}</b> + 形容词,造一个表达观点的句子。'
];
function buildSentencePrompt(idx, en, zh) {
  const tpl = SENTENCE_PROMPTS[idx % SENTENCE_PROMPTS.length];
  let s = tpl.replace('{en}', escapeHtml(en));
  if (zh) s += ' <span style="color:var(--text-dim);">(中文:' + escapeHtml(zh) + ')</span>';
  return s;
}

function searchKey(d) {
  return [d.en, d.zh, d.hint, d.phonetic, d.note].join(' ').toLowerCase();
}

  card.classList.remove('is-editing');
  card.classList.toggle('is-edited', d.edited);

let _enVoice = null;
function pickEnVoice() {
  if (_enVoice) return _enVoice;
  const voices = speechSynthesis.getVoices();
  _enVoice = voices.find(v => /en[-_]US/i.test(v.lang) && /female|samantha|google/i.test(v.name)) ||
             voices.find(v => /en[-_]US/i.test(v.lang)) ||
             voices.find(v => /^en/i.test(v.lang)) || null;
  return _enVoice;
}
if (typeof speechSynthesis !== 'undefined') {
  speechSynthesis.addEventListener('voiceschanged', () => { _enVoice = null; pickEnVoice(); });
}

function speakTerm(text, btn) {
  if (typeof speechSynthesis === 'undefined') {
    alert('浏览器不支持朗读 (Web Speech API)');
    return;
  }
  speechSynthesis.cancel();
  document.querySelectorAll('.speak.is-playing').forEach(b => b.classList.remove('is-playing'));
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'en-US';
  u.rate = 0.85;
  u.pitch = 1;
  const v = pickEnVoice();
  if (v) u.voice = v;
  if (btn) {
    btn.classList.add('is-playing');
    u.onend = u.onerror = () => btn.classList.remove('is-playing');
  }
  speechSynthesis.speak(u);
}

      if (c) c.textContent = getGroupTermCount(group.id) + ' 个词 / ' + DATA.filter(c => c.group === group.id).length + ' 子类';
    }
  }
}

function applySearch() {
  const q = state.query;
  let visible = 0;
  document.querySelectorAll('.term').forEach(t => {
    const match = !q || t.dataset.search.includes(q);
    t.classList.toggle('hidden-search', !match);
    if (match && !t.classList.contains('is-deleted')) visible++;
  });
  document.querySelectorAll('section[data-cat]').forEach(sec => {
    const any = [...sec.querySelectorAll('.term')].some(t =>
      !t.classList.contains('hidden-search') &&
      (!t.classList.contains('is-deleted') || state.showDeleted)
    );
    sec.classList.toggle('empty', !any);
  });

    const any = [...favGrid.querySelectorAll('.term')].some(t =>
      !t.classList.contains('hidden-search') &&
      (!t.classList.contains('is-deleted') || state.showDeleted)
    );
    favSection.classList.toggle('empty-search', !any && q);
    if (!any && q) favSection.style.display = 'none';
    else favSection.style.display = '';
  }
  noResults.classList.toggle('show', visible === 0 && q.length > 0);
}

}

/* ============================================================
   PRACTICE MODE — inline mini-game per card
   ============================================================ */
const VOWELS = 'aeiouy';
const DIGRAPHS = ['ch','sh','th','ph','wh','ng','ck','qu','gh'];
const UNSTRESSED_PREFIXES = ['de','re','dis','pre','mis','ex','en','com','con','ob','be','sub'];

function syllabify(word) {
  const w = word.toLowerCase().replace(/[^a-z]/g, '');
  if (!w) return [];
  const groups = [];
  let cur = '', st = null;
  for (const ch of w) {
    const t = VOWELS.includes(ch) ? 'V' : 'C';
    if (st && t === st) cur += ch;
    else { if (cur) groups.push({t: st, s: cur}); cur = ch; st = t; }
  }
  if (cur) groups.push({t: st, s: cur});
  const syls = []; let buf = '';
  for (let i = 0; i < groups.length; i++) {
    const g = groups[i];
    if (g.t === 'V') { buf += g.s; }
    else {
      const next = groups[i+1];
      if (!next) buf += g.s;
      else if (!buf) buf = g.s;
      else if (g.s.length === 1) { syls.push(buf); buf = g.s; }
      else {
        const ending = g.s.slice(-2);
        if (DIGRAPHS.includes(ending) && g.s.length === 2) { syls.push(buf); buf = g.s; }
        else if (g.s.length >= 3 && DIGRAPHS.includes(g.s.slice(-2))) {
          buf += g.s.slice(0, -2); syls.push(buf); buf = g.s.slice(-2);
        } else { buf += g.s[0]; syls.push(buf); buf = g.s.slice(1); }
      }
    }
  }
  if (buf) syls.push(buf);
  if (syls.length >= 2) {
    const last = syls[syls.length-1];
    if (/^[bcdfghjklmnpqrstvwxz]e$/.test(last) || last === 'e') {
      syls[syls.length-2] += last; syls.pop();
    }
  }
  while (syls.length >= 2 && !/[aeiouy]/.test(syls[syls.length-1])) {
    syls[syls.length-2] += syls[syls.length-1]; syls.pop();
  }
  return syls.length ? syls : [w];
}

function pickStress(syls, full) {
  const n = syls.length;
  if (n <= 1) return 0;
  const lower = full.toLowerCase();
  if (n >= 3 && /(ity|ical|ically|opathy|ography|ology|onomy|ocracy)$/.test(lower)) return n - 3;
  if (n >= 3 && /(ate|ize|ise|ify)$/.test(lower)) return n - 3;
  if (/(tion|sion|cian|cial|tial|cious|tious|gious|ious|eous|ic|ial|ient|ience|graphy)$/.test(lower)) return Math.max(0, n - 2);
  if (/(ee|eer|ese|esque|ique|aire|oon|een)$/.test(lower)) return n - 1;
  if (n >= 2 && n <= 3 && UNSTRESSED_PREFIXES.includes(syls[0].toLowerCase())) return 1;
  if (n === 2) return 0;
  if (n === 3) return 0;
  return 1;
}

function parseStressFromIPA(ipa, maxIdx) {
  if (!ipa) return null;
  const inner = String(ipa).replace(/[\/\[\]]/g, '').trim();
  if (!inner.includes('ˈ')) return null;
  const before = inner.split('ˈ')[0];
  const clusters = before.match(/[aeiouɪɛæɑɒɔʊʌəɜɚyøœɨɯ]+/gi);
  const idx = clusters ? clusters.length : 0;
  return Math.min(idx, maxIdx);
}

/* Romaji 罗马注音 → stress index: 找全大写音节 */
function parseStressFromRomaji(romaji, maxIdx) {
  if (!romaji) return null;
  const parts = String(romaji).split(/[·\-\s\/]+/).filter(Boolean);
  if (parts.length === 0) return null;
  for (let i = 0; i < parts.length; i++) {
    const p = parts[i];
    if (/[A-Z]/.test(p) && p === p.toUpperCase()) {
      return Math.min(i, maxIdx);
    }
  }
  return null;
}

function syllablesToBounds(syls) {
  const bounds = []; let acc = 0;
  for (let i = 0; i < syls.length - 1; i++) { acc += syls[i].length; bounds.push(acc - 1); }
  return bounds;
}

function dictKey(en) { return String(en).toLowerCase().replace(/[^a-z]/g, ''); }
function lookupDict(en) {
  const dict = (typeof window !== 'undefined' && window.ROMAJI_DICT) || {};
  return dict[dictKey(en)] || null;
}

let practiceState = null;

function closePractice() {
  if (!practiceState) return;
  if (practiceState.card) practiceState.card.classList.remove('is-practicing');
  if (practiceState.drawer && practiceState.drawer.parentNode) {
    practiceState.drawer.parentNode.removeChild(practiceState.drawer);
  }
  practiceState = null;
}

function openPractice(card) {
  closePractice();
  const id = card.dataset.id;
  const [catId, en] = id.split('::');
  const d = getTermData(catId, en);
  if (!d) return;
  const dictEntry = lookupDict(en);
  let answerSyls, answerRomaji, answerStressIdx, answerSource;
  if (dictEntry) {
    answerSyls = dictEntry.syls.slice();
    answerRomaji = dictEntry.romaji.slice();
    answerStressIdx = dictEntry.romaji.findIndex(r => r === r.toUpperCase() && /[A-Z]/.test(r));
    if (answerStressIdx < 0) answerStressIdx = 0;
    answerSource = 'dict';
  } else {
    answerSyls = syllabify(en);
    const romajiIdx = parseStressFromRomaji(d.phonetic, answerSyls.length - 1);
    const ipaIdx = parseStressFromIPA(d.phonetic, answerSyls.length - 1);
    answerStressIdx = (romajiIdx !== null) ? romajiIdx
                    : (ipaIdx !== null) ? ipaIdx
                    : pickStress(answerSyls, en);
    answerRomaji = answerSyls.map((s, i) => i === answerStressIdx ? s.toUpperCase() : s.toLowerCase());
    answerSource = (romajiIdx !== null) ? 'romaji'
                 : (ipaIdx !== null) ? 'ipa'
                 : 'heuristic';
  }
  practiceState = {
    card, id, catId, en,
    letters: en.split(''),
    answerSyls, answerRomaji, answerStressIdx, answerSource,
    answerBounds: syllablesToBounds(answerSyls),
    playerBounds: new Set(), playerStressIdx: -1, playerRomaji: [],
    submitted: false
  };
  const drawer = document.createElement('div');
  drawer.className = 'practice-drawer';
  drawer.style.gridColumn = '1 / -1';
  drawer.innerHTML =
    '<div class="practice-head">' +
      '<span class="practice-title">▶ 练:<strong>' + escapeHtml(en) + '</strong></span>' +
      '<button class="practice-close" data-action="practice-close" aria-label="关闭">×</button>' +
    '</div>' +
    '<div class="practice-step">① 点字母之间的 · 切音节</div>' +
    '<div class="practice-letters" data-role="letters"></div>' +
    '<div class="practice-step">② 点音节卡标重音 (金色) · ③ 填罗马音</div>' +
    '<div class="practice-preview" data-role="preview"></div>' +
    '<div class="practice-actions">' +
      '<button class="primary" data-action="practice-submit">▶ 提交</button>' +
      '<button data-action="practice-reset">↻ 重切</button>' +
    '</div>' +
    '<div class="practice-result" data-role="result" style="display:none;"></div>';
  card.parentNode.insertBefore(drawer, card.nextSibling);
  card.classList.add('is-practicing');
  practiceState.drawer = drawer;
  renderPracticeLetters();
  renderPracticePreview();
  drawer.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function renderPracticeLetters() {
  if (!practiceState) return;
  const row = practiceState.drawer.querySelector('[data-role="letters"]');
  row.innerHTML = '';
  practiceState.letters.forEach((ch, i) => {
    const letterEl = document.createElement('span');
    letterEl.className = 'p-letter';
    letterEl.textContent = ch;
    row.appendChild(letterEl);
    if (i < practiceState.letters.length - 1) {
      const gap = document.createElement('button');
      const active = practiceState.playerBounds.has(i);
      gap.className = 'p-gap' + (active ? ' active' : '');
      gap.textContent = active ? '|' : '·';
      gap.dataset.action = 'practice-split';
      gap.dataset.i = i;
      gap.disabled = practiceState.submitted;
      row.appendChild(gap);
    }
  });
}

function getPracticePlayerSyls() {
  const ps = practiceState;
  const sorted = [...ps.playerBounds].sort((a, b) => a - b);
  const syls = [];
  let cur = '';
  for (let i = 0; i < ps.letters.length; i++) {
    cur += ps.letters[i];
    if (sorted.includes(i) && i < ps.letters.length - 1) { syls.push(cur); cur = ''; }
  }
  if (cur) syls.push(cur);
  return syls;
}

function renderPracticePreview() {
  if (!practiceState) return;
  const preview = practiceState.drawer.querySelector('[data-role="preview"]');
  preview.innerHTML = '';
  const syls = getPracticePlayerSyls();
  if (syls.length === 1 && practiceState.playerBounds.size === 0) {
    const hint = document.createElement('div');
    hint.className = 'p-hint';
    hint.textContent = '先切分上面的字母 (' + practiceState.letters.length + ' 个字母)';
    preview.appendChild(hint);
    return;
  }
  syls.forEach((s, i) => {
    const slot = document.createElement('div');
    slot.className = 'p-slot';
    const sylBtn = document.createElement('button');
    sylBtn.className = 'p-syl' + (i === practiceState.playerStressIdx ? ' stress' : '');
    sylBtn.textContent = s;
    sylBtn.dataset.action = 'practice-stress';
    sylBtn.dataset.i = i;
    sylBtn.disabled = practiceState.submitted;
    const input = document.createElement('input');
    input.type = 'text';
    input.className = 'p-romaji';
    input.placeholder = '罗马音';
    input.value = practiceState.playerRomaji[i] || '';
    input.disabled = practiceState.submitted;
    input.autocomplete = 'off';
    input.spellcheck = false;
    input.oninput = e => { practiceState.playerRomaji[i] = e.target.value; };
    slot.appendChild(sylBtn);
    slot.appendChild(input);
    preview.appendChild(slot);
  });
}

function submitPractice() {
  if (!practiceState || practiceState.submitted) return;
  practiceState.submitted = true;
  const ps = practiceState;
  const playerSyls = getPracticePlayerSyls();
  const playerBounds = syllablesToBounds(playerSyls);
  const aSet = new Set(ps.answerBounds);
  const pSet = new Set(playerBounds);
  const correctBounds = [...pSet].filter(b => aSet.has(b));
  const extraBounds = [...pSet].filter(b => !aSet.has(b));
  const missedBounds = [...aSet].filter(b => !pSet.has(b));
  const boundPoints = correctBounds.length * 30;
  const extraPenalty = extraBounds.length * 15;
  const missedPenalty = missedBounds.length * 10;
  const stressOK = (playerSyls.length === ps.answerSyls.length) && (ps.playerStressIdx === ps.answerStressIdx);
  const stressPoints = stressOK ? 60 : 0;
  const perfect = (correctBounds.length === ps.answerBounds.length && extraBounds.length === 0 && stressOK);
  const perfectBonus = perfect ? 40 : 0;
  const romajiFilled = ps.playerRomaji.slice(0, playerSyls.length).filter(r => r && r.trim()).length;
  const romajiPoints = romajiFilled * 10;
  const total = Math.max(0, boundPoints - extraPenalty - missedPenalty + stressPoints + perfectBonus + romajiPoints);
  const maxPossible = ps.answerBounds.length * 30 + 60 + 40 + ps.answerSyls.length * 10;
  const ratio = maxPossible > 0 ? total / maxPossible : 0;
  let rank = 'D';
  if (ratio >= 0.95) rank = 'S';
  else if (ratio >= 0.80) rank = 'A';
  else if (ratio >= 0.60) rank = 'B';
  else if (ratio >= 0.40) rank = 'C';

  renderPracticeLetters();
  renderPracticePreview();

  const result = ps.drawer.querySelector('[data-role="result"]');
  result.style.display = '';
  const yourCardsHtml = playerSyls.map((s, i) => {
    const isExact = ps.answerSyls[i] && s.toLowerCase() === ps.answerSyls[i].toLowerCase();
    const isStress = i === ps.playerStressIdx;
    const cls = ['p-rc-syl'];
    if (isExact) cls.push('match');
    if (isStress) cls.push('stress');
    if (isStress && !stressOK) cls.push('miss');
    const txt = (ps.playerRomaji[i] || '').trim();
    const romaji = txt ? escapeHtml(txt) : '—';
    return '<div class="p-rc-slot"><div class="' + cls.join(' ') + '">' + escapeHtml(s) + '</div><div class="p-rc-romaji">' + romaji + '</div></div>';
  }).join('');
  const answerCardsHtml = ps.answerSyls.map((s, i) => {
    const cls = ['p-rc-syl'];
    if (i === ps.answerStressIdx) cls.push('stress');
    return '<div class="p-rc-slot"><div class="' + cls.join(' ') + '">' + escapeHtml(s) + '</div><div class="p-rc-romaji answer">' + escapeHtml(ps.answerRomaji[i]) + '</div></div>';
  }).join('');
  const sourceLabel = ps.answerSource === 'dict'   ? '字典' :
                      ps.answerSource === 'romaji' ? '依据你填的注音' :
                      ps.answerSource === 'ipa'    ? '依据你填的 IPA' :
                                                     '启发式估算';
  const rows = [];
  rows.push('<div class="p-rb-row"><span>切分正确 ' + correctBounds.length + '/' + ps.answerBounds.length + '</span><span class="pos">+' + boundPoints + '</span></div>');
  if (extraPenalty) rows.push('<div class="p-rb-row"><span>多切 ×' + extraBounds.length + '</span><span class="neg">-' + extraPenalty + '</span></div>');
  if (missedPenalty) rows.push('<div class="p-rb-row"><span>漏切 ×' + missedBounds.length + '</span><span class="neg">-' + missedPenalty + '</span></div>');
  rows.push('<div class="p-rb-row"><span>重音 ' + (stressOK ? '✓' : '✗') + '</span><span class="' + (stressOK ? 'pos' : '') + '">' + (stressOK ? '+' : '') + stressPoints + '</span></div>');
  if (romajiPoints) rows.push('<div class="p-rb-row"><span>罗马音 ×' + romajiFilled + '</span><span class="pos">+' + romajiPoints + '</span></div>');
  if (perfectBonus) rows.push('<div class="p-rb-row"><span>完美 bonus</span><span class="pos">+' + perfectBonus + '</span></div>');
  rows.push('<div class="p-rb-row total"><span>TOTAL</span><span>' + total + '</span></div>');

  result.innerHTML =
    '<div class="p-rc-rank ' + rank.toLowerCase() + '">' + rank + '</div>' +
    '<div class="p-rc-score">SCORE ' + total + '</div>' +
    '<div class="p-rc-section">' +
      '<div class="p-rc-label">你的拆分</div>' +
      '<div class="p-rc-cards">' + yourCardsHtml + '</div>' +
    '</div>' +
    '<div class="p-rc-section">' +
      '<div class="p-rc-label">参考答案 <span class="p-rc-src">· ' + sourceLabel + '</span></div>' +
      '<div class="p-rc-cards">' + answerCardsHtml + '</div>' +
    '</div>' +
    '<div class="p-rc-breakdown">' + rows.join('') + '</div>' +
    '<div class="p-rc-actions">' +
      '<button data-action="practice-retry">↻ 再试</button>' +
      '<button data-action="practice-close">完成</button>' +
    '</div>';
  result.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function resetPractice() {
  if (!practiceState) return;
  practiceState.playerBounds = new Set();
  practiceState.playerStressIdx = -1;
  practiceState.playerRomaji = [];
  practiceState.submitted = false;
  const result = practiceState.drawer.querySelector('[data-role="result"]');
  if (result) result.style.display = 'none';
  renderPracticeLetters();
  renderPracticePreview();
}

main.addEventListener('click', e => {
  const btn = e.target.closest('button[data-action]');
  if (!btn) return;
  const action = btn.dataset.action;

  // practice mode actions (some have no card data-id, some do)
  if (action === 'practice-close') { closePractice(); return; }
  if (action === 'practice-submit') { submitPractice(); return; }
  if (action === 'practice-reset' || action === 'practice-retry') { resetPractice(); return; }
  if (action === 'practice-split') {
    if (!practiceState || practiceState.submitted) return;
    const i = parseInt(btn.dataset.i, 10);
    if (practiceState.playerBounds.has(i)) practiceState.playerBounds.delete(i);
    else practiceState.playerBounds.add(i);
    practiceState.playerStressIdx = -1;
    renderPracticeLetters();
    renderPracticePreview();
    return;
  }
  if (action === 'practice-stress') {
    if (!practiceState || practiceState.submitted) return;
    const i = parseInt(btn.dataset.i, 10);
    practiceState.playerStressIdx = (practiceState.playerStressIdx === i) ? -1 : i;
    renderPracticePreview();
    return;
  }

  // add-term flow doesn't have a card data-id
  if (action === 'add-save') {
    const form = btn.closest('form');
    const catId = btn.dataset.cat;
    const en = form.querySelector('[name=en]').value.trim();
    const zh = form.querySelector('[name=zh]').value.trim();
    const hint = form.querySelector('[name=hint]').value.trim();
    if (!en || !zh) { alert('英文和中文都要填'); return; }
    // dedupe within category (built-in + user)
    const cat = DATA.find(c => c.id === catId);
    const existing = getMergedTerms(cat).find(t => t[0].toLowerCase() === en.toLowerCase());
    if (existing) { alert('"' + existing[0] + '" 已在该分类下'); return; }
    if (!state.userTerms[catId]) state.userTerms[catId] = [];
    state.userTerms[catId].push({ en, zh, hint });
    save();
    const newSection = renderCategorySection(cat);
    document.getElementById('cat-' + catId).replaceWith(newSection);
    updateCatNavCount(catId);
    applySearch();
    return;
  }
  if (action === 'add-cancel') {
    const form = btn.closest('.term');
    const catId = form.previousElementSibling ? null : null;
    // simplest: just re-render the category section the form is inside
    const section = form.closest('section[data-cat]');
    if (section) {
      const cat = DATA.find(c => c.id === section.dataset.cat);
      if (cat) {
        const newSection = renderCategorySection(cat);
        section.replaceWith(newSection);
        applySearch();
      }
    }
    return;
  }

  const card = btn.closest('.term');
  if (!card) return;
  const id = card.dataset.id;
  if (!id) return;
  const [catId, en] = id.split('::');

  if (action === 'play') {
    openPractice(card);
    return;
  }

  // 造句 — 换一题
  if (action === 'rotate-prompt') {
    const promptEl = card.querySelector('.sentence-prompt');
    if (!promptEl) return;
    const cur = parseInt(promptEl.dataset.tpl, 10) || 0;
    const next = (cur + 1) % SENTENCE_PROMPTS.length;
    const d = getTermData(catId, en);
    promptEl.dataset.tpl = next;
    promptEl.innerHTML = buildSentencePrompt(next, d.en, d.zh);
    return;
  }

  // 造句 — 记下一句
  if (action === 'save-sentence') {
    const ta = card.querySelector('[name=sentence-input]');
    if (!ta) return;
    const sentence = ta.value.trim();
    if (!sentence) { ta.focus(); return; }
    const existing = state.edits[id] || {};
    const sentences = Array.isArray(existing.sentences) ? existing.sentences.slice() : [];
    sentences.unshift(sentence);  // newest first
    state.edits[id] = Object.assign({}, existing, { sentences });
    save();
    ta.value = '';
    // re-render past sentences list in place
    const past = card.querySelector('[data-role="past-sentences"]');
    if (past) {
      past.innerHTML = sentences.map((s, i) =>
        '<div class="past-sentence"><span class="text">' + escapeHtml(s) + '</span>' +
        '<button class="del-sentence" data-action="del-sentence" data-i="' + i + '" title="删除">×</button></div>'
      ).join('');
    }
    return;
  }

  // 造句 — 删一句
  if (action === 'del-sentence') {
    const i = parseInt(btn.dataset.i, 10);
    const existing = state.edits[id] || {};
    if (!Array.isArray(existing.sentences) || !existing.sentences[i]) return;
    const sentences = existing.sentences.slice();
    sentences.splice(i, 1);
    if (sentences.length) state.edits[id] = Object.assign({}, existing, { sentences });
    else {
      const copy = Object.assign({}, existing);
      delete copy.sentences;
      if (Object.keys(copy).length === 0) delete state.edits[id];
      else state.edits[id] = copy;
    }
    save();
    const past = card.querySelector('[data-role="past-sentences"]');
    if (past) {
      past.innerHTML = sentences.map((s, idx) =>
        '<div class="past-sentence"><span class="text">' + escapeHtml(s) + '</span>' +
        '<button class="del-sentence" data-action="del-sentence" data-i="' + idx + '" title="删除">×</button></div>'
      ).join('');
    }
    return;
  }

  if (action === 'speak') {
    speakTerm(en, btn);
    return;
  }

  if (action === 'edit') {
    document.querySelectorAll('.term.is-editing').forEach(c => {
      if (c.dataset.id !== id) renderCardContent(c);
    });
    renderEditForm(card);
    return;
  }

  if (action === 'cancel') {
    renderCardContent(card);
    return;
  }

  if (action === 'reset') {
    if (!confirm('清除该词的所有自定义内容(罗马注音 / 笔记 / 中文 / 解释)?')) return;
    delete state.edits[id];
    save();
    syncCardsById(id);
    rebuildFavorites();
    applySearch();
    return;
  }

  if (action === 'save') {
    const form = btn.closest('form');
    const cat = DATA.find(c => c.id === catId);
    let orig = cat.terms.find(t => t[0] === en);
    if (!orig) {
      const userArr = state.userTerms[catId] || [];
      const u = userArr.find(t => t.en === en);
      if (u) orig = [u.en, u.zh, u.hint || ''];
    }
    if (!orig) return;
    const get = name => form.querySelector('[name=' + name + ']').value.trim();
    const phonetic = get('phonetic');
    const zh = get('zh');
    const hint = get('hint');
    const note = get('note');
    const edit = {};
    // 跟字典默认相同的话不存,省 localStorage
    const dictEntry = lookupDict(en);
    const dictRomaji = dictEntry ? dictEntry.romaji.join('·') : '';
    if (phonetic && phonetic !== dictRomaji) edit.phonetic = phonetic;
    if (zh && zh !== orig[1]) edit.zh = zh;
    if (hint !== (orig[2] || '')) edit.hint = hint;
    if (note) edit.note = note;
    // 保留已记的造句句子(save-sentence 单独写入 state.edits[id].sentences)
    const prevEdit = state.edits[id] || {};
    if (Array.isArray(prevEdit.sentences) && prevEdit.sentences.length) edit.sentences = prevEdit.sentences;
    if (Object.keys(edit).length === 0) delete state.edits[id];
    else state.edits[id] = edit;
    save();
    syncCardsById(id);
    rebuildFavorites();
    applySearch();
    return;
  }

  if (action === 'fav') {
    if (state.favorites.has(id)) state.favorites.delete(id);
    else state.favorites.add(id);
  } else if (action === 'del') {
    if (state.deleted.has(id)) state.deleted.delete(id);
    else state.deleted.add(id);
  }
  save();
  syncCardsById(id);
  rebuildFavorites();
  updateDelToggle();
  applySearch();
});

search.addEventListener('input', e => {
  state.query = e.target.value.trim().toLowerCase();
  applySearch();
});

delToggle.addEventListener('click', () => {
  state.showDeleted = !state.showDeleted;
  save();
  updateDelToggle();
  applySearch();
});

rebuildFavorites();
updateDelToggle();

/* ============================================================
   跨标签 / iframe 同步 — 另一个 tab 改了 localStorage,这边自动跟上
   ============================================================ */
function reloadFromStorage() {
  state.favorites = new Set(JSON.parse(localStorage.getItem('glossary-favorites') || '[]'));
  state.deleted = new Set(JSON.parse(localStorage.getItem('glossary-deleted') || '[]'));
  state.edits = JSON.parse(localStorage.getItem('glossary-edits') || '{}');
  const newUserTerms = JSON.parse(localStorage.getItem('glossary-user-terms') || '{}');
  state.showDeleted = localStorage.getItem('glossary-show-deleted') === '1';
  // Rebuild categories whose user terms changed
  DATA.forEach(cat => {
    const oldArr = state.userTerms[cat.id] || [];
    const newArr = newUserTerms[cat.id] || [];
    if (oldArr.length !== newArr.length || JSON.stringify(oldArr) !== JSON.stringify(newArr)) {
      const oldSection = document.getElementById('cat-' + cat.id);
      state.userTerms[cat.id] = newArr;
      if (oldSection) {
        const newSection = renderCategorySection(cat);
        oldSection.replaceWith(newSection);
        updateCatNavCount(cat.id);
      }
    }
  });
  state.userTerms = newUserTerms;
  // Re-render existing cards (skip ones being edited so user input isn't wiped)
  document.querySelectorAll('.term:not(.is-editing)').forEach(card => {
    if (card.dataset.id) renderCardContent(card);
  });
  rebuildFavorites();
  updateDelToggle();
  applySearch();
}
window.addEventListener('storage', e => {
  if (e.key && e.key.startsWith('glossary-')) reloadFromStorage();
});

const themeBtn = document.getElementById('themeBtn');
function setTheme(t) {
  document.documentElement.dataset.theme = t;
  themeBtn.textContent = t === 'dark' ? '☀️ 浅色' : '🌙 暗色';
  localStorage.setItem('glossary-theme', t);
}
setTheme(localStorage.getItem('glossary-theme') || (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'));
themeBtn.addEventListener('click', () => {
  setTheme(document.documentElement.dataset.theme === 'dark' ? 'light' : 'dark');
});
</script>
