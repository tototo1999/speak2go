<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>Lexi Studio - 3D 互动元宇宙 (The 3D Lounge Sandbox)</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #050608;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    #canvas3d {
      width: 100%;
      height: 100%;
      display: block;
    }
    /* HUD overlay */
    #hud {
      position: absolute;
      top: 20px;
      left: 20px;
      pointer-events: none;
      color: #34d399; /* emerald */
      font-family: monospace;
      font-size: 12px;
      z-index: 10;
      background: rgba(0,0,0,0.6);
      padding: 15px;
      border-radius: 8px;
      border: 1px solid rgba(52, 211, 153, 0.3);
      backdrop-filter: blur(5px);
    }
    #hud h2 {
      margin: 0 0 8px 0;
      font-size: 14px;
      color: #fff;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .status-dot {
      width: 8px;
      height: 8px;
      background: #ec4899; /* pink default */
      border-radius: 50%;
      box-shadow: 0 0 10px #ec4899;
      display: inline-block;
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(1.1); }
    }
    /* Controls helper overlay */
    #instructions {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #fff;
      text-align: center;
      z-index: 100;
      background: rgba(0,0,0,0.85);
      padding: 30px 40px;
      border-radius: 12px;
      border: 1px solid rgba(236,72,153,0.3);
      box-shadow: 0 10px 40px rgba(0,0,0,0.5);
      cursor: pointer;
      backdrop-filter: blur(10px);
      transition: opacity 0.3s;
    }
    #instructions h1 {
      margin-top: 0;
      font-size: 22px;
      color: #ec4899; /* Neon pink */
      text-shadow: 0 0 10px rgba(236,72,153,0.4);
    }
    #instructions p {
      font-size: 13px;
      color: #9ca3af;
      line-height: 1.6;
    }
    .key-btn {
      background: #1f2937;
      border: 1px solid #374151;
      padding: 2px 6px;
      border-radius: 4px;
      font-family: monospace;
      color: #fff;
    }
    /* Interaction prompt in center */
    #interaction-prompt {
      position: absolute;
      bottom: 15%;
      left: 50%;
      transform: translateX(-50%);
      color: #fff;
      font-family: monospace;
      font-size: 14px;
      z-index: 10;
      background: rgba(236, 72, 153, 0.8);
      padding: 8px 16px;
      border-radius: 6px;
      border: 1px solid #ff79c6;
      box-shadow: 0 0 15px rgba(236, 72, 153, 0.4);
      display: none;
      pointer-events: none;
      animation: float 2s infinite alternate;
    }
    @keyframes float {
      0% { transform: translate(-50%, 0px); }
      100% { transform: translate(-50%, -6px); }
    }
    /* Dialog screen overlay */
    #dialog-overlay {
      position: absolute;
      bottom: 25px;
      left: 50%;
      transform: translateX(-50%);
      width: 90%;
      max-width: 600px;
      background: rgba(15, 17, 21, 0.9);
      border: 1px solid rgba(52, 211, 153, 0.3);
      border-radius: 10px;
      padding: 15px 20px;
      color: #eaeaea;
      font-family: monospace;
      font-size: 13px;
      z-index: 10;
      display: none;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      backdrop-filter: blur(10px);
    }
    #dialog-sender {
      font-weight: bold;
      color: #ec4899;
      margin-bottom: 6px;
    }
    #crosshair {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 6px;
      height: 6px;
      background: rgba(255,255,255,0.4);
      border-radius: 50%;
      pointer-events: none;
      z-index: 5;
    }
    /* Exit Button */
    #exit-btn {
      position: absolute;
      top: 20px;
      right: 20px;
      z-index: 10;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.15);
      color: #eaeaea;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      text-decoration: none;
      font-size: 12px;
      font-family: monospace;
      transition: all 0.2s;
    }
    #exit-btn:hover {
      background: #ec4899;
      border-color: #ec4899;
      color: #fff;
      box-shadow: 0 0 15px rgba(236,72,153,0.3);
    }
  </style>
  <!-- Three.js CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

  <div id="crosshair"></div>
  <a href="lexi_apartment_lounge.html" id="exit-btn">退出高空天台</a>

  <div id="hud">
    <h2><span class="status-dot" id="hud-dot" style="background:#ec4899; box-shadow:0 0 10px #ec4899;"></span> <span id="hud-title">纽约云端天台派对 (NYC Penthouse Party)</span></h2>
    <div>[AGY] 智能总指挥在线</div>
    <div style="margin-top: 8px;">状态码: <span style="color:#fff;">200 OK</span></div>
    <div>音乐律动: <span id="hud-tempo" style="color:#fff;">深邃日落 House (90 BPM)</span></div>
    <div style="margin-top: 8px;">
      100万上下文已用限制: <br>
      <span style="color: #ec4899; font-weight: bold;">218.6K / 1.00M Token (21.8%)</span>
    </div>
  </div>

  <div id="instructions">
    <h1>Lexi Studio 3D 曼哈顿天台</h1>
    <p>
      请点击屏幕进入沉浸式第一人称高空派对<br><br>
      <span class="key-btn">W</span> <span class="key-btn">A</span> <span class="key-btn">S</span> <span class="key-btn">D</span> / 方向键 移动角色<br>
      移动鼠标 环顾四周<br>
      靠近首席调酒大师或DJ，按 <span class="key-btn">E</span> 或 <span class="key-btn">Q</span> 进行交互与日落余晖切换<br><br>
      <strong style="color: #ec4899;">点击任意位置开启旅程</strong>
    </p>
  </div>

  <div id="interaction-prompt">按 E 键对话</div>

  <div id="dialog-overlay">
    <div id="dialog-sender">【大楼前台】</div>
    <div id="dialog-content">欢迎回家！请在终端出示您的 CSRF 安全凭证...</div>
  </div>

  <canvas id="canvas3d"></canvas>

  <script>
    // 3D Engine Setup
    let scene, camera, renderer;
    let playerGroup = null; // 第三人称 Avatar Group (红发少女 Lexi)
    let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false;
    let prevTime = performance.now();
    let velocity = new THREE.Vector3();
    let direction = new THREE.Vector3();
    let currentMood = 'sunset'; // 'sunset' or 'twilight'

    // Interactive NPCs list
    let npcs = [];
    let currentActiveNpc = null;

    // First person mouse-look variables
    let pitchObject = new THREE.Object3D();
    let yawObject = new THREE.Object3D();
    const PI_2 = Math.PI / 2;

    // ── Web Audio API 实时合成音频引擎 ──
    let audioCtx = null;
    let schedulerTimer = null;
    let nextNoteTime = 0.0;
    let beatCount = 0;
    const chords = [
      [110, 165, 196, 246], // Am9
      [146, 196, 220, 293], // Dm9
      [98, 146, 174, 246],  // G13
      [130, 196, 246, 261]  // Cmaj9
    ];
    let currentChordIdx = 0;

    function initAudio() {
      if (audioCtx) return;
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      
      // 1. 模拟黑胶唱片的沙沙背景电流声 (Procedural Vinyl crackle)
      createVinylNoise();
      
      // 2. 启动步进音序调度器 (Start scheduler)
      nextNoteTime = audioCtx.currentTime;
      scheduler();
    }

    function createVinylNoise() {
      const bufferSize = audioCtx.sampleRate * 2;
      const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
      const data = buffer.getChannelData(0);
      for (let i = 0; i < bufferSize; i++) {
        data[i] = (Math.random() - 0.5) * 0.015; // 细腻的白噪声
      }
      const source = audioCtx.createBufferSource();
      source.buffer = buffer;
      source.loop = true;
      const gain = audioCtx.createGain();
      gain.gain.value = 0.2; // 极轻微的底噪
      source.connect(gain);
      gain.connect(audioCtx.destination);
      source.start();
    }

    function playKick(time) {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      
      if (currentMood === 'sunset') {
        // Deep Sunset House Kick sweep
        osc.frequency.setValueAtTime(140, time);
        osc.frequency.exponentialRampToValueAtTime(0.01, time + 0.28);
        gain.gain.setValueAtTime(0.55, time); // Solid warm house kick volume
        gain.gain.linearRampToValueAtTime(0.0, time + 0.28);
        osc.start(time);
        osc.stop(time + 0.3);
      } else {
        // Soft Twilight wood block click
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(280, time);
        osc.frequency.exponentialRampToValueAtTime(80, time + 0.08);
        gain.gain.setValueAtTime(0.12, time);
        gain.gain.linearRampToValueAtTime(0.0, time + 0.08);
        osc.start(time);
        osc.stop(time + 0.09);
      }
    }

    function playChordSynth(ch, time, duration) {
      const gain = audioCtx.createGain();
      gain.connect(audioCtx.destination);
      
      if (currentMood === 'sunset') {
        // Sunset Deep House Pumping Sidechain Envelope
        gain.gain.setValueAtTime(0.0, time);
        gain.gain.linearRampToValueAtTime(0.18, time + 0.14);
        gain.gain.linearRampToValueAtTime(0.04, time + duration - 0.08);
        gain.gain.linearRampToValueAtTime(0.0, time + duration);
      } else {
        // Twilight soft ambient slow envelope
        gain.gain.setValueAtTime(0.0, time);
        gain.gain.linearRampToValueAtTime(0.12, time + 0.22);
        gain.gain.linearRampToValueAtTime(0.06, time + duration - 0.1);
        gain.gain.linearRampToValueAtTime(0.0, time + duration);
      }

      ch.forEach(freq => {
        const osc = audioCtx.createOscillator();
        osc.type = 'triangle';
        osc.frequency.value = freq;
        osc.connect(gain);
        osc.start(time);
        osc.stop(time + duration);
      });
    }

    function scheduler() {
      while (nextNoteTime < audioCtx.currentTime + 0.1) {
        const tempo = (currentMood === 'sunset' ? 90 : 72);
        const secondsPerBeat = 60.0 / tempo;
        
        // In Sunset House, play kick on every beat. In Twilight, play on even beats.
        if (currentMood === 'sunset' || beatCount % 2 === 0) {
          playKick(nextNoteTime);
        }
        
        // Every 4 beats play the warm Rhodes chords
        if (beatCount % 4 === 0) {
          const chord = chords[currentChordIdx];
          playChordSynth(chord, nextNoteTime, secondsPerBeat * 4);
          currentChordIdx = (currentChordIdx + 1) % chords.length;
        }
        
        nextNoteTime += secondsPerBeat;
        beatCount++;
      }
      schedulerTimer = setTimeout(scheduler, 25);
    }

    function init() {
      // 1. Scene setup
      scene = new THREE.Scene();
      scene.background = new THREE.Color(0x2d122d); // Sunset purple twilight haze
      scene.fog = new THREE.FogExp2(0x2d122d, 0.025);

      // 2. Camera setup with custom camera holder for Third-Person follow
      camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
      pitchObject.add(camera);
      yawObject.position.set(0, 0.9, 8); // Start position centered on player
      yawObject.add(pitchObject);
      scene.add(yawObject);

      // Position camera at offset behind the pitch anchor
      camera.position.set(0, 1.2, 4.0); // 4 units back, 1.2 units up
      camera.lookAt(new THREE.Vector3(0, 0.8, 0)); // Look at player head/torso

      // 3. Renderer setup
      renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('canvas3d'), antialias: true });
      renderer.setPixelRatio(window.devicePixelRatio);
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.shadowMap.enabled = true;
      renderer.shadowMap.type = THREE.PCFSoftShadowMap;

      // 4. Lighting design (Sunset Twilight NYC Penthouse Party)
      const ambientLight = new THREE.AmbientLight(0x4a2a4a, 0.7); // Twilight magenta ambient
      scene.add(ambientLight);

      // Warm intense orange sunset directional light
      const sunsetSun = new THREE.DirectionalLight(0xf97316, 1.8); 
      sunsetSun.position.set(-15, 6, -15);
      sunsetSun.castShadow = true;
      sunsetSun.shadow.mapSize.width = 2048;
      sunsetSun.shadow.mapSize.height = 2048;
      sunsetSun.shadow.bias = -0.001;
      scene.add(sunsetSun);

      // Twilight horizon purple-pink backlighting
      const rimLight = new THREE.DirectionalLight(0xa855f7, 0.8);
      rimLight.position.set(15, 8, 15);
      scene.add(rimLight);

      // Warm glowing accent spotlights over bars
      const barSpot = new THREE.PointLight(0xec4899, 1.5, 15);
      barSpot.position.set(0, 4, -6);
      barSpot.castShadow = true;
      scene.add(barSpot);

      // 5. Ground (Luxurious Teak Wood Rooftop Deck)
      const floorGeo = new THREE.PlaneGeometry(60, 60);
      const floorMat = new THREE.MeshStandardMaterial({
        color: 0x27140e, // Deep elegant teak wood
        roughness: 0.65,
        metalness: 0.15
      });
      const floor = new THREE.Mesh(floorGeo, floorMat);
      floor.rotation.x = -Math.PI / 2;
      floor.receiveShadow = true;
      scene.add(floor);

      // Procedural teak deck lines for high-fidelity wood deck paneling texture
      for (let i = -20; i <= 20; i += 2) {
        createBox(i, 0.005, 0, 0.04, 0.01, 40, 0x140a07, 0.9, 0.0);
      }

      // 6. Transparent Glass Guardrails (height: 1.2) for skyline view
      function createGlassRail(x, y, z, w, h, d, rotationY = 0) {
        const railGroup = new THREE.Group();
        railGroup.position.set(x, y, z);
        railGroup.rotation.y = rotationY;

        // Glass panel mesh
        const glassGeo = new THREE.BoxGeometry(w, h, d);
        const glassMat = new THREE.MeshPhysicalMaterial({
          color: 0xffa8ff,
          transparent: true,
          opacity: 0.15,
          roughness: 0.1,
          transmission: 0.9,
          thickness: 0.5
        });
        const glass = new THREE.Mesh(glassGeo, glassMat);
        glass.position.y = h/2;
        railGroup.add(glass);

        // Metal guardrail support posts
        const postGeo = new THREE.BoxGeometry(0.1, h + 0.1, 0.1);
        const postMat = new THREE.MeshStandardMaterial({ color: 0x0f1115, metalness: 0.9, roughness: 0.2 });
        
        const post1 = new THREE.Mesh(postGeo, postMat);
        post1.position.set(-w/2, (h+0.1)/2, 0);
        railGroup.add(post1);

        const post2 = new THREE.Mesh(postGeo, postMat);
        post2.position.set(w/2, (h+0.1)/2, 0);
        railGroup.add(post2);

        // Top horizontal handrail
        const handGeo = new THREE.BoxGeometry(w + 0.1, 0.08, d + 0.06);
        const hand = new THREE.Mesh(handGeo, postMat);
        hand.position.y = h + 0.04;
        railGroup.add(hand);

        scene.add(railGroup);
      }

      createGlassRail(0, 0, -20, 40, 1.2, 0.1); // Back Guardrail
      createGlassRail(-20, 0, 0, 40, 1.2, 0.1, Math.PI / 2); // Left Guardrail
      createGlassRail(20, 0, 0, 40, 1.2, 0.1, Math.PI / 2);  // Right Guardrail

      // 7. Procedural Spawning of 30 Distant NYC Skyscrapers Skyline in Background!
      for (let i = 0; i < 32; i++) {
        const angle = (i / 31) * Math.PI - Math.PI; // Arrange skyscrapers in a scenic arc
        const radius = 45 + Math.random() * 10;
        const x = Math.cos(angle) * radius;
        const z = Math.sin(angle) * radius - 8;

        const w = 3.5 + Math.random() * 4.5;
        const h = 14 + Math.random() * 20;
        const d = 3.5 + Math.random() * 4.5;

        // Dark skyscraper towers silhouettes
        const bldGeo = new THREE.BoxGeometry(w, h, d);
        const bldMat = new THREE.MeshStandardMaterial({ 
          color: 0x090a0f, // Silhouette color
          roughness: 0.9, 
          metalness: 0.1 
        });
        const bld = new THREE.Mesh(bldGeo, bldMat);
        bld.position.set(x, h/2 - 2, z);
        scene.add(bld);

        // Luminous golden and cyan window grid stars twinkling
        const winCount = 12 + Math.floor(Math.random() * 20);
        const winCoords = [];
        for (let j = 0; j < winCount; j++) {
          const wx = (Math.random() - 0.5) * (w - 0.6);
          const wy = Math.random() * (h - 2) + 1;
          const wz = d/2 + 0.05; // Placed slightly outside building mesh face
          winCoords.push(wx, wy, wz);
        }
        const winGeo = new THREE.BufferGeometry();
        winGeo.setAttribute('position', new THREE.Float32BufferAttribute(winCoords, 3));
        
        const winColor = (Math.random() > 0.4 ? 0xfef08a : 0x22d3ee); // Yellow or cyan lit windows
        const winMat = new THREE.PointsMaterial({
          color: winColor,
          size: 0.16,
          transparent: true,
          opacity: 0.95
        });
        const winPoints = new THREE.Points(winGeo, winMat);
        winPoints.position.set(x, h/2 - 2, z);
        scene.add(winPoints);
      }

      // 7.5 Architectural Glass partitions (translucent violet partition)
      const glassGeo = new THREE.BoxGeometry(16, 8, 0.2);
      const glassMat = new THREE.MeshPhysicalMaterial({
        color: 0xf472b6, // Violet pink tint
        transparent: true,
        opacity: 0.2,
        roughness: 0.1,
        transmission: 0.8,
        thickness: 1.2
      });
      const glassPartition = new THREE.Mesh(glassGeo, glassMat);
      glassPartition.position.set(0, 4, -10);
      scene.add(glassPartition);

      // Elegant dark chrome framing at bottom
      createBox(0, 0.15, -10, 16.2, 0.3, 0.4, 0x0f1115, 0.2, 0.9);

      // 8. Custom Penthouse Furniture (White Outdoor Sectionals & Mirror Table)
      createSofa(-8, 0.5, 2, 5, 0.9, 1.6, 0xf9fafb); // White Lounge Sofa Left
      createSofa(8, 0.5, 2, 5, 0.9, 1.6, 0xf9fafb);  // White Lounge Sofa Right

      // Add hot-pink throw pillows on top of sofas
      createBox(-8.5, 0.8, 1.6, 0.6, 0.6, 0.2, 0xec4899, 0.6, 0.1).rotation.y = Math.PI/6;
      createBox(8.5, 0.8, 1.6, 0.6, 0.6, 0.2, 0xec4899, 0.6, 0.1).rotation.y = -Math.PI/6;
      
      // Round dark mirror-glass coffee table
      createBox(0, 0.45, 2, 2.2, 0.1, 2.2, 0x0f1115, 0.05, 0.95); 
      createBox(0, 0.22, 2, 0.2, 0.45, 0.2, 0xec4899, 0.2, 0.8);

      // 9. Interactive Mirror-Glass Cocktail Bar (Backlit Neon Bar Counter)
      const barBase = createBox(0, 0.8, -6, 4.5, 1.2, 1.8, 0x0b0d12, 0.1, 0.9); // Black mirror base
      const barTop = createBox(0, 1.25, -6, 4.6, 0.1, 1.9, 0x1e293b, 0.02, 0.95); // Dark chrome top plate

      // Backlit bottle shelves
      createBox(0, 1.8, -6.6, 3.8, 1.0, 0.2, 0x0f1115, 0.1, 0.9);
      
      // Spawn glowing drink bottles (emissive mini cylinders)
      function spawnBottle(bx, by, bz, color) {
        const botGeo = new THREE.CylinderGeometry(0.06, 0.06, 0.35, 8);
        const botMat = new THREE.MeshStandardMaterial({ 
          color: color, 
          emissive: color, 
          emissiveIntensity: 1.8,
          roughness: 0.1 
        });
        const bot = new THREE.Mesh(botGeo, botMat);
        bot.position.set(bx, by, bz);
        scene.add(bot);
      }
      spawnBottle(-1.2, 1.5, -6.4, 0xec4899); // Pink Champagne
      spawnBottle(-0.8, 1.5, -6.4, 0x06b6d4); // Cyan Curacao
      spawnBottle(-0.4, 1.5, -6.4, 0x3b82f6); // Sapphire Gin
      spawnBottle(0.0, 1.5, -6.4, 0xf59e0b);  // Amber Whisky
      spawnBottle(0.4, 1.5, -6.4, 0x10b981);  // Green Chartreuse
      spawnBottle(0.8, 1.5, -6.4, 0x8b5cf6);  // Violet Absinthe
      spawnBottle(1.2, 1.5, -6.4, 0xef4444);  // Red Campari

      // 10. Secondary Side Cocktail Bar Counter
      createBox(-14, 0.9, -8, 2.2, 1.5, 5, 0x0b0d12, 0.1, 0.9); // Side bar base
      createBox(-14, 1.45, -8, 2.0, 0.4, 4.6, 0x1e293b, 0.02, 0.95); // Back chrome top plate

      // ── 创建第三人称玩家 Avatar (红发少女 Lexi) ──
      playerGroup = new THREE.Group();
      
      // 身体 (Capsule)
      const playerBodyGeo = new THREE.CylinderGeometry(0.25, 0.25, 1.4, 16);
      const playerBodyMat = new THREE.MeshStandardMaterial({ color: 0x1f2937, roughness: 0.5, metalness: 0.2 });
      const playerBody = new THREE.Mesh(playerBodyGeo, playerBodyMat);
      playerBody.position.y = 0.7;
      playerBody.castShadow = true;
      playerBody.receiveShadow = true;
      playerGroup.add(playerBody);

      // 头部 (Sphere)
      const playerHeadGeo = new THREE.SphereGeometry(0.22, 16, 16);
      const playerHeadMat = new THREE.MeshStandardMaterial({ color: 0xfed7aa, roughness: 0.6 }); // 蜜桃色皮肤
      const playerHead = new THREE.Mesh(playerHeadGeo, playerHeadMat);
      playerHead.position.y = 1.5;
      playerHead.castShadow = true;
      playerGroup.add(playerHead);

      // 发光的红发 (Glowing Red Hair!)
      const playerHairGeo = new THREE.SphereGeometry(0.23, 16, 16);
      const playerHairMat = new THREE.MeshStandardMaterial({ 
        color: 0xd97706, // 经典红发色
        emissive: 0xd97706, 
        emissiveIntensity: 0.6,
        roughness: 0.8
      });
      const playerHair = new THREE.Mesh(playerHairGeo, playerHairMat);
      playerHair.position.set(0, 1.55, -0.04);
      playerHair.scale.set(1.05, 1, 1.15);
      playerHair.castShadow = true;
      playerGroup.add(playerHair);

      // 亚克力情绪头冠 (Neon pink tilted Torus)
      const playerCrownGeo = new THREE.TorusGeometry(0.25, 0.03, 8, 24);
      const playerCrownMat = new THREE.MeshBasicMaterial({ color: 0xec4899 });
      const playerCrown = new THREE.Mesh(playerCrownGeo, playerCrownMat);
      playerCrown.position.set(0, 1.7, 0);
      playerCrown.rotation.x = Math.PI / 2.2;
      playerGroup.add(playerCrown);

      playerGroup.position.set(0, 0, 8); // 初始放置在地面上
      scene.add(playerGroup);

      // 11. NPC Geometries (Glowing Penthouse Party Avatars)
      // Rooftop DJ NPC (replaces Baker)
      let djNpc = createNPC(0, 1.8, -6.5, 0xec4899, 'dj', '【天台驻场 DJ】', '曼哈顿天际线的余晖太迷人了！准备好切歌来拉满气氛了吗？[按 E 切换至深夜微醺 72 BPM 爵士电声轨]');
      // Celebrity Mixologist NPC (replaces Barista)
      let barNpc = createNPC(-14, 1.8, -8, 0x06b6d4, 'bartender', '【明星调酒大师】', '今夜特别推荐：“纽约暮色”马天尼！[按 Q 切换全局霓虹折射艺术色彩]');
      // Penthouse Butler NPC
      let frontNpc = createNPC(14, 1.8, -4, 0x10b981, 'receptionist', '【Penthouse 服务管家】', '校验成功。已通过 local bypass 权限授权。纽约云端天台狂欢派对已为您全量开启！');

      // 项目总制片人 Host NPC
      createNPC(-4, 1.8, 2, 0xf59e0b, 'host', '【项目总制片人 Host】', '欢迎来到曼哈顿 Penthouse 楼顶派对！欣赏一下远处的纽约 Skyline 吧。今天大楼承载了极高的人气与智能体流量！[按 E 深入对话]');
      // 自由插画师 Lily NPC
      createNPC(-3, 1.8, -4, 0xa78bfa, 'dancing_lily', '【自由插画师 Lily】', '看！Manhattan 的大楼里，一盏一盏金黄与青蓝的灯光亮起来了，映着紫红的暮色，简直就是赛博朋克的天然画卷！[按 E 深入对话]');
      // 软件架构师 Alex NPC
      createNPC(8, 1.8, 2, 0x3b82f6, 'chilling_alex', '【软件架构师 Alex】', '在高空俯视曼哈顿，吹着晚风喝着香槟，在 100万 上下文编译多智能体架构分工... 这真是属于全栈黑客的终极狂想曲！[按 E 深入对话]');
      // 时尚博主 Chloe NPC
      createNPC(0, 1.8, -12, 0xf472b6, 'chatting_chloe', '【时尚博主 Chloe】', '你看，那边的低矮超透玻璃护栏做得很漂亮吧？远处的曼哈顿大楼剪影通过磨砂紫红隔断折射过来，真是拍照的绝佳背景！[按 E 深入对话]');

      // 12. Star Dust / Floating neon particles
      const starGeo = new THREE.BufferGeometry();
      const starCount = 300;
      const starCoords = new Float32Array(starCount * 3);
      for(let i=0; i<starCount*3; i+=3) {
        starCoords[i] = (Math.random() - 0.5) * 40;
        starCoords[i+1] = Math.random() * 8;
        starCoords[i+2] = (Math.random() - 0.5) * 40;
      }
      starGeo.setAttribute('position', new THREE.BufferAttribute(starCoords, 3));
      const starMat = new THREE.PointsMaterial({
        color: 0xec4899,
        size: 0.1,
        transparent: true,
        opacity: 0.8
      });
      const starParticles = new THREE.Points(starGeo, starMat);
      scene.add(starParticles);

      // 13. Dynamic particle movement function
      scene.userData.starParticles = starParticles;

      // Event Listeners for controls
      document.addEventListener('keydown', onKeyDown);
      document.addEventListener('keyup', onKeyUp);
      
      const instructions = document.getElementById('instructions');
      instructions.addEventListener('click', () => {
        instructions.requestPointerLock();
        initAudio(); // 激活网页实时合成音频引擎
      });

      document.addEventListener('pointerlockchange', () => {
        if (document.pointerLockElement === instructions) {
          instructions.style.opacity = '0';
          instructions.style.pointerEvents = 'none';
        } else {
          instructions.style.opacity = '1';
          instructions.style.pointerEvents = 'auto';
        }
      });

      document.addEventListener('mousemove', onMouseMove);
      window.addEventListener('resize', onWindowResize);
    }

    // Helper functions to create custom structural geometry
    function createWall(x, y, z, w, h, d, color) {
      const geo = new THREE.BoxGeometry(w, h, d);
      const mat = new THREE.MeshStandardMaterial({ color: color, roughness: 0.9, metalness: 0.1 });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.position.set(x, y, z);
      mesh.receiveShadow = true;
      mesh.castShadow = true;
      scene.add(mesh);
      return mesh;
    }

    function createBox(x, y, z, w, h, d, color, roughness = 0.5, metalness = 0.5) {
      const geo = new THREE.BoxGeometry(w, h, d);
      const mat = new THREE.MeshStandardMaterial({ color: color, roughness: roughness, metalness: metalness });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.position.set(x, y, z);
      mesh.castShadow = true;
      mesh.receiveShadow = true;
      scene.add(mesh);
      return mesh;
    }

    function createSofa(x, y, z, w, h, d, color) {
      const sofa = createBox(x, y, z, w, h, d, color, 0.7, 0.1);
      // Backrest
      const back = createBox(x, y + 0.8, z - d/2 + 0.15, w, h * 1.5, 0.3, color, 0.7, 0.1);
      return sofa;
    }

    function createNPC(x, y, z, glowColor, roleId, name, dialogText) {
      const group = new THREE.Group();
      group.position.set(x, y, z);

      // Capsule body (aesthetic cyberpunk capsule NPC with custom color blending)
      const bodyGeo = new THREE.CylinderGeometry(0.4, 0.4, 1.8, 16);
      const bodyColor = new THREE.Color(glowColor).multiplyScalar(0.12).add(new THREE.Color(0x111317));
      const bodyMat = new THREE.MeshStandardMaterial({ color: bodyColor, roughness: 0.2, metalness: 0.9 });
      const body = new THREE.Mesh(bodyGeo, bodyMat);
      body.castShadow = true;
      body.receiveShadow = true;
      group.add(body);

      // Sleek head sphere representing their virtual avatar head
      const headGeo = new THREE.SphereGeometry(0.3, 16, 16);
      const headMat = new THREE.MeshStandardMaterial({ color: 0x1f2937, roughness: 0.1, metalness: 0.95 });
      const head = new THREE.Mesh(headGeo, headMat);
      head.position.y = 1.0;
      head.castShadow = true;
      group.add(head);

      // Cyberpunk glowing visor (half-torus neon eye visor)
      const visorGeo = new THREE.TorusGeometry(0.32, 0.04, 8, 16, Math.PI);
      const visorMat = new THREE.MeshBasicMaterial({ color: glowColor });
      const visor = new THREE.Mesh(visorGeo, visorMat);
      visor.position.set(0, 1.0, 0.05);
      visor.rotation.x = -Math.PI / 8;
      group.add(visor);

      // Glowing headphones or visualizer halo
      const ringGeo = new THREE.TorusGeometry(0.5, 0.08, 8, 24);
      const ringMat = new THREE.MeshBasicMaterial({ color: glowColor });
      const ring = new THREE.Mesh(ringGeo, ringMat);
      ring.position.y = 0.8;
      ring.rotation.x = Math.PI / 2;
      group.add(ring);

      scene.add(group);

      const npcData = {
        mesh: group,
        roleId: roleId,
        name: name,
        dialogText: dialogText,
        radius: 3.5 // interactive range
      };
      npcs.push(npcData);
      return npcData;
    }

    // Keyboard handlers
    function onKeyDown(e) {
      switch (e.code) {
        case 'ArrowUp':
        case 'KeyW':
          moveForward = true;
          break;
        case 'ArrowLeft':
        case 'KeyA':
          moveLeft = true;
          break;
        case 'ArrowDown':
        case 'KeyS':
          moveBackward = true;
          break;
        case 'ArrowRight':
        case 'KeyD':
          moveRight = true;
          break;
        case 'KeyE':
          handleNPCInteraction();
          break;
        case 'KeyQ':
          handleMoodShiftInteraction();
          break;
      }
    }

    function onKeyUp(e) {
      switch (e.code) {
        case 'ArrowUp':
        case 'KeyW':
          moveForward = false;
          break;
        case 'ArrowLeft':
        case 'KeyA':
          moveLeft = false;
          break;
        case 'ArrowDown':
        case 'KeyS':
          moveBackward = false;
          break;
        case 'ArrowRight':
        case 'KeyD':
          moveRight = false;
          break;
      }
    }

    function onMouseMove(e) {
      if (document.pointerLockElement !== document.getElementById('instructions')) return;

      const movementX = e.movementX || 0;
      const movementY = e.movementY || 0;

      yawObject.rotation.y -= movementX * 0.002;
      pitchObject.rotation.x -= movementY * 0.002;

      // Cap vertical look
      pitchObject.rotation.x = Math.max(-PI_2, Math.min(PI_2, pitchObject.rotation.x));
    }

    // Proactive collision & interaction check
    function checkNPCProximity() {
      let playerPos = playerGroup.position;
      let closestNpc = null;
      let minDistance = Infinity;

      for (let npc of npcs) {
        let dist = playerPos.distanceTo(npc.mesh.position);
        if (dist < npc.radius && dist < minDistance) {
          closestNpc = npc;
          minDistance = dist;
        }
      }

      const prompt = document.getElementById('interaction-prompt');
      const dialog = document.getElementById('dialog-overlay');

      if (closestNpc) {
        currentActiveNpc = closestNpc;
        prompt.style.display = 'block';
        if (closestNpc.roleId === 'dj') {
          prompt.textContent = '【按 E 切换至深夜模式】';
        } else if (closestNpc.roleId === 'bartender') {
          prompt.textContent = '【按 Q 改变微醺氛围色彩】';
        } else {
          prompt.textContent = '【按 E 深入对话】';
          showDialog(closestNpc.name, closestNpc.dialogText);
        }
      } else {
        currentActiveNpc = null;
        prompt.style.display = 'none';
        dialog.style.display = 'none';
      }
    }

    function showDialog(sender, text) {
      const dialog = document.getElementById('dialog-overlay');
      document.getElementById('dialog-sender').textContent = sender;
      document.getElementById('dialog-content').textContent = text;
      dialog.style.display = 'block';
    }

    // Toggle between Sunset (90 BPM) and Twilight (72 BPM) Modes!
    function handleNPCInteraction() {
      if (!currentActiveNpc) return;

      if (currentActiveNpc.roleId === 'dj') {
        // Toggle Global Theme between Sunset (90 BPM) and Twilight (72 BPM)!
        if (currentMood === 'sunset') {
          currentMood = 'twilight';
          scene.background = new THREE.Color(0x12071f); // Deep Twilight Midnight Purple
          scene.fog.color = new THREE.Color(0x12071f);
          document.getElementById('hud-title').textContent = '深夜微醺天台 (Midnight Penthouse)';
          document.getElementById('hud-dot').style.background = '#8b5cf6'; // Violet
          document.getElementById('hud-dot').style.boxShadow = '0 0 10px #8b5cf6';
          document.getElementById('hud-tempo').textContent = '深夜星光 Lo-fi (72 BPM)';
          showDialog('【天台驻场 DJ】', '已为您过渡音轨：天色渐入深夜，星光粒子撒落，音乐切换至 72 BPM 慵懒黑胶爵士电音，高空天台派对进入舒缓时光。');
          scene.userData.starParticles.material.color.setHex(0x8b5cf6); // violet particles
        } else {
          currentMood = 'sunset';
          scene.background = new THREE.Color(0x2d122d); // Sunset purple twilight haze
          scene.fog.color = new THREE.Color(0x2d122d);
          document.getElementById('hud-title').textContent = '纽约云端天台派对 (NYC Penthouse Party)';
          document.getElementById('hud-dot').style.background = '#ec4899'; // Hot pink
          document.getElementById('hud-dot').style.boxShadow = '0 0 10px #ec4899';
          document.getElementById('hud-tempo').textContent = '深邃日落 House (90 BPM)';
          showDialog('【天台驻场 DJ】', '已为您拉升律动：纽约 Skyline 日落余晖正绚烂，音乐切换至 90 BPM 经典深邃浩室 (Deep House) 舞曲节奏，派对气氛拉满！');
          scene.userData.starParticles.material.color.setHex(0xec4899); // pink particles
        }
      } else if (currentActiveNpc.roleId === 'host') {
        showDialog('【项目总制片人 Host】', '呼... 昨晚 100M Token 的并发吞吐量把大楼的主网络都占满了，当时控制中心大屏幕的主频曲线都在发红呢！今天天台派对开业，吹着哈德逊河的晚风，看着曼哈顿天际线，咱们彻底放松一下！');
      } else if (currentActiveNpc.roleId === 'dancing_lily') {
        showDialog('【自由插画师 Lily】', '看！Manhattan 的大楼里，一盏一盏金黄与青蓝的灯光亮起来了，映着紫红的暮色，简直就是赛博朋克的天然画卷！高空天台派对的气氛太让人灵感爆发了！');
      } else if (currentActiveNpc.roleId === 'chilling_alex') {
        showDialog('【软件架构师 Alex】', '在高空俯视曼哈顿，吹着晚风喝着香槟，在 100万 上下文编译多智能体架构分工... 刚才我在后台确认了一下 local bypass 授权，系统运行状态极度健康！这真是属于全栈黑客的终极狂想曲！');
      } else if (currentActiveNpc.roleId === 'chatting_chloe') {
        showDialog('【时尚博主 Chloe】', '你看，那边的低矮超透玻璃护栏做得很漂亮吧？远处的曼哈顿大楼剪影通过磨砂紫红隔断折射过来，在夕阳余晖里真是一个精奢的高级布景，拍照发在 Zine 频道一定能收获满赞！');
      }
    }

    // Toggle Custom Mood Shader filter colors!
    function handleMoodShiftInteraction() {
      if (!currentActiveNpc || currentActiveNpc.roleId !== 'bartender') return;

      const colors = [0xec4899, 0x06b6d4, 0xf59e0b, 0x8b5cf6, 0x10b981];
      const selectedColor = colors[Math.floor(Math.random() * colors.length)];
      scene.userData.starParticles.material.color.setHex(selectedColor);
      
      const lightHex = selectedColor.toString(16);
      showDialog('【明星调酒大师】', `这杯“纽约暮色”特调马天尼已为您摇制完成！大堂氛围折射色已切换至：#${lightHex}`);
    }

    function onWindowResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }

    // Physics walking loop with deceleration & collision boundary
    function animate() {
      requestAnimationFrame(animate);

      const time = performance.now();
      const delta = (time - prevTime) / 1000;

      // 获取相机当前的朝向（水平面）
      let camDir = new THREE.Vector3();
      camera.getWorldDirection(camDir);
      camDir.y = 0; // 锁定在水平面上
      camDir.normalize();

      let camRight = new THREE.Vector3();
      camRight.crossVectors(camDir, new THREE.Vector3(0, 1, 0)).normalize();

      // 计算行走位移
      let moveDir = new THREE.Vector3();
      if (moveForward) moveDir.add(camDir);
      if (moveBackward) moveDir.add(camDir.clone().negate());
      if (moveLeft) moveDir.add(camRight);
      if (moveRight) moveDir.add(camRight.clone().negate());

      if (moveDir.lengthSq() > 0) {
        moveDir.normalize();
        
        // 角色旋转平滑过渡到行走方向
        const targetAngle = Math.atan2(moveDir.x, moveDir.z);
        // 让红发少女的 Avatar 旋转面向行走方向
        playerGroup.rotation.y = targetAngle;

        const moveSpeed = 6.0;
        playerGroup.position.addScaledVector(moveDir, moveSpeed * delta);
      }

      // 边缘碰撞检测 (Keep inside boundary walls)
      playerGroup.position.x = Math.max(-19, Math.min(19, playerGroup.position.x));
      playerGroup.position.z = Math.max(-19, Math.min(19, playerGroup.position.z));
      playerGroup.position.y = 0.0; // 踩在地面上

      // 摄像机锚点 yawObject 平滑跟随玩家位置 (Spring follow)
      yawObject.position.lerp(playerGroup.position, 0.1);

      // Animate star dust / floating lobby particles breathing / drifting
      const starParticles = scene.userData.starParticles;
      if (starParticles) {
        starParticles.rotation.y += (currentMood === 'day' ? 0.001 : 0.0003); // Slower, calmer cafe drift
      }

      // Rhythmic animations for NPCs based on Bossa/Lo-fi tempo
      const tempo = (currentMood === 'day' ? 72 : 60);
      npcs.forEach(npc => {
        if (npc.roleId === 'dancing_lily') {
          // Illustrator Lily: sways and paints to the Bossa/Lo-fi acoustics
          npc.mesh.position.y = 1.8 + Math.sin(time * 0.006 * (tempo / 60.0)) * 0.22;
          npc.mesh.rotation.y = Math.sin(time * 0.004 * (tempo / 60.0)) * 0.4;
        } else if (npc.roleId === 'chilling_alex') {
          // Coder Alex: sways gently while sipping flat white
          npc.mesh.position.x = 8.0 + Math.sin(time * 0.003 * (tempo / 60.0)) * 0.15;
          npc.mesh.rotation.z = Math.sin(time * 0.002 * (tempo / 60.0)) * 0.06;
        } else if (npc.roleId === 'chatting_chloe') {
          // Writer Chloe: hovers and drafts her novel near the window
          npc.mesh.position.y = 1.8 + Math.sin(time * 0.002 * (tempo / 60.0)) * 0.08;
          npc.mesh.position.z = -12.0 + Math.cos(time * 0.002 * (tempo / 60.0)) * 0.15;
        } else if (npc.roleId === 'dj') {
          // Barista: nods to the gentle Bossa beat
          npc.mesh.position.y = 1.8 + Math.sin(time * 0.008 * (tempo / 60.0)) * 0.05;
          npc.mesh.rotation.y = Math.sin(time * 0.004 * (tempo / 60.0)) * 0.15;
        }
      });

      checkNPCProximity();

      prevTime = time;
      renderer.render(scene, camera);
    }

    window.onload = () => {
      init();
      animate();
    };
  </script>
