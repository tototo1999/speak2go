<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>Lexi Studio - 3D 互动元宇宙 (The 3D Lounge Sandbox)</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #050608;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    #canvas3d {
      width: 100%;
      height: 100%;
      display: block;
    }
    /* HUD overlay */
    #hud {
      position: absolute;
      top: 20px;
      left: 20px;
      pointer-events: none;
      color: #34d399; /* emerald */
      font-family: monospace;
      font-size: 12px;
      z-index: 10;
      background: rgba(0,0,0,0.6);
      padding: 15px;
      border-radius: 8px;
      border: 1px solid rgba(52, 211, 153, 0.3);
      backdrop-filter: blur(5px);
    }
    #hud h2 {
      margin: 0 0 8px 0;
      font-size: 14px;
      color: #fff;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .status-dot {
      width: 8px;
      height: 8px;
      background: #ec4899; /* pink default */
      border-radius: 50%;
      box-shadow: 0 0 10px #ec4899;
      display: inline-block;
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(1.1); }
    }
    /* Controls helper overlay */
    #instructions {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #fff;
      text-align: center;
      z-index: 100;
      background: rgba(0,0,0,0.85);
      padding: 30px 40px;
      border-radius: 12px;
      border: 1px solid rgba(217,119,6,0.3);
      box-shadow: 0 10px 40px rgba(0,0,0,0.5);
      cursor: pointer;
      backdrop-filter: blur(10px);
      transition: opacity 0.3s;
    }
    #instructions h1 {
      margin-top: 0;
      font-size: 22px;
      color: #d97706; /* Warm gold */
      text-shadow: 0 0 10px rgba(217,119,6,0.4);
    }
    #instructions p {
      font-size: 13px;
      color: #9ca3af;
      line-height: 1.6;
    }
    .key-btn {
      background: #1f2937;
      border: 1px solid #374151;
      padding: 2px 6px;
      border-radius: 4px;
      font-family: monospace;
      color: #fff;
    }
    /* Interaction prompt in center */
    #interaction-prompt {
      position: absolute;
      bottom: 15%;
      left: 50%;
      transform: translateX(-50%);
      color: #fff;
      font-family: monospace;
      font-size: 14px;
      z-index: 10;
      background: rgba(217, 119, 6, 0.8);
      padding: 8px 16px;
      border-radius: 6px;
      border: 1px solid #fbbf24;
      box-shadow: 0 0 15px rgba(217, 119, 6, 0.4);
      display: none;
      pointer-events: none;
      animation: float 2s infinite alternate;
    }
    @keyframes float {
      0% { transform: translate(-50%, 0px); }
      100% { transform: translate(-50%, -6px); }
    }
    /* Dialog screen overlay */
    #dialog-overlay {
      position: absolute;
      bottom: 25px;
      left: 50%;
      transform: translateX(-50%);
      width: 90%;
      max-width: 600px;
      background: rgba(15, 17, 21, 0.9);
      border: 1px solid rgba(52, 211, 153, 0.3);
      border-radius: 10px;
      padding: 15px 20px;
      color: #eaeaea;
      font-family: monospace;
      font-size: 13px;
      z-index: 10;
      display: none;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      backdrop-filter: blur(10px);
    }
    #dialog-sender {
      font-weight: bold;
      color: #d97706;
      margin-bottom: 6px;
    }
    #crosshair {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 6px;
      height: 6px;
      background: rgba(255,255,255,0.4);
      border-radius: 50%;
      pointer-events: none;
      z-index: 5;
    }
    /* Exit Button */
    #exit-btn {
      position: absolute;
      top: 20px;
      right: 20px;
      z-index: 10;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.15);
      color: #eaeaea;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      text-decoration: none;
      font-size: 12px;
      font-family: monospace;
      transition: all 0.2s;
    }
    #exit-btn:hover {
      background: #d97706;
      border-color: #d97706;
      color: #fff;
      box-shadow: 0 0 15px rgba(217,119,6,0.3);
    }
  </style>
  <!-- Three.js CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

  <div id="crosshair"></div>
  <a href="lexi_apartment_lounge.html" id="exit-btn">退出 3D 咖啡厅</a>

  <div id="hud">
    <h2><span class="status-dot" id="hud-dot" style="background:#d97706; box-shadow:0 0 10px #d97706;"></span> <span id="hud-title">大堂精奢咖啡厅 (Lobby Cafe)</span></h2>
    <div>[AGY] 智能总指挥在线</div>
    <div style="margin-top: 8px;">状态码: <span style="color:#fff;">200 OK</span></div>
    <div>环境: <span id="hud-tempo" style="color:#fff;">明朗晨光 Bossa (72 BPM)</span></div>
    <div style="margin-top: 8px;">
      100万上下文已用限制: <br>
      <span style="color: #d97706; font-weight: bold;">218.6K / 1.00M Token (21.8%)</span>
    </div>
  </div>

  <div id="instructions">
    <h1>Lexi Studio 3D 咖啡大堂</h1>
    <p>
      请点击屏幕进入沉浸式第一人称大堂空间<br><br>
      <span class="key-btn">W</span> <span class="key-btn">A</span> <span class="key-btn">S</span> <span class="key-btn">D</span> / 方向键 移动角色<br>
      移动鼠标 环顾四周<br>
      靠近咖啡拉花师或房客，按 <span class="key-btn">E</span> 或 <span class="key-btn">Q</span> 进行交互与环境光照切换<br><br>
      <strong style="color: #d97706;">点击任意位置开启旅程</strong>
    </p>
  </div>

  <div id="interaction-prompt">按 E 键对话</div>

  <div id="dialog-overlay">
    <div id="dialog-sender">【大楼前台】</div>
    <div id="dialog-content">欢迎回家！请在终端出示您的 CSRF 安全凭证...</div>
  </div>

  <canvas id="canvas3d"></canvas>

  <script>
    // 3D Engine Setup
    let scene, camera, renderer;
    let playerGroup = null; // 第三人称 Avatar Group (红发少女 Lexi)
    let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false;
    let prevTime = performance.now();
    let velocity = new THREE.Vector3();
    let direction = new THREE.Vector3();
    let currentMood = 'day'; // 'day' or 'sunset'

    // Interactive NPCs list
    let npcs = [];
    let currentActiveNpc = null;

    // First person mouse-look variables
    let pitchObject = new THREE.Object3D();
    let yawObject = new THREE.Object3D();
    const PI_2 = Math.PI / 2;

    // ── Web Audio API 实时合成音频引擎 ──
    let audioCtx = null;
    let schedulerTimer = null;
    let nextNoteTime = 0.0;
    let beatCount = 0;
    const chords = [
      [110, 165, 196, 246], // Am9
      [146, 196, 220, 293], // Dm9
      [98, 146, 174, 246],  // G13
      [130, 196, 246, 261]  // Cmaj9
    ];
    let currentChordIdx = 0;

    function initAudio() {
      if (audioCtx) return;
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      
      // 1. 模拟黑胶唱片的沙沙背景电流声 (Procedural Vinyl crackle)
      createVinylNoise();
      
      // 2. 启动步进音序调度器 (Start scheduler)
      nextNoteTime = audioCtx.currentTime;
      scheduler();
    }

    function createVinylNoise() {
      const bufferSize = audioCtx.sampleRate * 2;
      const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
      const data = buffer.getChannelData(0);
      for (let i = 0; i < bufferSize; i++) {
        data[i] = (Math.random() - 0.5) * 0.015; // 细腻的白噪声
      }
      const source = audioCtx.createBufferSource();
      source.buffer = buffer;
      source.loop = true;
      const gain = audioCtx.createGain();
      gain.gain.value = 0.2; // 极轻微的底噪
      source.connect(gain);
      gain.connect(audioCtx.destination);
      source.start();
    }

    function playKick(time) {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      
      // Softer pitch sweep for a cozy cafe acoustic wood-block click
      osc.type = 'triangle';
      osc.frequency.setValueAtTime(320, time);
      osc.frequency.exponentialRampToValueAtTime(80, time + 0.07);
      
      // Extremely warm, non-intrusive organic percussion volume
      gain.gain.setValueAtTime(0.12, time);
      gain.gain.linearRampToValueAtTime(0.0, time + 0.07);
      
      osc.start(time);
      osc.stop(time + 0.08);
    }

    function playChordSynth(ch, time, duration) {
      const gain = audioCtx.createGain();
      gain.connect(audioCtx.destination);
      
      // Warm, delicate volume envelope for organic bossa-nova
      gain.gain.setValueAtTime(0.0, time);
      gain.gain.linearRampToValueAtTime(0.12, time + 0.2); // Slower attack
      gain.gain.linearRampToValueAtTime(0.06, time + duration - 0.1);
      gain.gain.linearRampToValueAtTime(0.0, time + duration);

      ch.forEach(freq => {
        const osc = audioCtx.createOscillator();
        osc.type = 'triangle'; // Warm triangle wave mimicking electric Rhodes
        osc.frequency.value = freq;
        osc.connect(gain);
        osc.start(time);
        osc.stop(time + duration);
      });
    }

    function scheduler() {
      while (nextNoteTime < audioCtx.currentTime + 0.1) {
        const tempo = (currentMood === 'day' ? 72 : 60);
        const secondsPerBeat = 60.0 / tempo;
        
        // Soft organic tap on specific beats
        if (currentMood === 'day' || beatCount % 2 === 0) {
          playKick(nextNoteTime);
        }
        
        // Every 4 beats play the warm Rhodes chords
        if (beatCount % 4 === 0) {
          const chord = chords[currentChordIdx];
          playChordSynth(chord, nextNoteTime, secondsPerBeat * 4);
          currentChordIdx = (currentChordIdx + 1) % chords.length;
        }
        
        nextNoteTime += secondsPerBeat;
        beatCount++;
      }
      schedulerTimer = setTimeout(scheduler, 25);
    }

    function init() {
      // 1. Scene setup
      scene = new THREE.Scene();
      scene.background = new THREE.Color(0xf3f4f6); // Soft linen white background
      scene.fog = new THREE.FogExp2(0xf3f4f6, 0.03);

      // 2. Camera setup with custom camera holder for Third-Person follow
      camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
      pitchObject.add(camera);
      yawObject.position.set(0, 0.9, 8); // Start position centered on player
      yawObject.add(pitchObject);
      scene.add(yawObject);

      // Position camera at offset behind the pitch anchor
      camera.position.set(0, 1.2, 4.0); // 4 units back, 1.2 units up
      camera.lookAt(new THREE.Vector3(0, 0.8, 0)); // Look at player head/torso

      // 3. Renderer setup
      renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('canvas3d'), antialias: true });
      renderer.setPixelRatio(window.devicePixelRatio);
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.shadowMap.enabled = true;
      renderer.shadowMap.type = THREE.PCFSoftShadowMap;

      // 4. Lighting design (Bright Warm Scandinavian Daylight Lobby)
      const ambientLight = new THREE.AmbientLight(0xfffdf9, 0.85); // Warm sun ambient
      scene.add(ambientLight);

      // Warm sun stream casting shadows
      const sunLight = new THREE.DirectionalLight(0xfffaed, 1.2);
      sunLight.position.set(10, 20, 8);
      sunLight.castShadow = true;
      sunLight.shadow.mapSize.width = 2048;
      sunLight.shadow.mapSize.height = 2048;
      sunLight.shadow.bias = -0.001;
      scene.add(sunLight);

      // Cozy warm pendant lamp light over central lounge
      const warmSpot = new THREE.PointLight(0xf59e0b, 1.0, 18);
      warmSpot.position.set(0, 5, 2);
      warmSpot.castShadow = true;
      scene.add(warmSpot);

      // Warm gold accent light over coffee bar
      const barSpot = new THREE.PointLight(0xd97706, 1.2, 15);
      barSpot.position.set(-10, 5, -8);
      barSpot.castShadow = true;
      scene.add(barSpot);

      // 5. Ground (Luxurious Carrara White Marble floor)
      const floorGeo = new THREE.PlaneGeometry(60, 60);
      const floorMat = new THREE.MeshPhysicalMaterial({
        color: 0xfafafa,
        roughness: 0.12,
        metalness: 0.1,
        clearcoat: 1.0,
        clearcoatRoughness: 0.1,
        transmission: 0.1
      });
      const floor = new THREE.Mesh(floorGeo, floorMat);
      floor.rotation.x = -Math.PI / 2;
      floor.receiveShadow = true;
      scene.add(floor);

      // 6. Architectural minimalist limestone walls
      createWall(0, 5, -20, 40, 10, 1, 0xe5e7eb); // Back Wall
      createWall(-20, 5, 0, 1, 10, 40, 0xe5e7eb); // Left Wall
      createWall(20, 5, 0, 1, 10, 40, 0xe5e7eb);  // Right Wall

      // 7. Architectural Glass partitions (brass frosted emerald partition)
      const glassGeo = new THREE.BoxGeometry(16, 8, 0.2);
      const glassMat = new THREE.MeshPhysicalMaterial({
        color: 0xd9f9e7, // Soft sage green
        transparent: true,
        opacity: 0.3,
        roughness: 0.15,
        transmission: 0.8,
        thickness: 1.5
      });
      const glassPartition = new THREE.Mesh(glassGeo, glassMat);
      glassPartition.position.set(0, 4, -10);
      scene.add(glassPartition);

      // Elegant brass framing at bottom
      createBox(0, 0.15, -10, 16.2, 0.3, 0.4, 0xd97706, 0.2, 0.9);

      // 8. Custom Lobby Furniture (Scandinavian Cognac Leather & Marble)
      // Cognac Leather Armchair / Sofa Sets
      createSofa(-8, 0.5, 2, 5, 0.9, 1.6, 0x9a3412); // Cognac Leather Left
      createSofa(8, 0.5, 2, 5, 0.9, 1.6, 0x9a3412);  // Cognac Leather Right
      
      // Round gold-trimmed white marble coffee table
      const tableTop = createBox(0, 0.45, 2, 2.2, 0.1, 2.2, 0xffffff, 0.1, 0.1); 
      const tableLeg = createBox(0, 0.22, 2, 0.2, 0.45, 0.2, 0xd97706, 0.2, 0.9);

      // 9. Interactive Espresso Bar (Oak Wood & Gold Accents)
      const barBase = createBox(0, 0.8, -6, 4.5, 1.2, 1.8, 0x78350f, 0.6, 0.1); // Oak wood base
      const barTop = createBox(0, 1.25, -6, 4.6, 0.1, 1.9, 0xffffff, 0.1, 0.1); // White marble top

      // Espresso Machine Silhouette
      createBox(-1.0, 1.5, -6, 1.0, 0.4, 0.8, 0x374151, 0.2, 0.8); // Espresso body
      createBox(-1.0, 1.7, -5.6, 0.2, 0.1, 0.3, 0xd97706, 0.1, 0.9); // Brass group head
      // Coffee cups on the bar counter
      createBox(0.8, 1.35, -5.8, 0.2, 0.15, 0.2, 0xf3f4f6, 0.5, 0.0); // Cup 1
      createBox(1.2, 1.35, -6.0, 0.2, 0.15, 0.2, 0xd97706, 0.4, 0.1); // Cup 2

      // 10. Oak Pastry Display Counter
      createBox(-14, 0.9, -8, 2.2, 1.5, 5, 0x78350f, 0.7, 0.1); // Pastry Bar base
      createBox(-14, 1.45, -8, 2.0, 0.4, 4.6, 0xffffff, 0.1, 0.1); // Marble top plate

      // ── 创建第三人称玩家 Avatar (红发少女 Lexi) ──
      playerGroup = new THREE.Group();
      
      // 身体 (Capsule)
      const playerBodyGeo = new THREE.CylinderGeometry(0.25, 0.25, 1.4, 16);
      const playerBodyMat = new THREE.MeshStandardMaterial({ color: 0x1f2937, roughness: 0.5, metalness: 0.2 });
      const playerBody = new THREE.Mesh(playerBodyGeo, playerBodyMat);
      playerBody.position.y = 0.7;
      playerBody.castShadow = true;
      playerBody.receiveShadow = true;
      playerGroup.add(playerBody);

      // 头部 (Sphere)
      const playerHeadGeo = new THREE.SphereGeometry(0.22, 16, 16);
      const playerHeadMat = new THREE.MeshStandardMaterial({ color: 0xfed7aa, roughness: 0.6 }); // 蜜桃色皮肤
      const playerHead = new THREE.Mesh(playerHeadGeo, playerHeadMat);
      playerHead.position.y = 1.5;
      playerHead.castShadow = true;
      playerGroup.add(playerHead);

      // 发光的红发 (Glowing Red Hair!)
      const playerHairGeo = new THREE.SphereGeometry(0.23, 16, 16);
      const playerHairMat = new THREE.MeshStandardMaterial({ 
        color: 0xd97706, // 经典红发色
        emissive: 0xd97706, 
        emissiveIntensity: 0.6,
        roughness: 0.8
      });
      const playerHair = new THREE.Mesh(playerHairGeo, playerHairMat);
      playerHair.position.set(0, 1.55, -0.04);
      playerHair.scale.set(1.05, 1, 1.15);
      playerHair.castShadow = true;
      playerGroup.add(playerHair);

      // 亚克力情绪头冠 (Neon pink tilted Torus)
      const playerCrownGeo = new THREE.TorusGeometry(0.25, 0.03, 8, 24);
      const playerCrownMat = new THREE.MeshBasicMaterial({ color: 0xec4899 });
      const playerCrown = new THREE.Mesh(playerCrownGeo, playerCrownMat);
      playerCrown.position.set(0, 1.7, 0);
      playerCrown.rotation.x = Math.PI / 2.2;
      playerGroup.add(playerCrown);

      playerGroup.position.set(0, 0, 8); // 初始放置在地面上
      scene.add(playerGroup);

      // 11. NPC Geometries (Glowing Cafe Avatars)
      // Barista NPC (replaces DJ)
      let djNpc = createNPC(0, 1.8, -6.5, 0xd97706, 'dj', '【首席拉花咖啡师】', '准备好换一杯新鲜烘焙的手冲单源咖啡了吗？[按 E 切换至夕阳黄昏暖色光照]');
      // Baker NPC (replaces Bartender)
      let barNpc = createNPC(-14, 1.8, -8, 0x65a30d, 'bartender', '【法式甜品烘焙师】', '欢迎光临！要尝尝刚出炉的黄油可颂和肉桂卷吗？[按 Q 切换全局温润艺术滤镜]');
      // Front Desk Receptionist NPC
      let frontNpc = createNPC(14, 1.8, -4, 0x10b981, 'receptionist', '【大堂前台服务经理】', '校验成功。已通过 local bypass 权限授权。尊贵的公寓住户，欢迎回家喝咖啡！');

      // 大堂经理 NPC
      createNPC(-4, 1.8, 2, 0xf59e0b, 'host', '【大堂经理】', '欢迎来到公寓大堂咖啡厅！今天大堂的温度是 24℃，我们特地调配了轻柔的 Bossa Nova 背景音乐，请在大堂扶手椅上尽情享受。[按 E 深入对话]');
      // 自由插画师 Lily NPC
      createNPC(-3, 1.8, -4, 0xa78bfa, 'dancing_lily', '【自由插画师 Lily】', '噢！大堂背景里 72 BPM 的 Bossa Nova 和弦太舒服了！在这种轻松的氛围下作画，笔触都变得十分丝滑！[按 E 深入对话]');
      // 独立开发者 Alex NPC
      createNPC(8, 1.8, 2, 0x3b82f6, 'chilling_alex', '【独立开发者 Alex】', '听着 Procedural Vinyl 的黑胶底噪，喝着冰美式，在 100万 上下文环境里跑智能体分工编译，这就是自由职业的终极快乐吧！[按 E 深入对话]');
      // 专栏作家 Chloe NPC
      createNPC(0, 1.8, -12, 0xf472b6, 'chatting_chloe', '【专栏作家 Chloe】', '你看，那边的黄铜包边毛玻璃隔断做得很漂亮吧？阳光透过它投射出的漫反射，简直像一幅天然的油画。[按 E 深入对话]');

      // 12. Star Dust / Floating neon particles
      const starGeo = new THREE.BufferGeometry();
      const starCount = 300;
      const starCoords = new Float32Array(starCount * 3);
      for(let i=0; i<starCount*3; i+=3) {
        starCoords[i] = (Math.random() - 0.5) * 40;
        starCoords[i+1] = Math.random() * 8;
        starCoords[i+2] = (Math.random() - 0.5) * 40;
      }
      starGeo.setAttribute('position', new THREE.BufferAttribute(starCoords, 3));
      const starMat = new THREE.PointsMaterial({
        color: 0xec4899,
        size: 0.1,
        transparent: true,
        opacity: 0.8
      });
      const starParticles = new THREE.Points(starGeo, starMat);
      scene.add(starParticles);

      // 13. Dynamic particle movement function
      scene.userData.starParticles = starParticles;

      // Event Listeners for controls
      document.addEventListener('keydown', onKeyDown);
      document.addEventListener('keyup', onKeyUp);
      
      const instructions = document.getElementById('instructions');
      instructions.addEventListener('click', () => {
        instructions.requestPointerLock();
        initAudio(); // 激活网页实时合成音频引擎
      });

      document.addEventListener('pointerlockchange', () => {
        if (document.pointerLockElement === instructions) {
          instructions.style.opacity = '0';
          instructions.style.pointerEvents = 'none';
        } else {
          instructions.style.opacity = '1';
          instructions.style.pointerEvents = 'auto';
        }
      });

      document.addEventListener('mousemove', onMouseMove);
      window.addEventListener('resize', onWindowResize);
    }

    // Helper functions to create custom structural geometry
    function createWall(x, y, z, w, h, d, color) {
      const geo = new THREE.BoxGeometry(w, h, d);
      const mat = new THREE.MeshStandardMaterial({ color: color, roughness: 0.9, metalness: 0.1 });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.position.set(x, y, z);
      mesh.receiveShadow = true;
      mesh.castShadow = true;
      scene.add(mesh);
      return mesh;
    }

    function createBox(x, y, z, w, h, d, color, roughness = 0.5, metalness = 0.5) {
      const geo = new THREE.BoxGeometry(w, h, d);
      const mat = new THREE.MeshStandardMaterial({ color: color, roughness: roughness, metalness: metalness });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.position.set(x, y, z);
      mesh.castShadow = true;
      mesh.receiveShadow = true;
      scene.add(mesh);
      return mesh;
    }

    function createSofa(x, y, z, w, h, d, color) {
      const sofa = createBox(x, y, z, w, h, d, color, 0.7, 0.1);
      // Backrest
      const back = createBox(x, y + 0.8, z - d/2 + 0.15, w, h * 1.5, 0.3, color, 0.7, 0.1);
      return sofa;
    }

    function createNPC(x, y, z, glowColor, roleId, name, dialogText) {
      const group = new THREE.Group();
      group.position.set(x, y, z);

      // Capsule body (aesthetic cyberpunk capsule NPC with custom color blending)
      const bodyGeo = new THREE.CylinderGeometry(0.4, 0.4, 1.8, 16);
      const bodyColor = new THREE.Color(glowColor).multiplyScalar(0.12).add(new THREE.Color(0x111317));
      const bodyMat = new THREE.MeshStandardMaterial({ color: bodyColor, roughness: 0.2, metalness: 0.9 });
      const body = new THREE.Mesh(bodyGeo, bodyMat);
      body.castShadow = true;
      body.receiveShadow = true;
      group.add(body);

      // Sleek head sphere representing their virtual avatar head
      const headGeo = new THREE.SphereGeometry(0.3, 16, 16);
      const headMat = new THREE.MeshStandardMaterial({ color: 0x1f2937, roughness: 0.1, metalness: 0.95 });
      const head = new THREE.Mesh(headGeo, headMat);
      head.position.y = 1.0;
      head.castShadow = true;
      group.add(head);

      // Cyberpunk glowing visor (half-torus neon eye visor)
      const visorGeo = new THREE.TorusGeometry(0.32, 0.04, 8, 16, Math.PI);
      const visorMat = new THREE.MeshBasicMaterial({ color: glowColor });
      const visor = new THREE.Mesh(visorGeo, visorMat);
      visor.position.set(0, 1.0, 0.05);
      visor.rotation.x = -Math.PI / 8;
      group.add(visor);

      // Glowing headphones or visualizer halo
      const ringGeo = new THREE.TorusGeometry(0.5, 0.08, 8, 24);
      const ringMat = new THREE.MeshBasicMaterial({ color: glowColor });
      const ring = new THREE.Mesh(ringGeo, ringMat);
      ring.position.y = 0.8;
      ring.rotation.x = Math.PI / 2;
      group.add(ring);

      scene.add(group);

      const npcData = {
        mesh: group,
        roleId: roleId,
        name: name,
        dialogText: dialogText,
        radius: 3.5 // interactive range
      };
      npcs.push(npcData);
      return npcData;
    }

    // Keyboard handlers
    function onKeyDown(e) {
      switch (e.code) {
        case 'ArrowUp':
        case 'KeyW':
          moveForward = true;
          break;
        case 'ArrowLeft':
        case 'KeyA':
          moveLeft = true;
          break;
        case 'ArrowDown':
        case 'KeyS':
          moveBackward = true;
          break;
        case 'ArrowRight':
        case 'KeyD':
          moveRight = true;
          break;
        case 'KeyE':
          handleNPCInteraction();
          break;
        case 'KeyQ':
          handleMoodShiftInteraction();
          break;
      }
    }

    function onKeyUp(e) {
      switch (e.code) {
        case 'ArrowUp':
        case 'KeyW':
          moveForward = false;
          break;
        case 'ArrowLeft':
        case 'KeyA':
          moveLeft = false;
          break;
        case 'ArrowDown':
        case 'KeyS':
          moveBackward = false;
          break;
        case 'ArrowRight':
        case 'KeyD':
          moveRight = false;
          break;
      }
    }

    function onMouseMove(e) {
      if (document.pointerLockElement !== document.getElementById('instructions')) return;

      const movementX = e.movementX || 0;
      const movementY = e.movementY || 0;

      yawObject.rotation.y -= movementX * 0.002;
      pitchObject.rotation.x -= movementY * 0.002;

      // Cap vertical look
      pitchObject.rotation.x = Math.max(-PI_2, Math.min(PI_2, pitchObject.rotation.x));
    }

    // Proactive collision & interaction check
    function checkNPCProximity() {
      let playerPos = playerGroup.position;
      let closestNpc = null;
      let minDistance = Infinity;

      for (let npc of npcs) {
        let dist = playerPos.distanceTo(npc.mesh.position);
        if (dist < npc.radius && dist < minDistance) {
          closestNpc = npc;
          minDistance = dist;
        }
      }

      const prompt = document.getElementById('interaction-prompt');
      const dialog = document.getElementById('dialog-overlay');

      if (closestNpc) {
        currentActiveNpc = closestNpc;
        prompt.style.display = 'block';
        if (closestNpc.roleId === 'dj') {
          prompt.textContent = '【按 E 切换至静谧大堂】';
        } else if (closestNpc.roleId === 'bartender') {
          prompt.textContent = '【按 Q 改变微醺氛围色彩】';
        } else {
          prompt.textContent = '【按 E 深入对话】';
          showDialog(closestNpc.name, closestNpc.dialogText);
        }
      } else {
        currentActiveNpc = null;
        prompt.style.display = 'none';
        dialog.style.display = 'none';
      }
    }

    function showDialog(sender, text) {
      const dialog = document.getElementById('dialog-overlay');
      document.getElementById('dialog-sender').textContent = sender;
      document.getElementById('dialog-content').textContent = text;
      dialog.style.display = 'block';
    }

    // Toggle between Day (Sunny Bossa) and Sunset (Golden Lo-fi) Modes!
    function handleNPCInteraction() {
      if (!currentActiveNpc) return;

      if (currentActiveNpc.roleId === 'dj') {
        // Toggle Global Theme between Day and Sunset!
        if (currentMood === 'day') {
          currentMood = 'sunset';
          scene.background = new THREE.Color(0xfef3c7); // Warm Sunset Golden Amber
          scene.fog.color = new THREE.Color(0xfef3c7);
          document.getElementById('hud-title').textContent = '黄昏精奢大堂 (Golden Hour Lobby)';
          document.getElementById('hud-dot').style.background = '#f59e0b';
          document.getElementById('hud-dot').style.boxShadow = '0 0 10px #f59e0b';
          document.getElementById('hud-tempo').textContent = '金黄夕阳 Lo-fi (60 BPM)';
          showDialog('【首席拉花咖啡师】', '已为您无感调节大堂环境：夕阳黄昏暖色光照已渲染，背景音乐切换至 60 BPM 极缓 Rhodes 电钢和暖胶沙沙背景音。');
          scene.userData.starParticles.material.color.setHex(0xf59e0b); // golden particles
        } else {
          currentMood = 'day';
          scene.background = new THREE.Color(0xf3f4f6); // Sunny Day Linen White
          scene.fog.color = new THREE.Color(0xf3f4f6);
          document.getElementById('hud-title').textContent = '大堂精奢咖啡厅 (Lobby Cafe)';
          document.getElementById('hud-dot').style.background = '#d97706';
          document.getElementById('hud-dot').style.boxShadow = '0 0 10px #d97706';
          document.getElementById('hud-tempo').textContent = '明朗晨光 Bossa (72 BPM)';
          showDialog('【首席拉花咖啡师】', '已为您重置大堂环境：明朗晨光天光已拉起，背景音乐切换至 72 BPM 慵懒 Bossa Nova 和弦打击乐。');
          scene.userData.starParticles.material.color.setHex(0xd97706); // warm gold particles
        }
      } else if (currentActiveNpc.roleId === 'host') {
        showDialog('【大堂经理】', '呼... 昨晚 100M Token 的并发吞吐量把大楼的主网络都占满了，当时控制中心大屏幕的主频曲线都在发红呢！好在今天大堂已经恢复了静谧，大家喝着咖啡聊着天，一切都安详健康。');
      } else if (currentActiveNpc.roleId === 'dancing_lily') {
        showDialog('【自由插画师 Lily】', '噢！你的发光亚克力头冠也随着木质 Bossa 和弦的起伏而微微呼吸呢！在这么惬意明朗的大理石天光下作画，灵感简直像泉水一样涌出！');
      } else if (currentActiveNpc.roleId === 'chilling_alex') {
        showDialog('【独立开发者 Alex】', '听着黑胶的 Procedural Vinyl 灰尘沙沙声，喝着冰美式，在 100万 上下文的编译环境里跑 AGY SDK 分工脚本... 这就是属于全栈黑客的惬意咖啡馆下午茶吧。');
      } else if (currentActiveNpc.roleId === 'chatting_chloe') {
        showDialog('【专栏作家 Chloe】', '你看，那边的黄铜包边毛玻璃隔断做得很漂亮吧？听说这是 Orbit 引擎使用 PhysicalMaterial 特意拉升了 transmission（透光率）打磨的哦！在阳光漫反射下有一种精奢的奶油风。');
      }
    }

    // Toggle Custom Mood Shader filter colors!
    function handleMoodShiftInteraction() {
      if (!currentActiveNpc || currentActiveNpc.roleId !== 'bartender') return;

      const colors = [0xd97706, 0x65a30d, 0x10b981, 0x3b82f6, 0xf472b6];
      const selectedColor = colors[Math.floor(Math.random() * colors.length)];
      scene.userData.starParticles.material.color.setHex(selectedColor);
      
      const lightHex = selectedColor.toString(16);
      showDialog('【法式甜品烘焙师】', `您点的新鲜可颂与热咖啡已呈上！为您切换大堂氛围点缀色至：#${lightHex}`);
    }

    function onWindowResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }

    // Physics walking loop with deceleration & collision boundary
    function animate() {
      requestAnimationFrame(animate);

      const time = performance.now();
      const delta = (time - prevTime) / 1000;

      // 获取相机当前的朝向（水平面）
      let camDir = new THREE.Vector3();
      camera.getWorldDirection(camDir);
      camDir.y = 0; // 锁定在水平面上
      camDir.normalize();

      let camRight = new THREE.Vector3();
      camRight.crossVectors(camDir, new THREE.Vector3(0, 1, 0)).normalize();

      // 计算行走位移
      let moveDir = new THREE.Vector3();
      if (moveForward) moveDir.add(camDir);
      if (moveBackward) moveDir.add(camDir.clone().negate());
      if (moveLeft) moveDir.add(camRight);
      if (moveRight) moveDir.add(camRight.clone().negate());

      if (moveDir.lengthSq() > 0) {
        moveDir.normalize();
        
        // 角色旋转平滑过渡到行走方向
        const targetAngle = Math.atan2(moveDir.x, moveDir.z);
        // 让红发少女的 Avatar 旋转面向行走方向
        playerGroup.rotation.y = targetAngle;

        const moveSpeed = 6.0;
        playerGroup.position.addScaledVector(moveDir, moveSpeed * delta);
      }

      // 边缘碰撞检测 (Keep inside boundary walls)
      playerGroup.position.x = Math.max(-19, Math.min(19, playerGroup.position.x));
      playerGroup.position.z = Math.max(-19, Math.min(19, playerGroup.position.z));
      playerGroup.position.y = 0.0; // 踩在地面上

      // 摄像机锚点 yawObject 平滑跟随玩家位置 (Spring follow)
      yawObject.position.lerp(playerGroup.position, 0.1);

      // Animate star dust / floating lobby particles breathing / drifting
      const starParticles = scene.userData.starParticles;
      if (starParticles) {
        starParticles.rotation.y += (currentMood === 'day' ? 0.001 : 0.0003); // Slower, calmer cafe drift
      }

      // Rhythmic animations for NPCs based on Bossa/Lo-fi tempo
      const tempo = (currentMood === 'day' ? 72 : 60);
      npcs.forEach(npc => {
        if (npc.roleId === 'dancing_lily') {
          // Illustrator Lily: sways and paints to the Bossa/Lo-fi acoustics
          npc.mesh.position.y = 1.8 + Math.sin(time * 0.006 * (tempo / 60.0)) * 0.22;
          npc.mesh.rotation.y = Math.sin(time * 0.004 * (tempo / 60.0)) * 0.4;
        } else if (npc.roleId === 'chilling_alex') {
          // Coder Alex: sways gently while sipping flat white
          npc.mesh.position.x = 8.0 + Math.sin(time * 0.003 * (tempo / 60.0)) * 0.15;
          npc.mesh.rotation.z = Math.sin(time * 0.002 * (tempo / 60.0)) * 0.06;
        } else if (npc.roleId === 'chatting_chloe') {
          // Writer Chloe: hovers and drafts her novel near the window
          npc.mesh.position.y = 1.8 + Math.sin(time * 0.002 * (tempo / 60.0)) * 0.08;
          npc.mesh.position.z = -12.0 + Math.cos(time * 0.002 * (tempo / 60.0)) * 0.15;
        } else if (npc.roleId === 'dj') {
          // Barista: nods to the gentle Bossa beat
          npc.mesh.position.y = 1.8 + Math.sin(time * 0.008 * (tempo / 60.0)) * 0.05;
          npc.mesh.rotation.y = Math.sin(time * 0.004 * (tempo / 60.0)) * 0.15;
        }
      });

      checkNPCProximity();

      prevTime = time;
      renderer.render(scene, camera);
    }

    window.onload = () => {
      init();
      animate();
    };
  </script>
</body>
