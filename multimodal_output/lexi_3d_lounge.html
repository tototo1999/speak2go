<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>Lexi Studio - 3D 互动元宇宙 (The 3D Lounge Sandbox)</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #050608;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    #canvas3d {
      width: 100%;
      height: 100%;
      display: block;
    }
    /* HUD overlay */
    #hud {
      position: absolute;
      top: 20px;
      left: 20px;
      pointer-events: none;
      color: #34d399; /* emerald */
      font-family: monospace;
      font-size: 12px;
      z-index: 10;
      background: rgba(0,0,0,0.6);
      padding: 15px;
      border-radius: 8px;
      border: 1px solid rgba(52, 211, 153, 0.3);
      backdrop-filter: blur(5px);
    }
    #hud h2 {
      margin: 0 0 8px 0;
      font-size: 14px;
      color: #fff;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .status-dot {
      width: 8px;
      height: 8px;
      background: #ec4899; /* pink default */
      border-radius: 50%;
      box-shadow: 0 0 10px #ec4899;
      display: inline-block;
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(1.1); }
    }
    /* Controls helper overlay */
    #instructions {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #fff;
      text-align: center;
      z-index: 100;
      background: rgba(0,0,0,0.85);
      padding: 30px 40px;
      border-radius: 12px;
      border: 1px solid rgba(236,72,153,0.3);
      box-shadow: 0 10px 40px rgba(0,0,0,0.5);
      cursor: pointer;
      backdrop-filter: blur(10px);
      transition: opacity 0.3s;
    }
    #instructions h1 {
      margin-top: 0;
      font-size: 22px;
      color: #ec4899; /* Neon pink */
      text-shadow: 0 0 10px rgba(236,72,153,0.4);
    }
    #instructions p {
      font-size: 13px;
      color: #9ca3af;
      line-height: 1.6;
    }
    .key-btn {
      background: #1f2937;
      border: 1px solid #374151;
      padding: 2px 6px;
      border-radius: 4px;
      font-family: monospace;
      color: #fff;
    }
    /* Interaction prompt in center */
    #interaction-prompt {
      position: absolute;
      bottom: 15%;
      left: 50%;
      transform: translateX(-50%);
      color: #fff;
      font-family: monospace;
      font-size: 14px;
      z-index: 10;
      background: rgba(236, 72, 153, 0.8);
      padding: 8px 16px;
      border-radius: 6px;
      border: 1px solid #ff79c6;
      box-shadow: 0 0 15px rgba(236, 72, 153, 0.4);
      display: none;
      pointer-events: none;
      animation: float 2s infinite alternate;
    }
    @keyframes float {
      0% { transform: translate(-50%, 0px); }
      100% { transform: translate(-50%, -6px); }
    }
    /* Dialog screen overlay */
    #dialog-overlay {
      position: absolute;
      bottom: 25px;
      left: 50%;
      transform: translateX(-50%);
      width: 90%;
      max-width: 600px;
      background: rgba(15, 17, 21, 0.9);
      border: 1px solid rgba(52, 211, 153, 0.3);
      border-radius: 10px;
      padding: 15px 20px;
      color: #eaeaea;
      font-family: monospace;
      font-size: 13px;
      z-index: 10;
      display: none;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      backdrop-filter: blur(10px);
    }
    #dialog-sender {
      font-weight: bold;
      color: #ec4899;
      margin-bottom: 6px;
    }
    #crosshair {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 6px;
      height: 6px;
      background: rgba(255,255,255,0.4);
      border-radius: 50%;
      pointer-events: none;
      z-index: 5;
    }
    /* Exit Button */
    #exit-btn {
      position: absolute;
      top: 20px;
      right: 20px;
      z-index: 10;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.15);
      color: #eaeaea;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      text-decoration: none;
      font-size: 12px;
      font-family: monospace;
      transition: all 0.2s;
    }
    #exit-btn:hover {
      background: #ec4899;
      border-color: #ec4899;
      color: #fff;
      box-shadow: 0 0 15px rgba(236,72,153,0.3);
    }
  </style>
  <!-- Three.js CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

  <div id="crosshair"></div>
  <a href="lexi_apartment_lounge.html" id="exit-btn">退出 3D 沙盒</a>

  <div id="hud">
    <h2><span class="status-dot" id="hud-dot"></span> <span id="hud-title">微醺天台派对 (Lounge Party)</span></h2>
    <div>[AGY] 智能总指挥在线</div>
    <div style="margin-top: 8px;">状态码: <span style="color:#fff;">200 OK</span></div>
    <div>速率: <span style="color:#fff;">120 BPM</span></div>
    <div style="margin-top: 8px;">
      100万上下文已用限制: <br>
      <span style="color: #6cf; font-weight: bold;">218.6K / 1.00M Token (21.8%)</span>
    </div>
  </div>

  <div id="instructions">
    <h1>Lexi Studio 3D 协作沙盒</h1>
    <p>
      请点击屏幕进入沉浸式第一人称三维场景<br><br>
      <span class="key-btn">W</span> <span class="key-btn">A</span> <span class="key-btn">S</span> <span class="key-btn">D</span> / 方向键 移动角色<br>
      移动鼠标 环顾四周<br>
      靠近虚拟角色时，按 <span class="key-btn">E</span> 或 <span class="key-btn">Q</span> 进行交互与场景切换<br><br>
      <strong style="color: #ec4899;">点击任意位置开启旅程</strong>
    </p>
  </div>

  <div id="interaction-prompt">按 E 键对话</div>

  <div id="dialog-overlay">
    <div id="dialog-sender">【大楼前台】</div>
    <div id="dialog-content">欢迎回家！请在终端出示您的 CSRF 安全凭证...</div>
  </div>

  <canvas id="canvas3d"></canvas>

  <script>
    // 3D Engine Setup
    let scene, camera, renderer;
    let playerGroup = null; // 第三人称 Avatar Group (红发少女 Lexi)
    let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false;
    let prevTime = performance.now();
    let velocity = new THREE.Vector3();
    let direction = new THREE.Vector3();
    let currentMood = 'party'; // 'party' or 'lounge'

    // Interactive NPCs list
    let npcs = [];
    let currentActiveNpc = null;

    // First person mouse-look variables
    let pitchObject = new THREE.Object3D();
    let yawObject = new THREE.Object3D();
    const PI_2 = Math.PI / 2;

    // ── Web Audio API 实时合成音频引擎 ──
    let audioCtx = null;
    let schedulerTimer = null;
    let nextNoteTime = 0.0;
    let beatCount = 0;
    const chords = [
      [110, 165, 196, 246], // Am9
      [146, 196, 220, 293], // Dm9
      [98, 146, 174, 246],  // G13
      [130, 196, 246, 261]  // Cmaj9
    ];
    let currentChordIdx = 0;

    function initAudio() {
      if (audioCtx) return;
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      
      // 1. 模拟黑胶唱片的沙沙背景电流声 (Procedural Vinyl crackle)
      createVinylNoise();
      
      // 2. 启动步进音序调度器 (Start scheduler)
      nextNoteTime = audioCtx.currentTime;
      scheduler();
    }

    function createVinylNoise() {
      const bufferSize = audioCtx.sampleRate * 2;
      const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
      const data = buffer.getChannelData(0);
      for (let i = 0; i < bufferSize; i++) {
        data[i] = (Math.random() - 0.5) * 0.015; // 细腻的白噪声
      }
      const source = audioCtx.createBufferSource();
      source.buffer = buffer;
      source.loop = true;
      const gain = audioCtx.createGain();
      gain.gain.value = 0.2; // 极轻微的底噪
      source.connect(gain);
      gain.connect(audioCtx.destination);
      source.start();
    }

    function playKick(time) {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      
      // 瞬态音高扫描 (Pitch sweep for Kick thump)
      osc.frequency.setValueAtTime(150, time);
      osc.frequency.exponentialRampToValueAtTime(0.01, time + 0.3);
      
      // 音量包络衰减
      gain.gain.setValueAtTime(0.8, time);
      gain.gain.linearRampToValueAtTime(0.0, time + 0.3);
      
      osc.start(time);
      osc.stop(time + 0.32);
    }

    function playChordSynth(ch, time, duration) {
      const gain = audioCtx.createGain();
      gain.connect(audioCtx.destination);
      
      // 呼吸式 Sidechain Pumping 音量包络 (Sidechain simulation against kick!)
      gain.gain.setValueAtTime(0.0, time);
      gain.gain.linearRampToValueAtTime(0.2, time + 0.15);
      gain.gain.linearRampToValueAtTime(0.05, time + duration - 0.1);
      gain.gain.linearRampToValueAtTime(0.0, time + duration);

      ch.forEach(freq => {
        const osc = audioCtx.createOscillator();
        osc.type = 'triangle'; // 温暖的三角波模拟 Rhodes 柔润电钢
        osc.frequency.value = freq;
        osc.connect(gain);
        osc.start(time);
        osc.stop(time + duration);
      });
    }

    function scheduler() {
      while (nextNoteTime < audioCtx.currentTime + 0.1) {
        const tempo = (currentMood === 'party' ? 120 : 72);
        const secondsPerBeat = 60.0 / tempo;
        
        // 播放 4/4 拍 Kick (Lounge 模式下偶数拍休止)
        if (currentMood === 'party' || beatCount % 2 === 0) {
          playKick(nextNoteTime);
        }
        
        // 每 4 拍循环播放 Rhodes 和弦和 sidechain 包络
        if (beatCount % 4 === 0) {
          const chord = chords[currentChordIdx];
          playChordSynth(chord, nextNoteTime, secondsPerBeat * 4);
          currentChordIdx = (currentChordIdx + 1) % chords.length;
        }
        
        nextNoteTime += secondsPerBeat;
        beatCount++;
      }
      schedulerTimer = setTimeout(scheduler, 25);
    }

    function init() {
      // 1. Scene setup
      scene = new THREE.Scene();
      scene.background = new THREE.Color(0x050608);
      scene.fog = new THREE.FogExp2(0x050608, 0.04);

      // 2. Camera setup with custom camera holder for Third-Person follow
      camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
      pitchObject.add(camera);
      yawObject.position.set(0, 0.9, 8); // Start position centered on player
      yawObject.add(pitchObject);
      scene.add(yawObject);

      // Position camera at offset behind the pitch anchor
      camera.position.set(0, 1.2, 4.0); // 4 units back, 1.2 units up
      camera.lookAt(new THREE.Vector3(0, 0.8, 0)); // Look at player head/torso

      // 3. Renderer setup
      renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('canvas3d'), antialias: true });
      renderer.setPixelRatio(window.devicePixelRatio);
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.shadowMap.enabled = true;
      renderer.shadowMap.type = THREE.PCFSoftShadowMap;

      // 4. Lighting design (High-end lounge / party contrasts)
      const ambientLight = new THREE.AmbientLight(0x0c0f16, 0.6);
      scene.add(ambientLight);

      // Neon Spotlights (Pink and Cyan dynamic highlights)
      const pinkLight = new THREE.PointLight(0xec4899, 1.5, 20);
      pinkLight.position.set(-6, 4, -4);
      pinkLight.castShadow = true;
      scene.add(pinkLight);

      const cyanLight = new THREE.PointLight(0x06b6d4, 1.8, 25);
      cyanLight.position.set(6, 4, 4);
      cyanLight.castShadow = true;
      scene.add(cyanLight);

      // 5. Ground (Sleek dark concrete)
      const floorGeo = new THREE.PlaneGeometry(60, 60);
      const floorMat = new THREE.MeshStandardMaterial({
        color: 0x111318,
        roughness: 0.8,
        metalness: 0.2
      });
      const floor = new THREE.Mesh(floorGeo, floorMat);
      floor.rotation.x = -Math.PI / 2;
      floor.receiveShadow = true;
      scene.add(floor);

      // 6. Architectural minimalist concrete walls
      createWall(0, 5, -20, 40, 10, 1, 0x1a1d24); // Back Wall
      createWall(-20, 5, 0, 1, 10, 40, 0x1a1d24); // Left Wall
      createWall(20, 5, 0, 1, 10, 40, 0x1a1d24);  // Right Wall

      // 7. Architectural Glass partitions (frosted effect)
      const glassGeo = new THREE.BoxGeometry(16, 8, 0.2);
      const glassMat = new THREE.MeshPhysicalMaterial({
        color: 0x34d399,
        transparent: true,
        opacity: 0.2,
        roughness: 0.1,
        transmission: 0.6,
        thickness: 1.2
      });
      const glassPartition = new THREE.Mesh(glassGeo, glassMat);
      glassPartition.position.set(0, 4, -10);
      scene.add(glassPartition);

      // 8. Custom 3D Lounge Furniture
      // Luxury Emerald Sofa
      createSofa(-8, 0.5, 2, 6, 1, 1.5, 0x064e3b); // Emerald Velvet Left
      createSofa(8, 0.5, 2, 6, 1, 1.5, 0x064e3b);  // Emerald Velvet Right
      // Minimalist marble coffee table
      createBox(0, 0.3, 2, 3, 0.6, 1.5, 0x111317, 0.9, 0.1); 

      // 9. Interactive DJ Stand & DJ Setup (Neon pink platform)
      const djStand = createBox(0, 0.8, -6, 4, 1.2, 1.5, 0x08090c, 0.5, 0.8);
      // DJ glowing neon strip
      const djNeonGeo = new THREE.BoxGeometry(4.2, 0.1, 1.7);
      const djNeonMat = new THREE.MeshBasicMaterial({ color: 0xec4899 });
      const djNeon = new THREE.Mesh(djNeonGeo, djNeonMat);
      djNeon.position.set(0, 0.65, -6);
      scene.add(djNeon);

      // 10. Bar Counter & Mixologist Bar
      const barCounter = createBox(-14, 1.0, -8, 2, 1.8, 6, 0x1f2937, 0.2, 0.1);

      // ── 创建第三人称玩家 Avatar (红发少女 Lexi) ──
      playerGroup = new THREE.Group();
      
      // 身体 (Capsule)
      const playerBodyGeo = new THREE.CylinderGeometry(0.25, 0.25, 1.4, 16);
      const playerBodyMat = new THREE.MeshStandardMaterial({ color: 0x1f2937, roughness: 0.5, metalness: 0.2 });
      const playerBody = new THREE.Mesh(playerBodyGeo, playerBodyMat);
      playerBody.position.y = 0.7;
      playerBody.castShadow = true;
      playerBody.receiveShadow = true;
      playerGroup.add(playerBody);

      // 头部 (Sphere)
      const playerHeadGeo = new THREE.SphereGeometry(0.22, 16, 16);
      const playerHeadMat = new THREE.MeshStandardMaterial({ color: 0xfed7aa, roughness: 0.6 }); // 蜜桃色皮肤
      const playerHead = new THREE.Mesh(playerHeadGeo, playerHeadMat);
      playerHead.position.y = 1.5;
      playerHead.castShadow = true;
      playerGroup.add(playerHead);

      // 发光的红发 (Glowing Red Hair!)
      const playerHairGeo = new THREE.SphereGeometry(0.23, 16, 16);
      const playerHairMat = new THREE.MeshStandardMaterial({ 
        color: 0xd97706, // 经典红发色
        emissive: 0xd97706, 
        emissiveIntensity: 0.6,
        roughness: 0.8
      });
      const playerHair = new THREE.Mesh(playerHairGeo, playerHairMat);
      playerHair.position.set(0, 1.55, -0.04);
      playerHair.scale.set(1.05, 1, 1.15);
      playerHair.castShadow = true;
      playerGroup.add(playerHair);

      // 亚克力情绪头冠 (Neon pink tilted Torus)
      const playerCrownGeo = new THREE.TorusGeometry(0.25, 0.03, 8, 24);
      const playerCrownMat = new THREE.MeshBasicMaterial({ color: 0xec4899 });
      const playerCrown = new THREE.Mesh(playerCrownGeo, playerCrownMat);
      playerCrown.position.set(0, 1.7, 0);
      playerCrown.rotation.x = Math.PI / 2.2;
      playerGroup.add(playerCrown);

      playerGroup.position.set(0, 0, 8); // 初始放置在地面上
      scene.add(playerGroup);

      // 11. NPC Geometries (Glowing Capsule Demos)
      // DJ NPC
      let djNpc = createNPC(0, 1.8, -6.5, 0xec4899, 'dj', '【派对 DJ】', '准备好切歌了吗？[按 E 切换至静谧 Lounge 爵士声轨]');
      // Bartender NPC
      let barNpc = createNPC(-14, 1.8, -8, 0x06b6d4, 'bartender', '【明星调酒师】', '欢迎光临！点一杯“微醺情绪”鸡尾酒？[按 Q 切换全局色彩氛围]');
      // Front Desk Receptionist NPC
      let frontNpc = createNPC(14, 1.8, -4, 0x10b981, 'receptionist', '【公寓接待前台】', '校验成功。已通过 local bypass 权限授权。系统处于极度健康态。');

      // 12. Star Dust / Floating neon particles
      const starGeo = new THREE.BufferGeometry();
      const starCount = 300;
      const starCoords = new Float32Array(starCount * 3);
      for(let i=0; i<starCount*3; i+=3) {
        starCoords[i] = (Math.random() - 0.5) * 40;
        starCoords[i+1] = Math.random() * 8;
        starCoords[i+2] = (Math.random() - 0.5) * 40;
      }
      starGeo.setAttribute('position', new THREE.BufferAttribute(starCoords, 3));
      const starMat = new THREE.PointsMaterial({
        color: 0xec4899,
        size: 0.1,
        transparent: true,
        opacity: 0.8
      });
      const starParticles = new THREE.Points(starGeo, starMat);
      scene.add(starParticles);

      // 13. Dynamic particle movement function
      scene.userData.starParticles = starParticles;

      // Event Listeners for controls
      document.addEventListener('keydown', onKeyDown);
      document.addEventListener('keyup', onKeyUp);
      
      const instructions = document.getElementById('instructions');
      instructions.addEventListener('click', () => {
        instructions.requestPointerLock();
        initAudio(); // 激活网页实时合成音频引擎
      });

      document.addEventListener('pointerlockchange', () => {
        if (document.pointerLockElement === instructions) {
          instructions.style.opacity = '0';
          instructions.style.pointerEvents = 'none';
        } else {
          instructions.style.opacity = '1';
          instructions.style.pointerEvents = 'auto';
        }
      });

      document.addEventListener('mousemove', onMouseMove);
      window.addEventListener('resize', onWindowResize);
    }

    // Helper functions to create custom structural geometry
    function createWall(x, y, z, w, h, d, color) {
      const geo = new THREE.BoxGeometry(w, h, d);
      const mat = new THREE.MeshStandardMaterial({ color: color, roughness: 0.9, metalness: 0.1 });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.position.set(x, y, z);
      mesh.receiveShadow = true;
      mesh.castShadow = true;
      scene.add(mesh);
      return mesh;
    }

    function createBox(x, y, z, w, h, d, color, roughness = 0.5, metalness = 0.5) {
      const geo = new THREE.BoxGeometry(w, h, d);
      const mat = new THREE.MeshStandardMaterial({ color: color, roughness: roughness, metalness: metalness });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.position.set(x, y, z);
      mesh.castShadow = true;
      mesh.receiveShadow = true;
      scene.add(mesh);
      return mesh;
    }

    function createSofa(x, y, z, w, h, d, color) {
      const sofa = createBox(x, y, z, w, h, d, color, 0.7, 0.1);
      // Backrest
      const back = createBox(x, y + 0.8, z - d/2 + 0.15, w, h * 1.5, 0.3, color, 0.7, 0.1);
      return sofa;
    }

    function createNPC(x, y, z, glowColor, roleId, name, dialogText) {
      const group = new THREE.Group();
      group.position.set(x, y, z);

      // Capsule body (aesthetic cyberpunk capsule NPC)
      const bodyGeo = new THREE.CylinderGeometry(0.4, 0.4, 1.8, 16);
      const bodyMat = new THREE.MeshStandardMaterial({ color: 0x1f2937, roughness: 0.3, metalness: 0.8 });
      const body = new THREE.Mesh(bodyGeo, bodyMat);
      body.castShadow = true;
      group.add(body);

      // Glowing headphones or visualizer halo
      const ringGeo = new THREE.TorusGeometry(0.5, 0.08, 8, 24);
      const ringMat = new THREE.MeshBasicMaterial({ color: glowColor });
      const ring = new THREE.Mesh(ringGeo, ringMat);
      ring.position.y = 0.8;
      ring.rotation.x = Math.PI / 2;
      group.add(ring);

      scene.add(group);

      const npcData = {
        mesh: group,
        roleId: roleId,
        name: name,
        dialogText: dialogText,
        radius: 3.5 // interactive range
      };
      npcs.push(npcData);
      return npcData;
    }

    // Keyboard handlers
    function onKeyDown(e) {
      switch (e.code) {
        case 'ArrowUp':
        case 'KeyW':
          moveForward = true;
          break;
        case 'ArrowLeft':
        case 'KeyA':
          moveLeft = true;
          break;
        case 'ArrowDown':
        case 'KeyS':
          moveBackward = true;
          break;
        case 'ArrowRight':
        case 'KeyD':
          moveRight = true;
          break;
        case 'KeyE':
          handleNPCInteraction();
          break;
        case 'KeyQ':
          handleMoodShiftInteraction();
          break;
      }
    }

    function onKeyUp(e) {
      switch (e.code) {
        case 'ArrowUp':
        case 'KeyW':
          moveForward = false;
          break;
        case 'ArrowLeft':
        case 'KeyA':
          moveLeft = false;
          break;
        case 'ArrowDown':
        case 'KeyS':
          moveBackward = false;
          break;
        case 'ArrowRight':
        case 'KeyD':
          moveRight = false;
          break;
      }
    }

    function onMouseMove(e) {
      if (document.pointerLockElement !== document.getElementById('instructions')) return;

      const movementX = e.movementX || 0;
      const movementY = e.movementY || 0;

      yawObject.rotation.y -= movementX * 0.002;
      pitchObject.rotation.x -= movementY * 0.002;

      // Cap vertical look
      pitchObject.rotation.x = Math.max(-PI_2, Math.min(PI_2, pitchObject.rotation.x));
    }

    // Proactive collision & interaction check
    function checkNPCProximity() {
      let playerPos = playerGroup.position;
      let closestNpc = null;
      let minDistance = Infinity;

      for (let npc of npcs) {
        let dist = playerPos.distanceTo(npc.mesh.position);
        if (dist < npc.radius && dist < minDistance) {
          closestNpc = npc;
          minDistance = dist;
        }
      }

      const prompt = document.getElementById('interaction-prompt');
      const dialog = document.getElementById('dialog-overlay');

      if (closestNpc) {
        currentActiveNpc = closestNpc;
        prompt.style.display = 'block';
        if (closestNpc.roleId === 'dj') {
          prompt.textContent = '【按 E 切换至静谧大堂】';
        } else if (closestNpc.roleId === 'bartender') {
          prompt.textContent = '【按 Q 改变微醺氛围色彩】';
        } else {
          prompt.textContent = '【靠近自动对齐凭证】';
          showDialog(closestNpc.name, closestNpc.dialogText);
        }
      } else {
        currentActiveNpc = null;
        prompt.style.display = 'none';
        dialog.style.display = 'none';
      }
    }

    function showDialog(sender, text) {
      const dialog = document.getElementById('dialog-overlay');
      document.getElementById('dialog-sender').textContent = sender;
      document.getElementById('dialog-content').textContent = text;
      dialog.style.display = 'block';
    }

    // Toggle between Party (Neon Pink) and Lounge (Emerald Sunset) Modes!
    function handleNPCInteraction() {
      if (!currentActiveNpc) return;

      if (currentActiveNpc.roleId === 'dj') {
        // Toggle Global Theme!
        if (currentMood === 'party') {
          currentMood = 'lounge';
          scene.background = new THREE.Color(0x070c0e);
          scene.fog.color = new THREE.Color(0x070c0e);
          document.getElementById('hud-title').textContent = '静谧公寓大堂 (Apartment Lounge)';
          document.getElementById('hud-dot').style.background = '#10b981';
          document.getElementById('hud-dot').style.boxShadow = '0 0 10px #10b981';
          showDialog('【派对 DJ】', '已为您无感切换为：72 BPM 慵懒大堂爵士伴奏。背景粒子呼吸频率已降低。');
          scene.userData.starParticles.material.color.setHex(0x10b981);
        } else {
          currentMood = 'party';
          scene.background = new THREE.Color(0x050608);
          scene.fog.color = new THREE.Color(0x050608);
          document.getElementById('hud-title').textContent = '微醺天台派对 (Lounge Party)';
          document.getElementById('hud-dot').style.background = '#ec4899';
          document.getElementById('hud-dot').style.boxShadow = '0 0 10px #ec4899';
          showDialog('【派对 DJ】', '已为您拉升律动：120 BPM 深邃浩室电声。霓虹光栅正弦跃动开启！');
          scene.userData.starParticles.material.color.setHex(0xec4899);
        }
      }
    }

    // Toggle Custom Mood Shader filter colors!
    function handleMoodShiftInteraction() {
      if (!currentActiveNpc || currentActiveNpc.roleId !== 'bartender') return;

      const colors = [0xec4899, 0x06b6d4, 0xf59e0b, 0xa78bfa, 0x10b981];
      const selectedColor = colors[Math.floor(Math.random() * colors.length)];
      scene.userData.starParticles.material.color.setHex(selectedColor);
      
      const lightHex = selectedColor.toString(16);
      showDialog('【明星调酒师】', `您的微醺鸡尾酒已摇晃完毕！全局艺术滤镜已切换至：#${lightHex}`);
    }

    function onWindowResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }

    // Physics walking loop with deceleration & collision boundary
    function animate() {
      requestAnimationFrame(animate);

      const time = performance.now();
      const delta = (time - prevTime) / 1000;

      // 获取相机当前的朝向（水平面）
      let camDir = new THREE.Vector3();
      camera.getWorldDirection(camDir);
      camDir.y = 0; // 锁定在水平面上
      camDir.normalize();

      let camRight = new THREE.Vector3();
      camRight.crossVectors(camDir, new THREE.Vector3(0, 1, 0)).normalize();

      // 计算行走位移
      let moveDir = new THREE.Vector3();
      if (moveForward) moveDir.add(camDir);
      if (moveBackward) moveDir.add(camDir.clone().negate());
      if (moveLeft) moveDir.add(camRight);
      if (moveRight) moveDir.add(camRight.clone().negate());

      if (moveDir.lengthSq() > 0) {
        moveDir.normalize();
        
        // 角色旋转平滑过渡到行走方向
        const targetAngle = Math.atan2(moveDir.x, moveDir.z);
        // 让红发少女的 Avatar 旋转面向行走方向
        playerGroup.rotation.y = targetAngle;

        const moveSpeed = 6.0;
        playerGroup.position.addScaledVector(moveDir, moveSpeed * delta);
      }

      // 边缘碰撞检测 (Keep inside boundary walls)
      playerGroup.position.x = Math.max(-19, Math.min(19, playerGroup.position.x));
      playerGroup.position.z = Math.max(-19, Math.min(19, playerGroup.position.z));
      playerGroup.position.y = 0.0; // 踩在地面上

      // 摄像机锚点 yawObject 平滑跟随玩家位置 (Spring follow)
      yawObject.position.lerp(playerGroup.position, 0.1);

      // Animate star particles breathing / drifting
      const starParticles = scene.userData.starParticles;
      if (starParticles) {
        starParticles.rotation.y += (currentMood === 'party' ? 0.002 : 0.0005);
      }

      checkNPCProximity();

      prevTime = time;
      renderer.render(scene, camera);
    }

    window.onload = () => {
      init();
      animate();
    };
  </script>
</body>
