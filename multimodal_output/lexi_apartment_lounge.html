<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>Lexi Studio - 公寓公共活动区 (The Apartment Lounge)</title>
  <style>
    body {
      background: #0f1115;
      color: #eaeaea;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      margin: 0;
      padding: 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 80vh;
    }
    .card {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 16px;
      padding: 30px;
      max-width: 800px;
      width: 100%;
      box-shadow: 0 20px 50px rgba(0,0,0,0.3);
      backdrop-filter: blur(10px);
    }
    h1 {
      font-size: 24px;
      font-weight: 600;
      color: #10b981; /* Emerald */
      margin-top: 0;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    p {
      color: #9ca3af;
      line-height: 1.6;
      font-size: 14px;
    }
    .video-viewport {
      background: #000;
      border-radius: 12px;
      height: 380px;
      width: 100%;
      margin: 20px 0;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      border: 1px solid rgba(16, 185, 129, 0.2);
      box-shadow: 0 0 20px rgba(16, 185, 129, 0.15);
    }
    .video-overlay {
      position: absolute;
      top: 20px;
      left: 20px;
      font-family: monospace;
      font-size: 11px;
      color: #34d399;
      background: rgba(0, 0, 0, 0.7);
      padding: 6px 12px;
      border-radius: 6px;
      border: 1px solid rgba(52, 211, 153, 0.3);
    }
    .visualizer {
      display: flex;
      align-items: flex-end;
      gap: 3px;
      height: 60px;
    }
    .bar {
      width: 4px;
      background: #10b981;
      border-radius: 2px;
      animation: bounce 1.2s ease-in-out infinite alternate;
    }
    .bar:nth-child(2) { animation-delay: 0.2s; height: 30px; }
    .bar:nth-child(3) { animation-delay: 0.4s; height: 45px; }
    .bar:nth-child(4) { animation-delay: 0.1s; height: 20px; }
    .bar:nth-child(5) { animation-delay: 0.5s; height: 55px; }
    @keyframes bounce {
      0% { height: 10px; }
      100% { height: 70px; }
    }
    .btn-back {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.15);
      color: #eaeaea;
      padding: 10px 20px;
      border-radius: 8px;
      cursor: pointer;
      text-decoration: none;
      font-size: 13px;
      transition: all 0.2s;
    }
    .btn-back:hover {
      background: #10b981;
      border-color: #10b981;
      color: #fff;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1><span style="display:inline-block; width:12px; height:12px; border-radius:50%; background:#10b981; box-shadow: 0 0 10px #10b981;"></span> 公寓公共活动区 (The Apartment Lounge)</h1>
    <p>总制片人 <strong>AGY SDK</strong> 指导，由 <strong>Zine</strong>（剧本）、<strong>Orbit</strong>（三维空间与NPC）以及 <strong>Genie</strong>（BGM）联合流式制作的场景画片已合成完毕。</p>
    
    <div class="video-viewport" style="height: auto; min-height: 380px;">
      <div class="video-overlay">🎥 SCENE_01: LOUNGE_DUSK | STREAMING 72 BPM LO-FI</div>
      <img src="../assets/lexi_apartment_lounge.png" alt="Lounge Scene" style="width: 100%; height: auto; display: block; border-radius: 12px;">
    </div>

    <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 30px;">
      <span style="font-size: 12px; color: #6b7280; font-family: monospace;">UUID: 03d60644-82a9-4b4d-82e4-a37785a9bdfb</span>
      <div style="display: flex; gap: 10px;">
        <a href="lexi_3d_lounge.html" class="btn-back" style="background:#10b981; border-color:#10b981; color:#fff; font-weight:600; box-shadow:0 0 12px rgba(16,185,129,0.3);">🎮 进入 3D 互动体验</a>
        <a href="https://chat2go.cn/chat.html" class="btn-back">返回 Chat2GO 调试室</a>
      </div>
    </div>
  </div>
</body>
</html>
