<!DOCTYPE html>
<!-- saved from url=(0043)file:///Users/dami2026/Downloads/login.html -->
<html lang="zh-CN"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
  
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login · Speak2GO.ai</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ccircle cx='32' cy='32' r='30' fill='%23DC2626'/%3E%3Ctext x='32' y='44' font-family='Helvetica,Arial,sans-serif' font-size='30' font-weight='800' text-anchor='middle' fill='%23fff'%3EGO%3C/text%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --teal: #2563eb; --teal-50: #eff6ff; --teal-600: #1d4ed8;
      --purple: #534AB7; --purple-50: #EEEDFE;
      --bg: #FAFAF8; --bg2: #F4F3EF;
      --border: rgba(60,58,54,0.12); --border2: rgba(60,58,54,0.22);
      --text: #1a1a18; --text2: #5f5e5a; --text3: #888780;
      --radius: 8px; --radius-lg: 12px;
    }
    body { font-family: 'Noto Sans SC', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }
    nav { display: flex; align-items: center; justify-content: space-between; padding: 0 2.5rem; height: 60px; background: #fff; border-bottom: 0.5px solid var(--border); }
    .logo { font-family: 'Noto Serif SC', serif; font-size: 24px; font-weight: 600; text-decoration: none; color: var(--text); }
    .logo span { color: var(--teal); }
    .nav-link { font-size: 13px; color: var(--text2); text-decoration: none; }
    .main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 2rem; }
    .card { background: #fff; border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 2.5rem; width: 100%; max-width: 400px; }
    .card-header { text-align: center; margin-bottom: 2rem; }
    .card-logo { font-family: 'Noto Serif SC', serif; font-size: 22px; font-weight: 600; margin-bottom: 8px; }
    .card-logo span { color: var(--teal); }
    .logo .logo-tld, .card-logo .logo-tld { font-size: 0.65em; font-weight: 500; letter-spacing: 0; }
    .card-sub { font-size: 14px; color: var(--text2); }
    .tabs { display: flex; gap: 0; border: 0.5px solid var(--border); border-radius: var(--radius); overflow: hidden; margin-bottom: 1.75rem; }
    .tab { flex: 1; padding: 9px; font-size: 13px; font-family: inherit; cursor: pointer; border: none; background: transparent; color: var(--text2); font-weight: 500; transition: all .15s; }
    .tab.active { background: var(--teal); color: #fff; }
    .form { display: flex; flex-direction: column; gap: 14px; }
    .field { display: flex; flex-direction: column; gap: 6px; }
    label { font-size: 13px; font-weight: 500; color: var(--text2); }
    input { padding: 10px 12px; font-size: 14px; font-family: inherit; border: 0.5px solid var(--border2); border-radius: var(--radius); background: var(--bg); color: var(--text); outline: none; transition: border-color .15s; }
    input:focus { border-color: var(--teal); background: #fff; }
    .submit-btn { padding: 12px; font-size: 14px; font-family: inherit; font-weight: 500; border: none; border-radius: var(--radius); background: var(--teal); color: #fff; cursor: pointer; transition: background .15s; margin-top: 4px; }
    .submit-btn:hover { background: var(--teal-600); }
    .submit-btn:disabled { background: var(--text3); cursor: not-allowed; }
    .msg { padding: 10px 14px; border-radius: var(--radius); font-size: 13px; display: none; }
    .msg.success { background: var(--teal-50); color: var(--teal-600); display: block; }
    .msg.error { background: #FDE8E8; color: #9B1C1C; display: block; }
    .msg.info { background: var(--purple-50); color: var(--purple); display: block; }
    .footer-note { text-align: center; margin-top: 1.5rem; font-size: 12px; color: var(--text3); line-height: 1.6; }
    .footer-note a { color: var(--teal); text-decoration: none; }
    footer { padding: 1.5rem 2.5rem; border-top: 0.5px solid var(--border); display: flex; justify-content: space-between; background: #fff; }
    footer p { font-size: 12px; color: var(--text3); }
    .back-link { font-size: 12px; color: var(--text3); text-decoration: none; }
    .back-link:hover { color: var(--text); }
  </style>
</head>
<body>
  <nav>
    <a href="/" class="logo">Speak2<span>GO</span><span class="logo-tld">.ai</span></a>
    <a href="/" class="nav-link">← 返回首页</a>
  </nav>

  <main class="main">
    <div class="card">
      <div class="card-header">
        <div class="card-logo">Speak2<span>GO</span><span class="logo-tld">.ai</span></div>
      </div>

      <!-- tradego 子站:Register tab 默认开启,允许新建口语OG独立账号 -->
      <div class="tabs">
        <button class="tab active" onclick="switchTab(&#39;login&#39;)">Login</button>
        <button class="tab" onclick="switchTab(&#39;register&#39;)">Register</button>
      </div>

      <div id="msg" class="msg"></div>

      <!-- Login表单 -->
      <div id="form-login" class="form">
        <div class="field">
          <label>Email</label>
          <input type="email" id="login-email" placeholder="your@email.com" autocomplete="email">
        </div>
        <div class="field">
          <label>Password</label>
          <input type="password" id="login-password" placeholder="输入Password" autocomplete="current-password">
        </div>
        <button class="submit-btn" onclick="handleLogin()">Login</button>
      </div>

      <!-- Register表单 -->
      <div id="form-register" class="form" style="display:none;">
        <div class="field">
          <label>Email</label>
          <input type="email" id="reg-email" placeholder="your@email.com" autocomplete="email">
        </div>
        <div class="field">
          <label>Password</label>
          <input type="password" id="reg-password" placeholder="至少8位" autocomplete="new-password">
        </div>
        <div class="field">
          <label>昵称</label>
          <input type="text" id="reg-nickname" placeholder="随便起一个" autocomplete="nickname">
        </div>
        <div class="field">
          <label>你的角色</label>
          <select id="reg-role" style="padding:10px 12px;font-size:14px;font-family:inherit;border:0.5px solid var(--border2);border-radius:var(--radius);background:var(--bg);color:var(--text);outline:none;">
            <option value="user">小白</option>
            <option value="expert">OG</option>
          </select>
        </div>
        <button class="submit-btn" onclick="handleRegister()">Register账号</button>
      </div>

      <div class="footer-note">
        Login即代表同意 <a href="/terms">服务条款</a> 和 <a href="/privacy">隐私政策</a>
      </div>
    </div>
  </main>

  <footer>
    <a href="/" class="back-link">← Speak2GO.ai 首页</a>
    <p>© 2026 Speak2GO.ai</p>
  </footer>

  <script src="/vendor/supabase.js"
          onerror="this.onerror=null;this.src='https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2'"></script>
  <script>
    const SUPABASE_URL = 'https://qjnagbzqhoansixqharb.supabase.co'
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFqbmFnYnpxaG9hbnNpeHFoYXJiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgzNDIxODIsImV4cCI6MjA5MzkxODE4Mn0.GpMUVTk6JvqeciXagXQiJunc8TLFMHg3_b9reIjJ2Y8'
    // 避免与 UMD 注入的全局 supabase 冲突，本地 client 用 sb 命名
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY)

    function showMsg(text, type) {
      const el = document.getElementById('msg')
      el.textContent = text
      el.className = 'msg ' + type
    }
    function clearMsg() {
      const el = document.getElementById('msg')
      el.className = 'msg'
      el.textContent = ''
    }

    function switchTab(tab) {
      clearMsg()
      document.querySelectorAll('.tab').forEach((t, i) => {
        t.classList.toggle('active', (tab === 'login' && i === 0) || (tab === 'register' && i === 1))
      })
      document.getElementById('form-login').style.display = tab === 'login' ? 'flex' : 'none'
      document.getElementById('form-register').style.display = tab === 'register' ? 'flex' : 'none'
    }

    async function handleLogin() {
      clearMsg()
      const email = document.getElementById('login-email').value.trim()
      const password = document.getElementById('login-password').value
      if (!email || !password) { showMsg('请填写Email和Password', 'error'); return }
      const btn = document.querySelector('#form-login .submit-btn')
      btn.disabled = true; btn.textContent = 'Logging in...'
      const { data, error } = await sb.auth.signInWithPassword({ email, password })
      btn.disabled = false; btn.textContent = 'Login'
      if (error) { showMsg('Login失败：' + (error.message === 'Invalid login credentials' ? 'Email或Password错误' : error.message), 'error'); return }
      showMsg('Login成功！正在跳转...', 'success')
      setTimeout(() => { window.location.href = '/chat.html' }, 1000)
    }

    async function handleRegister() {
      clearMsg()
      if (!window.supabase) { showMsg('Supabase SDK 未加载，请刷新页面或检查网络', 'error'); return }
      const email = document.getElementById('reg-email').value.trim()
      const password = document.getElementById('reg-password').value
      const nickname = document.getElementById('reg-nickname').value.trim()
      const role = document.getElementById('reg-role').value
      if (!email || !password) { showMsg('请填写Email和Password', 'error'); return }
      if (password.length < 6) { showMsg('Password至少6位', 'error'); return }
      if (!nickname) { showMsg('请填写昵称', 'error'); return }
      const btn = document.querySelector('#form-register .submit-btn')
      btn.disabled = true; btn.textContent = 'Register中...'
      try {
        const target = role === 'expert' ? '/chat.html' : '/chat.html'
        const { data, error } = await sb.auth.signUp({
          email, password,
          options: {
            data: { role, nickname },
            emailRedirectTo: `${window.location.origin}${target}`,
          },
        })
        btn.disabled = false; btn.textContent = 'Register账号'
        if (error) { showMsg('Register失败：' + error.message, 'error'); return }
        // 不走Email验证：Register成功后直接Login跳转
        if (!data.session) {
          const r = await sb.auth.signInWithPassword({ email, password })
          if (r.error) { showMsg('Register成功，但自动Login失败：' + r.error.message, 'error'); return }
        }
        showMsg('Register成功！正在跳转...', 'success')
        setTimeout(() => { window.location.href = target }, 800)
      } catch (e) {
        btn.disabled = false; btn.textContent = 'Register账号'
        showMsg('Register异常：' + (e?.message || e), 'error')
        console.error('handleRegister error:', e)
      }
    }

    // 已Login则跳转
    if (window.supabase) {
      sb.auth.getSession().then(({ data: { session } }) => {
        if (session) window.location.href = '/chat.html'
      })
    }
  </script>


</body></html>
